<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전담 마크 Pro V5.6 - 통합 시수 관리 시스템</title>
    
    <!-- 1. 스타일 및 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    
    <!-- 2. Firebase 설정 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, Timestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBWxSDDYkOtaZI9dByQ85A0izlrCmHEoIQ",
          authDomain: "jdmk-v2.firebaseapp.com",
          projectId: "jdmk-v2",
          storageBucket: "jdmk-v2.firebasestorage.app",
          messagingSenderId: "279087439497",
          appId: "1:279087439497:web:e7f19f6a911483248cb058",
          measurementId: "G-PH80PJW6TC"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = 'jdmk-v5-final'; 

            window.fb = { auth, db, appId, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, Timestamp, signInAnonymously, onAuthStateChanged, query, orderBy, limit };
            window.fbReady = true; 
        } catch (e) {
            window.fbError = e.message;
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top: 3px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-sat { color: #2563eb; }
        .day-sun { color: #dc2626; }
        .bg-weekend { background-color: #f8fafc; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
        .config-table td, .config-table th { min-width: 0 !important; width: 16.66% !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white;">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-weight: 700; color: #4f46e5; font-size: 0.8rem;">전담 마크 Pro V5.6 시스템 준비 중...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createElement } = React;

        const SafeIcon = ({ name, size = 16, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => {
                const check = setInterval(() => { if (window.lucide) { setReady(true); clearInterval(check); } }, 50);
                return () => clearInterval(check);
            }, []);
            if (!ready || !window.lucide?.icons[name]) return <div style={{width: size, height: size}} className={className} />;
            const iconData = window.lucide.icons[name];
            return createElement('svg', { ...iconData[1], width: size, height: size, className: className, key: name },
                iconData[2].map((child, i) => createElement(child[0], { ...child[1], key: i }))
            );
        };

        const DAYS = ['월', '화', '수', '목', '금'];
        const PERIODS = [1, 2, 3, 4, 5, 6];
        const TARGET_CLASSES = ['1반', '2반', '3반', '4반'];
        const SPECIALISTS = [
            { id: 'english', name: '영어', color: 'bg-indigo-600', text: 'text-indigo-700', bg: 'bg-indigo-50', border: 'border-indigo-200' },
            { id: 'science', name: '과학', color: 'bg-emerald-600', text: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200' },
            { id: 'pe', name: '체육', color: 'bg-rose-600', text: 'text-rose-700', bg: 'bg-rose-50', border: 'border-rose-200' },
            { id: 'external', name: '외부강사', color: 'bg-amber-600', text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(window.fbError || null);

            // 데이터 상태
            const [baseSchedule, setBaseSchedule] = useState({});
            const [overrides, setOverrides] = useState({});
            const [targetHours, setTargetHours] = useState({ english: 30, science: 30, pe: 30, external: 0 });
            
            // UI 상태
            const [activeTab, setActiveTab] = useState('lessons'); 
            const [viewMode, setViewMode] = useState('daily'); 
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedCell, setSelectedCell] = useState(null);
            
            // 전담 설정용 편집용 상태 (DB와 분리하여 자동 로드 방지)
            const [editingSchedule, setEditingSchedule] = useState({});
            const [selectedSpec, setSelectedSpec] = useState('english');
            const [quickClass, setQuickClass] = useState('1반');
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                const checkInterval = setInterval(() => {
                    if (window.fbReady && window.fb) {
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        signInAnonymously(auth).catch(e => setError(e.code));
                        onAuthStateChanged(auth, setUser);
                        clearInterval(checkInterval);
                    }
                }, 100);
                setTimeout(() => setIsLoading(false), 2000); 
                return () => clearInterval(checkInterval);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                const unsubs = [
                    onSnapshot(path('base'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setBaseSchedule(d);
                        // 처음 로드될 때만 편집용 스케줄에 복사
                        if (Object.keys(editingSchedule).length === 0) setEditingSchedule(d);
                    }),
                    onSnapshot(path('overrides'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setOverrides(d);
                        setIsLoading(false);
                    }),
                    onSnapshot(path('academic'), (s) => {
                        s.docs.forEach(doc => { if (doc.id === 'targets') setTargetHours(doc.data()); });
                    })
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            const saveData = async (coll, id, data) => {
                const { db, appId, doc, setDoc, Timestamp } = window.fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coll, id), { ...data, updatedAt: Timestamp.now() });
            };

            const getCellData = (dateStr, period, classLabel) => {
                const overrideKey = `${dateStr}-${period}-${classLabel}`;
                const date = new Date(dateStr + 'T00:00:00'); 
                const dayIdx = (date.getDay() + 6) % 7; 
                
                const override = overrides[overrideKey];
                
                // 전담 시간표(base) 반영 - 실시간 baseSchedule 상태 참조
                const baseKey = `${dayIdx}-${period}`;
                const baseMatch = baseSchedule[baseKey];
                const isBaseMatch = baseMatch && (baseMatch.classLabel === classLabel);
                
                const isConflict = override && override.type === 'external' && isBaseMatch;
                
                if (override) return { ...override, isConflict };
                if (isBaseMatch) return { type: baseMatch.type, isConflict };
                return null;
            };

            const parseSmartDates = (input) => {
                if (!input) return [];
                const currentYear = new Date().getFullYear();
                return input.split(/[,|\n]/).map(d => {
                    let s = d.trim().replace(/\//g, '.');
                    if (!s) return null;
                    if (s.split('.').length === 2) s = `${currentYear}.${s}`;
                    const date = new Date(s.replace(/\./g, '-') + 'T00:00:00');
                    return isNaN(date.getTime()) ? null : date.toISOString().split('T')[0];
                }).filter(d => d);
            };

            const stats = useMemo(() => {
                const res = {};
                TARGET_CLASSES.forEach(c => res[c] = { english: 0, science: 0, pe: 0, external: 0, externalLessons: [] });
                Object.values(overrides).forEach(v => {
                    if (v.status === 'held' && res[v.classLabel]) {
                        res[v.classLabel][v.type]++;
                        if (v.type === 'external' && v.title) {
                            if (!res[v.classLabel].externalLessons.some(l => l.title === v.title)) {
                                res[v.classLabel].externalLessons.push({ title: v.title, date: v.updatedAt });
                            }
                        }
                    }
                });
                return res;
            }, [overrides]);

            // 강사 수업 중복 제거 및 리스트 정렬
            const recentInstructorLessons = useMemo(() => {
                return Object.entries(overrides)
                    .filter(([key, val]) => val.type === 'external')
                    .map(([key, val]) => ({ key, ...val }))
                    .sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0))
                    .slice(0, 10);
            }, [overrides]);

            if (isLoading) return null;

            return (
                <div className="min-h-screen flex flex-col animate-in">
                    <header className="bg-white border-b px-4 py-1.5 flex flex-col lg:flex-row justify-between items-center gap-2 sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-900 p-1.5 rounded-lg text-white shadow-md"><SafeIcon name="ClipboardCheck" size={16} /></div>
                            <h1 className="text-sm font-black text-slate-800 tracking-tighter">전담 마크 <span className="text-indigo-600 italic">V5.6</span></h1>
                        </div>
                        <nav className="flex bg-slate-100 p-0.5 rounded-xl">
                            {[
                                { id: 'lessons', label: '시수 관리', icon: 'Calendar' },
                                { id: 'instructor', label: '강사 수업 등록', icon: 'Layers' },
                                { id: 'config', label: '전담 시간 등록', icon: 'Settings' },
                                { id: 'stats', label: '통계', icon: 'BarChart3' },
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                    <SafeIcon name={tab.icon} size={14} /> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="p-2 lg:p-4 max-w-7xl mx-auto w-full flex-1">
                        {/* 1. 시수 관리 탭 */}
                        {activeTab === 'lessons' && (
                            <div className="space-y-2">
                                <div className="flex justify-between items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => { const d = new Date(selectedDate + 'T00:00:00'); d.setDate(d.getDate()-1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-1.5 border rounded-lg hover:bg-slate-50"><SafeIcon name="ChevronLeft" /></button>
                                        <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="font-black text-slate-700 border-none bg-transparent focus:ring-0 cursor-pointer text-xs" />
                                        <button onClick={() => { const d = new Date(selectedDate + 'T00:00:00'); d.setDate(d.getDate()+1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-1.5 border rounded-lg hover:bg-slate-50"><SafeIcon name="ChevronRight" /></button>
                                    </div>
                                    <div className="flex bg-slate-100 p-0.5 rounded-lg">
                                        {['daily', 'weekly', 'monthly'].map(mode => (
                                            <button key={mode} onClick={() => setViewMode(mode)} className={`px-3 py-1 rounded-md text-[10px] font-black transition-all ${viewMode === mode ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>{mode === 'daily' ? '일별' : mode === 'weekly' ? '주별' : '월별'}</button>
                                        ))}
                                    </div>
                                </div>

                                {viewMode === 'daily' && (
                                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden animate-in">
                                        <div className="grid grid-cols-5 bg-slate-50 border-b">
                                            <div className="p-2 text-center text-[9px] font-black text-slate-300 uppercase tracking-widest">교시</div>
                                            {TARGET_CLASSES.map(c => <div key={c} className="p-2 text-center text-[11px] font-black text-slate-500 opacity-60 uppercase">5-{c}</div>)}
                                        </div>
                                        <div className="divide-y divide-slate-100">
                                            {PERIODS.map(p => (
                                                <div key={p} className="grid grid-cols-5 min-h-[85px]">
                                                    <div className="flex items-center justify-center bg-slate-50/20 border-r border-slate-100 font-black text-slate-200 text-3xl italic tracking-tighter">{p}</div>
                                                    {TARGET_CLASSES.map(cls => {
                                                        const data = getCellData(selectedDate, p, cls);
                                                        const spec = SPECIALISTS.find(s => s.id === data?.type);
                                                        return (
                                                            <div key={cls} onClick={() => { setSelectedCell(`${selectedDate}-${p}-${cls}`); setIsModalOpen(true); }} className={`p-2 border-r last:border-0 relative cursor-pointer group transition-all ${spec ? `${spec.bg} hover:brightness-95` : 'hover:bg-indigo-50/20'}`}>
                                                                {data?.isConflict && <div className="absolute top-1 right-1 text-rose-500 animate-pulse"><SafeIcon name="AlertTriangle" size={10}/></div>}
                                                                {spec ? (
                                                                    <div className="h-full flex flex-col justify-center">
                                                                        <div className={`text-[13px] font-black ${spec.text}`}>{spec.name}</div>
                                                                        {data.title && <div className="text-[8px] font-bold text-slate-400 truncate mt-0.5 italic leading-none">{data.title}</div>}
                                                                        {data.status === 'held' && <div className="mt-1 text-indigo-600"><SafeIcon name="CheckCircle2" size={13}/></div>}
                                                                    </div>
                                                                ) : (
                                                                    <div className="h-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><SafeIcon name="Plus" className="text-slate-100" size={18} /></div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {viewMode === 'weekly' && (
                                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-x-auto animate-in no-scrollbar">
                                        <table className="w-full border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b">
                                                    <th className="p-2 border-r w-14 text-[9px] font-black text-slate-300">교시</th>
                                                    {DAYS.map((d, i) => {
                                                        const curr = new Date(selectedDate + 'T00:00:00');
                                                        const first = curr.getDate() - ((curr.getDay() + 6) % 7);
                                                        const colDate = new Date(curr); colDate.setDate(first + i);
                                                        const dateStr = colDate.toISOString().split('T')[0];
                                                        return <th key={i} className="p-2 border-r min-w-[150px]">
                                                            <div className="text-[9px] text-slate-300 font-bold">{dateStr.split('-').slice(1).join('.')}</div>
                                                            <div className="font-black text-slate-600 text-xs">{d}요일</div>
                                                        </th>;
                                                    })}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {PERIODS.map(p => (
                                                    <tr key={p} className="border-b last:border-0">
                                                        <td className="p-3 bg-slate-50/20 border-r text-center font-black text-slate-200 text-2xl italic tracking-tighter">{p}</td>
                                                        {DAYS.map((_, i) => {
                                                            const curr = new Date(selectedDate + 'T00:00:00');
                                                            const first = curr.getDate() - ((curr.getDay() + 6) % 7);
                                                            const colDate = new Date(curr); colDate.setDate(first + i);
                                                            const dateStr = colDate.toISOString().split('T')[0];
                                                            return <td key={i} className="p-1 border-r last:border-0 align-top h-20">
                                                                <div className="space-y-0.5">
                                                                    {TARGET_CLASSES.map(cls => {
                                                                        const data = getCellData(dateStr, p, cls);
                                                                        const spec = SPECIALISTS.find(s => s.id === data?.type);
                                                                        if (!spec) return null;
                                                                        return <div key={cls} className={`p-1 rounded-md border text-[8px] font-bold truncate flex items-center justify-between ${spec.bg} ${spec.text} ${spec.border} shadow-sm`}>
                                                                            <span>{cls}: {spec.name}</span>
                                                                            {data.isConflict && <SafeIcon name="AlertTriangle" size={8} className="text-rose-500" />}
                                                                        </div>;
                                                                    })}
                                                                </div>
                                                            </td>;
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {viewMode === 'monthly' && (
                                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-2 animate-in">
                                        <div className="calendar-grid border-l border-t rounded-xl overflow-hidden shadow-inner bg-slate-50/10">
                                            {['일', '월', '화', '수', '목', '금', '토'].map((d, i) => (
                                                <div key={d} className={`p-2 bg-slate-50 border-r border-b text-center text-[9px] font-black ${i === 0 ? 'day-sun' : i === 6 ? 'day-sat' : 'text-slate-300'}`}>{d}</div>
                                            ))}
                                            {(() => {
                                                const d = new Date(selectedDate + 'T00:00:00');
                                                const firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
                                                const totalDays = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
                                                const cells = [];
                                                for(let i=0; i<firstDay; i++) cells.push(<div key={`empty-${i}`} className="p-2 border-r border-b bg-slate-50/5"></div>);
                                                for(let i=1; i<=totalDays; i++) {
                                                    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                                                    const dayOfWeek = new Date(dateStr + 'T00:00:00').getDay();
                                                    const isToday = dateStr === new Date().toISOString().split('T')[0];
                                                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                                                    const lessons = [];
                                                    TARGET_CLASSES.forEach(cls => {
                                                        PERIODS.forEach(p => {
                                                            const lesson = getCellData(dateStr, p, cls);
                                                            if (lesson && lesson.type) lessons.push({ cls, period: p, ...lesson });
                                                        });
                                                    });
                                                    cells.push(
                                                        <div key={i} onClick={() => {setSelectedDate(dateStr); setViewMode('daily');}} className={`p-1 border-r border-b min-h-[95px] transition-all hover:bg-indigo-50/20 cursor-pointer ${isWeekend ? 'bg-weekend' : 'bg-white'} ${isToday ? 'ring-2 ring-inset ring-indigo-100' : ''}`}>
                                                            <div className={`text-[10px] font-black mb-1 ${dayOfWeek === 0 ? 'day-sun' : dayOfWeek === 6 ? 'day-sat' : 'text-slate-300'}`}>{i}</div>
                                                            <div className="space-y-0.5">
                                                                {lessons.slice(0, 5).map((l, idx) => (
                                                                    <div key={idx} className={`text-[7px] font-bold truncate px-1 rounded-sm border flex items-center justify-between ${SPECIALISTS.find(s=>s.id===l.type)?.bg} ${SPECIALISTS.find(s=>s.id===l.type)?.text} ${SPECIALISTS.find(s=>s.id===l.type)?.border} shadow-sm`}>
                                                                        <span>{l.period} {l.cls}</span>
                                                                        {l.isConflict && <div className="w-1 h-1 bg-rose-500 rounded-full"></div>}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    );
                                                }
                                                return cells;
                                            })()}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 2. 강사 수업 등록 */}
                        {activeTab === 'instructor' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in">
                                <div className="lg:col-span-2 bg-amber-600 p-6 rounded-[2.5rem] shadow-xl text-white relative overflow-hidden h-fit">
                                    <div className="absolute -top-10 -right-10 opacity-10 rotate-12"><SafeIcon name="Layers" size={180}/></div>
                                    <h3 className="text-xl font-black mb-1 flex items-center gap-2 relative z-10 italic uppercase tracking-widest leading-none"><SafeIcon name="Layers" size={20}/> 강사 수업 등록</h3>
                                    <p className="text-amber-100 text-[10px] mb-8 font-medium relative z-10">연차시 수업이나 학년 공통 일정을 마크하세요.</p>
                                    <div className="space-y-6 relative z-10">
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black opacity-60 ml-1 uppercase tracking-widest">수업명</label>
                                                <input type="text" id="bulk-title" placeholder="수업제목" className="w-full p-3 rounded-2xl bg-white/10 border-none text-white placeholder-white/30 font-black focus:bg-white focus:text-slate-800 text-[12px] outline-none" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black opacity-60 ml-1 uppercase tracking-widest">대상 반</label>
                                                <select id="bulk-class" className="w-full p-3 rounded-2xl bg-white/20 border-none text-white font-black text-[12px] cursor-pointer outline-none relative z-20">
                                                    {TARGET_CLASSES.map(c => <option key={c} value={c} className="text-slate-800">{c}</option>)}
                                                    <option value="학년공통" className="text-slate-800">학년전체</option>
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black opacity-60 ml-1 uppercase tracking-widest">시작</label>
                                                <select id="bulk-start" className="w-full p-3 rounded-2xl bg-white/20 border-none text-white font-black text-[12px] cursor-pointer outline-none relative z-20">
                                                    {PERIODS.map(p => <option key={p} value={p} className="text-slate-800">{p}교시</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black opacity-60 ml-1 uppercase tracking-widest">종료</label>
                                                <select id="bulk-end" className="w-full p-3 rounded-2xl bg-white/20 border-none text-white font-black text-[12px] cursor-pointer outline-none relative z-20">
                                                    {PERIODS.map(p => <option key={p} value={p} className="text-slate-800">{p}교시</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black opacity-60 ml-1 uppercase italic tracking-widest">날짜 입력 (예: 3/20, 27 / 4.10 / 2024.5.15 등)</label>
                                            <textarea id="bulk-dates" placeholder="쉼표나 엔터로 구분해 여러 날짜를 입력하세요." className="w-full p-4 rounded-3xl bg-white/10 border-none text-white placeholder-white/30 font-black min-h-[100px] focus:bg-white focus:text-slate-800 text-[12px] outline-none"></textarea>
                                        </div>
                                        <button onClick={async () => {
                                            const title = document.getElementById('bulk-title').value.trim();
                                            const cls = document.getElementById('bulk-class').value;
                                            const startP = parseInt(document.getElementById('bulk-start').value);
                                            const endP = parseInt(document.getElementById('bulk-end').value);
                                            const datesRaw = document.getElementById('bulk-dates').value;
                                            const dates = parseSmartDates(datesRaw);
                                            
                                            if(!title || !cls || dates.length === 0) return alert("수업명과 날짜를 빠짐없이 입력하세요.");
                                            if(startP > endP) return alert("시작 교시가 종료 교시보다 클 수 없습니다.");

                                            setIsSaving(true);
                                            try {
                                                for(const d of dates) {
                                                    const classesToSave = cls === '학년공통' ? TARGET_CLASSES : [cls];
                                                    for(const singleCls of classesToSave) {
                                                        for(let i = startP; i <= endP; i++) {
                                                            await saveData('overrides', `${d}-${i}-${singleCls}`, { title, type: 'external', status: 'held', classLabel: singleCls });
                                                        }
                                                    }
                                                }
                                                alert("수업이 등록되었습니다.");
                                                document.getElementById('bulk-title').value = "";
                                                document.getElementById('bulk-dates').value = "";
                                            } catch (e) { alert("저장 실패: " + e.message); }
                                            setIsSaving(false);
                                        }} disabled={isSaving} className={`w-full py-5 bg-white text-amber-600 font-black rounded-3xl shadow-xl transition-all active:scale-[0.98] text-[15px] tracking-widest ${isSaving ? 'opacity-50 cursor-not-allowed' : 'hover:bg-amber-50'}`}>
                                            {isSaving ? 'Saving...' : '등록 실행 및 달력 반영'}
                                        </button>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 h-fit">
                                    <h4 className="text-sm font-black text-slate-800 mb-4 flex items-center gap-2 italic uppercase"><SafeIcon name="List" className="text-amber-500" /> 최근 등록 수업 관리</h4>
                                    <div className="space-y-3 max-h-[400px] overflow-y-auto custom-scrollbar pr-2">
                                        {recentInstructorLessons.map(lesson => (
                                            <div key={lesson.key} className="p-3 bg-slate-50 rounded-2xl flex justify-between items-center group border border-transparent hover:border-amber-100 transition-all">
                                                <div>
                                                    <div className="text-[11px] font-black text-slate-800 truncate max-w-[120px]">{lesson.title}</div>
                                                    <div className="text-[9px] text-slate-400 font-bold">{lesson.key.split('-').slice(0,3).join('.')} | {lesson.classLabel}</div>
                                                </div>
                                                <button onClick={async () => {
                                                    if(confirm("이 수업 기록을 삭제할까요?")) {
                                                        const { db, appId, deleteDoc, doc } = window.fb;
                                                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'overrides', lesson.key));
                                                    }
                                                }} className="p-2 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl opacity-0 group-hover:opacity-100 transition-all"><SafeIcon name="Trash2" size={14} /></button>
                                            </div>
                                        ))}
                                        {recentInstructorLessons.length === 0 && <div className="text-center py-10 text-xs text-slate-300 italic">등록된 수업이 없습니다.</div>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. 전담 시간 등록 */}
                        {activeTab === 'config' && (
                            <div className="space-y-4 animate-in max-w-5xl mx-auto overflow-hidden">
                                <div className="bg-indigo-600 p-6 rounded-[2.5rem] text-white flex flex-col lg:flex-row justify-between items-center gap-4 shadow-lg relative overflow-hidden">
                                    <div className="relative z-10 text-center lg:text-left">
                                        <h3 className="text-xl font-black mb-1 italic tracking-tighter uppercase leading-none">전담 시간표 설정</h3>
                                        <p className="opacity-80 text-[11px] font-medium">과목과 반을 선택하고 시간표를 클릭해 배치하세요.</p>
                                    </div>
                                    <div className="flex flex-col gap-2 relative z-10 w-full lg:w-auto items-end">
                                        <div className="flex gap-1 p-1 bg-white/10 rounded-2xl border border-white/10 no-scrollbar">
                                            {SPECIALISTS.filter(s=>s.id!=='external').map(s => (
                                                <button key={s.id} onClick={() => setSelectedSpec(s.id)} className={`px-5 py-2 rounded-xl font-black transition-all whitespace-nowrap text-[11px] ${selectedSpec === s.id ? 'bg-white text-indigo-600 shadow-md' : 'hover:bg-white/10'}`}>{s.name}</button>
                                            ))}
                                        </div>
                                        <div className="flex gap-2 w-full lg:w-auto">
                                            <input type="text" value={quickClass || ""} onChange={e => setQuickClass(e.target.value)} placeholder="학년/반 (예: 6-1)" className="flex-1 lg:w-32 p-2 rounded-xl bg-white/20 border-none text-white placeholder-white/30 font-black text-[12px] text-center focus:bg-white focus:text-slate-800 outline-none transition-all shadow-inner" />
                                            <button onClick={() => setQuickClass(null)} className={`px-5 py-2 rounded-xl font-black transition-all text-[12px] flex items-center gap-2 ${quickClass === null ? 'bg-rose-500 text-white shadow-lg' : 'bg-rose-500/20 text-white border border-rose-400/20'}`}><SafeIcon name="Eraser" size={14}/>지우기</button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden w-full">
                                    <table className="w-full border-collapse config-table">
                                        <thead><tr className="bg-slate-50 border-b"><th className="p-4 border-r text-[10px] font-black text-slate-300 uppercase tracking-widest">교시</th>{DAYS.map(d=><th key={d} className="p-4 border-r font-black text-slate-700 text-[15px] italic tracking-tighter">{d}요일</th>)}</tr></thead>
                                        <tbody>
                                            {PERIODS.map(p=>(
                                                <tr key={p} className="border-b last:border-0"><td className="p-4 bg-slate-50 border-r text-center font-black text-slate-200 text-5xl italic tracking-tighter leading-none">{p}</td>
                                                    {DAYS.map((_, dIdx)=>{
                                                        const key = `${dIdx}-${p}`;
                                                        const item = editingSchedule[key];
                                                        const isMine = item?.type === selectedSpec;
                                                        return (
                                                            <td key={dIdx} className="p-1 border-r last:border-0">
                                                                <button onClick={() => {
                                                                    if (quickClass === null) {
                                                                        const newSched = {...editingSchedule}; delete newSched[key]; setEditingSchedule(newSched);
                                                                    } else if (quickClass.trim() !== "") {
                                                                        setEditingSchedule({...editingSchedule, [key]: { type: selectedSpec, classLabel: quickClass }});
                                                                    }
                                                                }} className={`w-full p-2 border-2 border-dashed rounded-[2rem] transition-all flex flex-col items-center justify-center min-h-[90px] ${isMine ? 'bg-indigo-50 border-indigo-200 text-indigo-700 font-black shadow-inner' : (item ? 'border-slate-100 bg-slate-50/50 text-slate-300 text-[11px] italic leading-tight' : 'border-slate-50 text-slate-100')}`}>
                                                                    {isMine ? <span className="text-[16px] tracking-tighter">{item.classLabel}</span> : (item ? <span>({SPECIALISTS.find(s=>s.id===item.type)?.name})<br/>{item.classLabel}</span> : <SafeIcon name="Plus" size={24} />)}
                                                                </button>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="bg-white p-6 rounded-[3rem] border border-slate-200 shadow-sm flex flex-col lg:flex-row gap-8 items-center">
                                    <div className="flex-1 space-y-4 w-full">
                                        <h4 className="text-[18px] font-black text-slate-800 flex items-center gap-2 italic uppercase leading-none"><SafeIcon name="Save" className="text-indigo-600" size={20} /> 시간표 최종 저장 및 시수 반영</h4>
                                        <p className="text-[12px] text-slate-400 font-medium">아래 저장 버튼을 누르면 즉시 [시수 관리] 탭의 달력에 반영됩니다.</p>
                                        <button onClick={async () => {
                                            setIsSaving(true);
                                            const { db, appId, doc, setDoc, Timestamp } = window.fb;
                                            try {
                                                const promises = Object.entries(editingSchedule).map(([key, data]) => 
                                                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'base', key), { ...data, updatedAt: Timestamp.now() })
                                                );
                                                await Promise.all(promises);
                                                alert("저장 완료! 달력에 즉시 반영되었습니다.");
                                                setBaseSchedule(editingSchedule);
                                            } catch(e) { alert("저장 중 오류: " + e.message); }
                                            setIsSaving(false);
                                        }} disabled={isSaving} className={`w-full py-5 bg-slate-900 text-white rounded-[2rem] font-black text-[16px] shadow-2xl transition-all active:scale-[0.98] uppercase tracking-tighter ${isSaving ? 'opacity-50' : 'hover:bg-black hover:scale-[1.01]'}`}>
                                            {isSaving ? 'Synchronizing...' : '저장 및 달력에 즉시 반영'}
                                        </button>
                                    </div>
                                    <div className="w-full lg:w-72 space-y-3 pt-6 border-t lg:border-t-0 lg:border-l lg:pl-8 border-slate-100">
                                        <h5 className="text-[11px] font-black text-slate-400 uppercase tracking-widest leading-none mb-4 flex items-center gap-2"><SafeIcon name="BarChart3" size={14}/> 목표 시수 설정</h5>
                                        <div className="grid grid-cols-4 gap-3">
                                            {SPECIALISTS.map(s => (
                                                <div key={s.id} className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 ml-1 leading-none">{s.name}</label>
                                                    <input type="number" value={targetHours[s.id]} onChange={e => setTargetHours({...targetHours, [s.id]: parseInt(e.target.value)})} className="w-full p-2 rounded-xl bg-slate-50 border-none font-black text-indigo-600 text-[14px] text-center shadow-inner" />
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => { saveData('academic', 'targets', targetHours); alert("목표 시수가 저장되었습니다."); }} className="w-full py-2 bg-slate-100 text-slate-500 rounded-2xl font-black text-[11px] hover:bg-slate-200 mt-2 transition-all">설정 저장</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 4. 통계 탭 */}
                        {activeTab === 'stats' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in">
                                {TARGET_CLASSES.map(cls => (
                                    <div key={cls} className="bg-white p-8 rounded-[3rem] border border-slate-200 shadow-sm hover:shadow-xl transition-all duration-300 group">
                                        <h3 className="text-[18px] font-black mb-8 flex justify-between items-center text-slate-800 tracking-tighter uppercase italic leading-none">{cls} 시수 통계 <div className="opacity-10 group-hover:opacity-20 transition-opacity"><SafeIcon name="BarChart3" size={32} /></div></h3>
                                        <div className="space-y-8">
                                            {SPECIALISTS.filter(s=>s.id!=='external').map(spec => {
                                                const count = stats[cls]?.[spec.id] || 0;
                                                const target = targetHours[spec.id] || 30;
                                                const percent = Math.min((count / target) * 100, 100).toFixed(0);
                                                return (
                                                    <div key={spec.id} className="space-y-3">
                                                        <div className="flex justify-between items-end px-0.5">
                                                            <div className="flex items-center gap-2">
                                                                <div className={`w-3.5 h-3.5 rounded-full ${spec.color} shadow-sm`}></div>
                                                                <span className="font-bold text-slate-500 text-[14px]">{spec.name}</span>
                                                            </div>
                                                            <span className="font-black text-slate-900 text-3xl leading-none">{count} <span className="text-slate-300 font-bold text-[13px] tracking-tighter italic">/ {target}</span></span>
                                                        </div>
                                                        <div className="h-4 bg-slate-100 rounded-full overflow-hidden border-2 border-white shadow-inner">
                                                            <div className={`h-full ${spec.color} transition-all duration-1000 shadow-lg`} style={{ width: `${percent}%` }}></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            
                                            <div className="pt-6 border-t border-slate-50 space-y-4">
                                                <div className="flex justify-between items-center">
                                                    <div className="flex items-center gap-2">
                                                        <div className="w-3.5 h-3.5 rounded-full bg-amber-500 shadow-sm"></div>
                                                        <span className="font-bold text-slate-500 text-[14px]">강사 수업 누계</span>
                                                    </div>
                                                    <span className="font-black text-amber-600 text-3xl leading-none">{stats[cls]?.external || 0} <span className="text-slate-300 font-bold text-[12px] tracking-tighter italic">차시</span></span>
                                                </div>
                                                <div className="flex flex-wrap gap-2">
                                                    {stats[cls]?.externalLessons.map((l, i) => (
                                                        <span key={i} className="px-3 py-1 bg-amber-50 text-amber-700 text-[10px] font-black rounded-full border border-amber-100 italic shadow-sm">#{l.title}</span>
                                                    ))}
                                                    {stats[cls]?.externalLessons.length === 0 && <span className="text-[11px] text-slate-300 italic">진행된 수업이 없습니다.</span>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* 수업 체크 모달 */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-xs rounded-[4rem] p-10 shadow-2xl space-y-8 animate-in zoom-in-95">
                                <div className="text-center space-y-2">
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tighter italic leading-none">Status Update</h2>
                                    <p className="text-[11px] text-slate-400 font-extrabold uppercase tracking-[0.2em] mt-2">{selectedCell?.replace(/-/g, '.')}</p>
                                </div>
                                <div className="grid grid-cols-2 gap-5">
                                    <button onClick={() => {
                                        const parts = selectedCell.split('-');
                                        const [d, p, c] = [`${parts[0]}-${parts[1]}-${parts[2]}`, parseInt(parts[3]), parts[4]];
                                        const data = getCellData(d, p, c);
                                        if(data) saveData('overrides', selectedCell, { ...data, status: 'held', classLabel: c }).then(() => setIsModalOpen(false));
                                        else alert("시간표에 배정된 수업이 아닙니다.");
                                    }} className="p-10 bg-indigo-50 text-indigo-600 rounded-[3rem] border-2 border-indigo-100 font-black flex flex-col items-center gap-3 transition-all hover:bg-indigo-100 active:scale-95 shadow-lg shadow-indigo-100/50"><SafeIcon name="CheckCircle2" size={40}/>완료</button>
                                    <button onClick={() => {
                                        const parts = selectedCell.split('-');
                                        const [d, p, c] = [`${parts[0]}-${parts[1]}-${parts[2]}`, parseInt(parts[3]), parts[4]];
                                        const data = getCellData(d, p, c);
                                        if(data) saveData('overrides', selectedCell, { ...data, status: 'cancelled', classLabel: c }).then(() => setIsModalOpen(false));
                                        else setIsModalOpen(false);
                                    }} className="p-10 bg-rose-50 text-rose-600 rounded-[3rem] border-2 border-rose-100 font-black flex flex-col items-center gap-3 transition-all hover:bg-rose-100 active:scale-95 shadow-lg shadow-rose-100/50"><SafeIcon name="X" size={40}/>결손</button>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => { window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'overrides', selectedCell)); setIsModalOpen(false); }} className="flex-1 py-4 bg-slate-100 text-slate-400 rounded-2xl font-black hover:bg-slate-200 transition-all text-[11px] uppercase tracking-widest leading-none">Reset</button>
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-[11px] uppercase tracking-widest leading-none">Close</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 실시간 상태 표시바 */}
                    <div className="fixed bottom-6 right-6 flex items-center gap-2 bg-slate-900 text-white px-5 py-2.5 rounded-full shadow-2xl z-40 border border-white/10 backdrop-blur-md opacity-80 scale-90">
                        <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_8px_rgba(52,211,153,0.8)]"></div>
                        <span className="text-[10px] font-black tracking-widest uppercase leading-none italic">Cloud Active</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
