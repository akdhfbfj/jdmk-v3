<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전담 마크 Pro V7.7 - 지능형 시수 관리 시스템</title>
    
    <!-- 1. 스타일 및 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    
    <!-- 2. Firebase 설정 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore as getFS, doc as getD, setDoc as setD, getDoc as getDocD, collection as collD, onSnapshot as onS, deleteDoc as delD, Timestamp as TS, query as qD, orderBy as obD, limit as limD } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBWxSDDYkOtaZI9dByQ85A0izlrCmHEoIQ",
          authDomain: "jdmk-v2.firebaseapp.com",
          projectId: "jdmk-v2",
          storageBucket: "jdmk-v2.firebasestorage.app",
          messagingSenderId: "279087439497",
          appId: "1:279087439497:web:e7f19f6a911483248cb058",
          measurementId: "G-PH80PJW6TC"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFS(app);
            const appId = 'jdmk-v5-final'; 

            window.fb = { auth, db, appId, doc: getD, setDoc: setD, getDoc: getDocD, collection: collD, onSnapshot: onS, deleteDoc: delD, Timestamp: TS, signInAnonymously, onAuthStateChanged, query: qD, orderBy: obD, limit: limD };
            window.fbReady = true; 
        } catch (e) {
            window.fbError = e.message;
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top: 3px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
        
        .sidebar-in { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .btn-press:active { transform: scale(0.96); }
        .period-badge { display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; background: #334155; color: white; border-radius: 50%; font-size: 0.7rem; font-weight: 900; }
        .conflict-glow { box-shadow: 0 0 15px rgba(225, 29, 72, 0.2); border-color: #fb7185 !important; }
        .daily-period-label { font-size: 0.85rem; font-weight: 900; color: #64748b; margin-right: 4px; }
        
        .excel-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .excel-table th { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px; font-weight: 900; color: #475569; text-align: center; }
        .excel-table td { border: 1px solid #e2e8f0; padding: 8px; color: #1e293b; background: white; text-align: center; }
        .excel-table tr:nth-child(even) td { background: #f8fafc; }
        .search-input:focus { ring: 2px; ring-color: #4f46e5; outline: none; }

        .sidebar-shadow { box-shadow: -15px 0 35px rgba(0,0,0,0.08); }
        .transition-main { transition: padding-right 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white;">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-weight: 700; color: #4f46e5; font-size: 0.8rem;">전담 마크 Pro V7.7 로딩 중...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createElement } = React;

        const SafeIcon = ({ name, size = 16, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => {
                const check = setInterval(() => { if (window.lucide) { setReady(true); clearInterval(check); } }, 50);
                return () => clearInterval(check);
            }, []);
            if (!ready || !window.lucide?.icons[name]) return <div style={{width: size, height: size}} className={className} />;
            const iconData = window.lucide.icons[name];
            return createElement('svg', { ...iconData[1], width: size, height: size, className: className, key: name },
                iconData[2].map((child, i) => createElement(child[0], { ...child[1], key: i }))
            );
        };

        const DAYS = ['월', '화', '수', '목', '금'];
        const PERIODS = [1, 2, 3, 4, 5, 6];
        const CIRCLE_NUMS = ["", "①", "②", "③", "④", "⑤", "⑥", "⑦"];

        const SPECIALISTS = [
            { id: 'english', name: '영어', color: 'bg-indigo-600', text: 'text-indigo-700', bg: 'bg-indigo-50', border: 'border-indigo-200' },
            { id: 'science', name: '과학', color: 'bg-emerald-600', text: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200' },
            { id: 'pe', name: '체육', color: 'bg-rose-600', text: 'text-rose-700', bg: 'bg-rose-50', border: 'border-rose-200' },
            { id: 'external', name: '외부강사', color: 'bg-amber-600', text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [baseSchedule, setBaseSchedule] = useState({});
            const [overrides, setOverrides] = useState({});
            const [targetHours, setTargetHours] = useState({ english: 30, science: 30, pe: 30 });
            const [semesterConfig, setSemesterConfig] = useState({ s1Start: '2026-03-02', s1End: '2026-07-20', s2Start: '2026-08-20', s2End: '2026-12-30' });
            
            const [activeTab, setActiveTab] = useState('academic'); 
            const [viewMode, setViewMode] = useState('weekly'); 
            const [selectedDate, setSelectedDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [selectedCell, setSelectedCell] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            // 이동/조정 관리용 상태
            const [moveDate, setMoveDate] = useState("");
            const [movePeriod, setMovePeriod] = useState(1);
            const [activeMoveItem, setActiveMoveItem] = useState(null); 
            const [newRegMode, setNewRegMode] = useState('master'); // 'master' or 'custom'

            // 강사 수업 등록 폼 (일괄용)
            const [instTitle, setInstTitle] = useState("");
            const [instDates, setInstDates] = useState("");
            const [instClass, setInstClass] = useState("5-1");
            const [instStart, setInstStart] = useState(1);
            const [instEnd, setInstEnd] = useState(1);

            const [searchQuery, setSearchQuery] = useState("");

            // 전담 고정 시간표 등록용 (설정 탭용)
            const [fixedSpec, setFixedSpec] = useState("english");
            const [fixedClass, setFixedClass] = useState("5-1");
            const [fixedSlots, setFixedSlots] = useState([]); 

            const dynamicClasses = useMemo(() => {
                const classSet = new Set(['5-1', '5-2', '5-3', '5-4']); 
                Object.values(baseSchedule).forEach(v => { if(v.classLabel) classSet.add(v.classLabel); });
                Object.values(overrides).forEach(v => { if(v.classLabel) classSet.add(v.classLabel); });
                return Array.from(classSet).sort();
            }, [baseSchedule, overrides]);

            const currentGradeClasses = useMemo(() => {
                return dynamicClasses.filter(c => c.includes('-'));
            }, [dynamicClasses]);

            useEffect(() => {
                const checkInterval = setInterval(() => {
                    if (window.fbReady && window.fb) {
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        signInAnonymously(auth).catch(e => console.error(e));
                        onAuthStateChanged(auth, setUser);
                        clearInterval(checkInterval);
                    }
                }, 100);
                setTimeout(() => setIsLoading(false), 1500); 
                return () => clearInterval(checkInterval);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                const unsubs = [
                    onSnapshot(path('base'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setBaseSchedule(d);
                    }),
                    onSnapshot(path('overrides'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setOverrides(d);
                    }),
                    onSnapshot(path('academic'), (s) => {
                        s.docs.forEach(doc => { 
                            if (doc.id === 'targets') setTargetHours(doc.data()); 
                            if (doc.id === 'semesters') setSemesterConfig(doc.data());
                        });
                    })
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            const saveData = async (coll, id, data) => {
                const { db, appId, doc, setDoc, Timestamp } = window.fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coll, id), { ...data, updatedAt: Timestamp.now() });
            };

            const getMonday = (dateStr) => {
                const date = new Date(dateStr + 'T00:00:00');
                const day = date.getDay();
                const diff = date.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(date.setDate(diff));
                return monday.toLocaleDateString('en-CA');
            };

            const getCellData = (dateStr, period, classLabel) => {
                const overrideKey = `${dateStr}-${period}-${classLabel}`;
                const date = new Date(dateStr + 'T00:00:00'); 
                const dayIdx = (date.getDay() + 6) % 7; 
                
                const override = overrides[overrideKey];
                const baseMatch = Object.entries(baseSchedule).find(([k,v]) => 
                    v.dayIdx === dayIdx && v.period === period && v.classLabel === classLabel
                );
                
                return {
                    override: override || null,
                    base: baseMatch ? { id: baseMatch[0], ...baseMatch[1] } : null,
                    isConflict: !!(override && baseMatch)
                };
            };

            const stats = useMemo(() => {
                const res = {};
                currentGradeClasses.forEach(c => {
                    res[c] = { 
                        s1: { english: 0, science: 0, pe: 0, external: 0, history: [] },
                        s2: { english: 0, science: 0, pe: 0, external: 0, history: [] }
                    };
                });
                
                Object.entries(overrides).forEach(([key, v]) => {
                    if (v && res[v.classLabel]) {
                        const datePart = key.split('-').slice(0,3).join('-');
                        let semester = null;
                        if (datePart >= semesterConfig.s1Start && datePart <= semesterConfig.s1End) semester = 's1';
                        else if (datePart >= semesterConfig.s2Start && datePart <= semesterConfig.s2End) semester = 's2';
                        
                        if (semester) {
                            res[v.classLabel][semester][v.type]++;
                            if (v.type === 'external') {
                                res[v.classLabel][semester].history.push({ date: datePart.replace(/-/g, '.'), period: key.split('-')[3], title: v.title });
                            }
                        }
                    }
                });
                
                Object.keys(res).forEach(c => {
                    res[c].s1.history.sort((a,b) => new Date(a.date) - new Date(b.date)); 
                    res[c].s2.history.sort((a,b) => new Date(a.date) - new Date(b.date));
                });

                return res;
            }, [overrides, currentGradeClasses, semesterConfig]);

            const parseSmartDates = (input) => {
                if (!input) return [];
                const currentYear = new Date().getFullYear();
                return input.split(/[,|\n\s]+/).map(d => {
                    let s = d.trim().replace(/\//g, '.');
                    if (!s) return null;
                    const parts = s.split('.');
                    let formatted = "";
                    if (parts.length === 2) formatted = `${currentYear}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
                    else if (parts.length === 3) formatted = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
                    const date = new Date(formatted + 'T00:00:00');
                    return isNaN(date.getTime()) ? null : date.toLocaleDateString('en-CA');
                }).filter(d => d);
            };

            const formatHeaderDate = (dateStr) => {
                const date = new Date(dateStr + 'T00:00:00');
                const week = ['일', '월', '화', '수', '목', '금', '토'][date.getDay()];
                return `${date.getFullYear()}년 ${String(date.getMonth() + 1).padStart(2,'0')}월 ${String(date.getDate()).padStart(2,'0')}일 (${week}요일)`;
            };

            if (isLoading) return null;

            return (
                <div className="min-h-screen flex flex-col animate-in relative overflow-x-hidden transition-main" style={{ paddingRight: isSidebarOpen ? '420px' : '0' }}>
                    <header className="bg-white border-b px-4 py-2 flex flex-col lg:flex-row justify-between items-center gap-2 sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-900 p-2 rounded-xl text-white shadow-md"><SafeIcon name="ClipboardCheck" size={18} /></div>
                            <h1 className="text-sm font-black text-slate-800 tracking-tighter">전담 마크 <span className="text-indigo-600 italic">V7.7 Pro</span></h1>
                        </div>
                        <nav className="flex bg-slate-100 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                            {[
                                { id: 'academic', label: '학사 일정 확인', icon: 'Calendar' },
                                { id: 'instructor', label: '강사 수업 등록', icon: 'Layers' },
                                { id: 'config', label: '전담 시간 등록', icon: 'Settings' },
                                { id: 'stats', label: '시수 통계', icon: 'BarChart3' },
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl text-[11px] font-bold transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <SafeIcon name={tab.icon} size={14} /> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="p-2 lg:p-4 max-w-[1600px] mx-auto w-full flex-1">
                        {/* 1. 학사 일정 확인 */}
                        {activeTab === 'academic' && (
                            <div className="space-y-4">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-3 bg-white p-4 rounded-[2.5rem] shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-1">
                                        <button onClick={() => { 
                                            const d = new Date(selectedDate + 'T00:00:00'); 
                                            if (viewMode === 'monthly') d.setMonth(d.getMonth() - 1);
                                            else d.setDate(d.getDate() - (viewMode === 'weekly' ? 7 : 1)); 
                                            setSelectedDate(new Date(d).toLocaleDateString('en-CA')); 
                                        }} className="p-3 border rounded-2xl hover:bg-slate-50 transition-all btn-press"><SafeIcon name="ChevronLeft" size={20} /></button>
                                        
                                        <div className="relative group cursor-pointer flex items-center px-4 py-2 bg-slate-50 rounded-2xl border border-transparent hover:border-indigo-200 transition-all">
                                            <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="w-full h-full opacity-0 absolute inset-0 cursor-pointer z-20" />
                                            <span className="text-sm font-black text-slate-700 z-10">{selectedDate}</span>
                                            <SafeIcon name="Calendar" size={14} className="ml-2 text-indigo-400 z-10" />
                                        </div>

                                        <button onClick={() => { 
                                            const d = new Date(selectedDate + 'T00:00:00'); 
                                            if (viewMode === 'monthly') d.setMonth(d.getMonth() + 1);
                                            else d.setDate(d.getDate() + (viewMode === 'weekly' ? 7 : 1)); 
                                            setSelectedDate(new Date(d).toLocaleDateString('en-CA')); 
                                        }} className="p-3 border rounded-2xl hover:bg-slate-50 transition-all btn-press"><SafeIcon name="ChevronRight" size={20} /></button>
                                    </div>

                                    <div className="text-center">
                                        <div className="text-xl font-black text-slate-800 tracking-tighter italic drop-shadow-sm">{formatHeaderDate(selectedDate)}</div>
                                    </div>

                                    <div className="flex bg-slate-100 p-1 rounded-2xl">
                                        {['daily', 'weekly', 'monthly'].map(mode => (
                                            <button key={mode} onClick={() => setViewMode(mode)} className={`px-5 py-2 rounded-xl text-[11px] font-black transition-all ${viewMode === mode ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>{mode === 'daily' ? '일별' : mode === 'weekly' ? '주별' : '월별'}</button>
                                        ))}
                                    </div>
                                </div>

                                {viewMode === 'weekly' && (
                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-x-auto animate-in no-scrollbar">
                                        <table className="w-full border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b">
                                                    <th className="p-4 border-r w-16 text-[10px] font-black text-slate-300 uppercase tracking-widest">교시</th>
                                                    {DAYS.map((d, i) => {
                                                        const mondayStr = getMonday(selectedDate);
                                                        const colDate = new Date(mondayStr + 'T00:00:00');
                                                        colDate.setDate(colDate.getDate() + i);
                                                        const dateStr = new Date(colDate).toLocaleDateString('en-CA');
                                                        const isToday = dateStr === new Date().toLocaleDateString('en-CA');
                                                        return <th key={i} className={`p-4 border-r min-w-[180px] ${isToday ? 'bg-indigo-50/30' : ''}`}>
                                                            <div className="text-[10px] text-slate-300 font-bold">{dateStr.split('-').slice(1).join('.')}</div>
                                                            <div className={`font-black text-sm ${isToday ? 'text-indigo-600' : 'text-slate-700'}`}>{d}요일</div>
                                                        </th>;
                                                    })}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {PERIODS.map(p => (
                                                    <tr key={p} className="border-b last:border-0">
                                                        <td className="p-4 border-r bg-slate-50/20 text-center font-black text-slate-200 text-3xl italic tracking-tighter">{p}</td>
                                                        {DAYS.map((_, i) => {
                                                            const mondayStr = getMonday(selectedDate);
                                                            const colDate = new Date(mondayStr + 'T00:00:00');
                                                            colDate.setDate(colDate.getDate() + i);
                                                            const dateStr = new Date(colDate).toLocaleDateString('en-CA');
                                                            return <td key={i} className="p-2 border-r last:border-0 align-top h-24">
                                                                <div className="space-y-1">
                                                                    {currentGradeClasses.map(cls => {
                                                                        const cell = getCellData(dateStr, p, cls);
                                                                        const activeItem = cell.override || cell.base;
                                                                        if (!activeItem) return null;
                                                                        const spec = SPECIALISTS.find(s => s.id === (activeItem.type));
                                                                        
                                                                        return <div key={cls} onClick={() => { setSelectedDate(dateStr); setViewMode('daily'); }} className={`p-1.5 rounded-lg border text-[10px] font-bold truncate flex items-center justify-between cursor-pointer transition-all hover:scale-[1.02] ${spec?.bg} ${spec?.text} ${spec?.border} shadow-sm ${cell.isConflict ? 'conflict-glow ring-1 ring-rose-400' : ''}`}>
                                                                            <span className="flex items-center gap-1">
                                                                                <span className="period-badge bg-slate-400">{CIRCLE_NUMS[p]}</span>
                                                                                {cls} {activeItem.title || spec?.name}
                                                                            </span>
                                                                            {cell.isConflict && <SafeIcon name="AlertTriangle" size={12} className="text-rose-600 animate-pulse" />}
                                                                        </div>;
                                                                    })}
                                                                </div>
                                                            </td>;
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {viewMode === 'daily' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 animate-in">
                                        {currentGradeClasses.map(cls => (
                                            <div key={cls} className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                                                <div className="bg-slate-50 p-4 border-b text-center font-black text-slate-700 uppercase tracking-widest text-sm">{cls}</div>
                                                <div className="p-3 space-y-3">
                                                    {PERIODS.map(p => {
                                                        const cell = getCellData(selectedDate, p, cls);
                                                        const specBase = SPECIALISTS.find(s => s.id === cell.base?.type);
                                                        const specOverride = SPECIALISTS.find(s => s.id === cell.override?.type);

                                                        return (
                                                            <div key={p} className={`rounded-[1.5rem] border-2 transition-all min-h-[90px] flex overflow-hidden relative ${cell.isConflict ? 'conflict-glow border-rose-100 ring-2 ring-rose-300' : 'bg-slate-50/40 border-transparent hover:border-indigo-100 hover:bg-white'}`}>
                                                                <div className="absolute top-2 left-3 flex items-center z-10 pointer-events-none">
                                                                    <span className="daily-period-label">{p}</span>
                                                                </div>
                                                                
                                                                {cell.isConflict ? (
                                                                    <div className="w-full flex">
                                                                        <div onClick={() => { setSelectedCell(`${selectedDate}-${p}-${cls}`); setActiveMoveItem('base'); setIsSidebarOpen(true); }} className={`flex-1 flex flex-col justify-center items-center p-2 border-r cursor-pointer hover:brightness-95 transition-all ${specBase?.bg} ${specBase?.text} opacity-70`}>
                                                                            <span className="text-[10px] font-black opacity-50 mb-1 uppercase">전담 마스터</span>
                                                                            <span className="text-[11px] font-black">{specBase?.name}</span>
                                                                        </div>
                                                                        <div onClick={() => { setSelectedCell(`${selectedDate}-${p}-${cls}`); setActiveMoveItem('override'); setIsSidebarOpen(true); }} className={`flex-1 flex flex-col justify-center items-center p-2 cursor-pointer hover:brightness-95 transition-all ${specOverride?.bg} ${specOverride?.text}`}>
                                                                            <span className="text-[10px] font-black opacity-50 mb-1 uppercase">등록 수업</span>
                                                                            <span className="text-[11px] font-black truncate w-full text-center">{cell.override?.title || specOverride?.name}</span>

                                            {/* 1. 현재 수업 정보 확인 및 유형 인지 */}
                                            <div className="space-y-4">
                                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none italic border-l-2 border-indigo-500 pl-2">Selection Status</h3>
                                                {cellData.override || cellData.base ? (
                                                    <div className="grid grid-cols-1 gap-3">
                                                        {cellData.base && (
                                                            <div onClick={() => setActiveMoveItem('base')} className={`p-5 rounded-3xl border-2 transition-all cursor-pointer ${activeMoveItem === 'base' ? 'border-indigo-600 ring-4 ring-indigo-50 shadow-lg scale-102' : 'border-slate-100 opacity-60'} ${SPECIALISTS.find(s=>s.id===cellData.base.type)?.bg} flex flex-col relative`}>
                                                                {activeMoveItem === 'base' && <div className="absolute top-4 right-4 text-indigo-600 bg-white p-1 rounded-full shadow-md"><SafeIcon name="Check" size={12}/></div>}
                                                                <span className="text-[9px] font-black opacity-50 uppercase mb-1">Master specialist (고정 전담)</span>
                                                                <span className={`text-[15px] font-black ${SPECIALISTS.find(s=>s.id===cellData.base.type)?.text}`}>{SPECIALISTS.find(s=>s.id===cellData.base.type)?.name}</span>
                                                            </div>
                                                        )}
                                                        {cellData.override && (
                                                            <div onClick={() => setActiveMoveItem('override')} className={`p-5 rounded-3xl border-2 transition-all cursor-pointer ${activeMoveItem === 'override' || !activeMoveItem ? 'border-indigo-600 ring-4 ring-indigo-50 shadow-lg scale-102' : 'border-slate-100 opacity-60'} ${SPECIALISTS.find(s=>s.id===cellData.override.type)?.bg} flex flex-col relative`}>
                                                                {(activeMoveItem === 'override' || !activeMoveItem) && <div className="absolute top-4 right-4 text-indigo-600 bg-white p-1 rounded-full shadow-md"><SafeIcon name="Check" size={12}/></div>}
                                                                <span className="text-[9px] font-black opacity-50 uppercase mb-1">Override entry (강사/기타 수업)</span>
                                                                <span className={`text-[15px] font-black ${SPECIALISTS.find(s=>s.id===cellData.override.type)?.text}`}>{cellData.override.title || SPECIALISTS.find(s=>s.id===cellData.override.type)?.name}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                ) : (
                                                    <div className="p-8 border-2 border-dashed border-slate-100 rounded-[2.5rem] flex flex-col items-center justify-center text-center space-y-3 bg-slate-50/20">
                                                        <div className="bg-white p-4 rounded-3xl text-slate-200 shadow-sm border"><SafeIcon name="Inbox" size={32}/></div>
                                                        <div className="space-y-1">
                                                            <p className="text-[12px] font-black text-slate-500 italic leading-none">이 시간에는 등록된 수업이 없습니다.</p>
                                                            <p className="text-[10px] font-bold text-slate-300">새로운 수업을 아래에서 추가하세요.</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>

                                            {/* 2. 스케줄 조정/등록 로직 */}
                                            <div className="space-y-4">
                                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none italic border-l-2 border-indigo-500 pl-2">Schedule Action</h3>
                                                <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-6">
                                                    
                                                    {currentItem ? (
                                                        <>
                                                            {/* 기존 수업 이동 UI */}
                                                            <div className="flex items-center gap-4 py-3 bg-slate-50/50 rounded-2xl px-4 border border-dashed border-slate-100">
                                                                <div className="text-center">
                                                                    <div className="text-[9px] font-black text-slate-300 uppercase">From</div>
                                                                    <div className="text-[11px] font-black text-slate-700">{dateStr.split('-').slice(1).join('.')} ({p})</div>
                                                                </div>
                                                                <SafeIcon name="ArrowRight" className="text-indigo-400 mx-auto" size={16}/>
                                                                <div className="text-center">
                                                                    <div className="text-[9px] font-black text-indigo-300 uppercase">Target</div>
                                                                    <div className="text-[11px] font-black text-indigo-600">{mD.split('-').slice(1).join('.')} ({mP})</div>
                                                                </div>
                                                            </div>
                                                            <div className="space-y-4">
                                                                <div className="grid grid-cols-2 gap-3">
                                                                    <div className="space-y-1">
                                                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-1">날짜</label>
                                                                        <input type="date" value={mD} onChange={e => setMoveDate(e.target.value)} className="w-full p-3.5 rounded-xl bg-slate-50 border-none font-black text-slate-800 shadow-inner outline-none focus:ring-2 focus:ring-indigo-100 text-[13px]" />
                                                                    </div>
                                                                    <div className="space-y-1">
                                                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-1">교시</label>
                                                                        <select value={mP} onChange={e => setMovePeriod(parseInt(e.target.value))} className="w-full p-3.5 rounded-xl bg-slate-50 border-none font-black text-slate-800 shadow-inner outline-none text-[13px]">
                                                                            {PERIODS.map(n => <option key={n} value={n}>{n}교시</option>)}
                                                                        </select>
                                                                    </div>
                                                                </div>

                                                                {isJeondamConflict ? (
                                                                    <div className="flex items-center gap-2 p-4 rounded-2xl border bg-rose-50 border-rose-100 text-rose-600">
                                                                        <SafeIcon name="AlertCircle" size={16}/>
                                                                        <span className="text-[11px] font-black tracking-tighter leading-none">전담 마스터 수업과 겹쳐서 이동 불가합니다.</span>
                                                                    </div>
                                                                ) : isInstructorConflict ? (
                                                                    <div className="flex items-center gap-2 p-4 rounded-2xl border bg-amber-50 border-amber-100 text-amber-600">
                                                                        <SafeIcon name="AlertTriangle" size={16}/>
                                                                        <span className="text-[11px] font-black tracking-tighter leading-none">강사 수업과 겹칩니다. (덮어쓰기 예정)</span>
                                                                    </div>
                                                                ) : (
                                                                    <div className="flex items-center gap-2 p-4 rounded-2xl border bg-emerald-50 border-emerald-100 text-emerald-600">
                                                                        <SafeIcon name="CheckCircle2" size={16}/>
                                                                        <span className="text-[11px] font-black tracking-tighter leading-none">수업을 조정할 수 있는 빈 시간입니다.</span>
                                                                    </div>
                                                                )}

                                                                <button 
                                                                    disabled={isJeondamConflict}
                                                                    onClick={async () => {
                                                                        if(isJeondamConflict) return;
                                                                        if(!confirm(`${formatHeaderDate(mD)} ${mP}교시로 수업을 이동하시겠습니까?`)) return;
                                                                        setIsSaving(true);
                                                                        try {
                                                                            const lessonData = { 
                                                                                title: currentItem.title || "", 
                                                                                type: currentItem.type, 
                                                                                status: 'held', 
                                                                                classLabel: cls 
                                                                            };
                                                                            // 기존 Override면 삭제
                                                                            if (activeMoveItem === 'override' || cellData.override) {
                                                                                await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'overrides', selectedCell));
                                                                            }
                                                                            // 새 위치에 Override로 저장 (마스터 이동도 일시적 조정이므로 Override 처리)
                                                                            await saveData('overrides', `${mD}-${mP}-${cls}`, lessonData);
                                                                            setIsSidebarOpen(false); setMoveDate(""); setMovePeriod(null); setActiveMoveItem(null);
                                                                        } catch(e) { alert("조정 오류: " + e.message); }
                                                                        setIsSaving(false);
                                                                    }} 
                                                                    className={`w-full py-5 rounded-[1.8rem] font-black text-[14px] shadow-xl transition-all btn-press ${isJeondamConflict ? 'bg-slate-100 text-slate-300 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                                                                    {isJeondamConflict ? '이동 불가' : '이 위치로 수업 조정 완료'}
                                                                </button>
                                                            </div>
                                                        </>
                                                    ) : (
                                                        <div className="space-y-6">
                                                            {/* 빈칸 수업 등록 UI: 마스터 vs 일반 분리 */}
                                                            <div className="flex bg-slate-100 p-1 rounded-2xl">
                                                                <button onClick={() => setNewRegMode('master')} className={`flex-1 py-2.5 rounded-xl text-[11px] font-black transition-all ${newRegMode === 'master' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>전담 마스터 등록</button>
                                                                <button onClick={() => setNewRegMode('custom')} className={`flex-1 py-2.5 rounded-xl text-[11px] font-black transition-all ${newRegMode === 'custom' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>일반 수업 등록</button>
                                                            </div>

                                                            {newRegMode === 'master' ? (
                                                                <div className="space-y-4 animate-in">
                                                                    <div className="space-y-1">
                                                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Select Specialist</label>
                                                                        <select id="new-master-type" className="w-full p-4 rounded-2xl bg-slate-50 border-none font-black text-slate-800 shadow-inner outline-none">
                                                                            {SPECIALISTS.filter(s=>s.id!=='external').map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                                                        </select>
                                                                    </div>
                                                                    <p className="text-[10px] text-slate-400 font-bold italic text-center py-2 px-4 leading-relaxed bg-slate-50/50 rounded-xl">전담 마스터 등록 시 별도의 명칭 입력 없이 해당 과목의 기본 시간표(`base`)로 저장됩니다.</p>
                                                                    <button onClick={async () => {
                                                                        const type = document.getElementById('new-master-type').value;
                                                                        const date = new Date(dateStr + 'T00:00:00');
                                                                        const dayIdx = (date.getDay() + 6) % 7;
                                                                        const key = `${dayIdx}-${p}-${type}-${cls}`;
                                                                        setIsSaving(true);
                                                                        await saveData('base', key, { dayIdx, period: p, type, classLabel: cls });
                                                                        setIsSaving(false); setIsSidebarOpen(false);
                                                                    }} className="w-full py-5 bg-indigo-600 text-white rounded-[1.8rem] font-black text-[14px] shadow-xl active:scale-95 transition-all">전담 마스터로 저장</button>
                                                                </div>
                                                            ) : (
                                                                <div className="space-y-4 animate-in">
                                                                    <div className="space-y-1">
                                                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Lesson Title</label>
                                                                        <input type="text" placeholder="예: 창체 한자, 스포츠클럽 등" id="new-custom-title" className="w-full p-4 rounded-2xl bg-slate-50 border-none font-black text-slate-800 shadow-inner outline-none" />
                                                                    </div>
                                                                    <div className="space-y-1">
                                                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Category</label>
                                                                        <select id="new-custom-type" className="w-full p-4 rounded-2xl bg-slate-50 border-none font-black text-slate-800 shadow-inner outline-none">
                                                                            {SPECIALISTS.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                                                        </select>
                                                                    </div>
                                                                    <button onClick={async () => {
                                                                        const title = document.getElementById('new-custom-title').value;
                                                                        const type = document.getElementById('new-custom-type').value;
                                                                        if(!title) return alert("수업명을 입력하세요.");
                                                                        setIsSaving(true);
                                                                        await saveData('overrides', selectedCell, { title, type, status: 'held', classLabel: cls });
                                                                        setIsSaving(false); setIsSidebarOpen(false);
                                                                    }} className="w-full py-5 bg-slate-900 text-white rounded-[1.8rem] font-black text-[14px] shadow-xl active:scale-95 transition-all">현재 자리에 수업 등록</button>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                        {/* 사이드바 푸터 */}
                                        <div className="p-8 border-t bg-slate-50/50 space-y-3">
                                            {(activeMoveItem === 'override' || (cellData.override && !activeMoveItem)) && (
                                                <button onClick={async () => {
                                                    if(confirm("이 강사/일반 수업 기록을 완전히 삭제하시겠습니까?")) {
                                                        const { db, appId, deleteDoc, doc } = window.fb;
                                                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'overrides', selectedCell));
                                                        setIsSidebarOpen(false);
                                                    }
                                                }} className="w-full py-4 bg-white text-rose-500 font-black rounded-2xl hover:bg-rose-50 transition-all text-[12px] uppercase tracking-widest border border-rose-100 flex items-center justify-center gap-2">
                                                    <SafeIcon name="Trash2" size={14}/> Reset Current Override
                                                </button>
                                            )}
                                            {activeMoveItem === 'base' && (
                                                <p className="text-[10px] text-slate-400 font-bold text-center py-2 px-4 italic bg-white/50 rounded-xl mb-2">마스터 수업은 `설정` 탭 혹은 하단 마스터 관리에서 삭제할 수 있습니다.</p>
                                            )}
                                            <button onClick={() => { setIsSidebarOpen(false); setMoveDate(""); setMovePeriod(null); setActiveMoveItem(null); }} className="w-full py-4 bg-slate-200 text-slate-500 font-black rounded-2xl transition-all text-[12px] uppercase tracking-widest active:scale-98">Close Editor</button>
                                        </div>
                                    </>
                                );
                            })()}
                        </div>
                    )}

                    {/* V7.7 마스터 시간표 에디터 (Config 탭 전용이었던 것을 하단에 상시 배치 가능하도록 구조화) */}
                    {activeTab === 'config' && (
                        <div className="max-w-[1600px] mx-auto w-full p-4 mt-10">
                            <div className="bg-white rounded-[3rem] border border-slate-200 shadow-sm overflow-hidden">
                                <div className="p-8 border-b bg-slate-50 flex items-center justify-between">
                                    <h4 className="text-lg font-black text-slate-800 italic uppercase tracking-tighter flex items-center gap-2"><SafeIcon name="Table" className="text-indigo-50"/> 전담 시간표 마스터 관리 (삭제 전용)</h4>
                                    <div className="text-[10px] font-black text-slate-300 uppercase tracking-widest italic">Central Master Database</div>
                                </div>
                                <div className="overflow-x-auto p-4">
                                    <table className="w-full border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50 border-b">
                                                <th className="p-4 border-r w-20 text-[11px] font-black text-slate-300">교시</th>
                                                {DAYS.map(d => <th key={d} className="p-4 border-r font-black text-slate-700 text-sm italic">{d}요일</th>)}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {PERIODS.map(p => (
                                                <tr key={p} className="border-b last:border-0">
                                                    <td className="p-5 bg-slate-50 border-r text-center font-black text-slate-200 text-5xl italic tracking-tighter">{p}</td>
                                                    {DAYS.map((_, dIdx) => {
                                                        const cellItems = Object.entries(baseSchedule)
                                                            .filter(([k, v]) => v.dayIdx === dIdx && v.period === p)
                                                            .map(([key, item]) => ({ key, ...item }));
                                                        return (
                                                            <td key={dIdx} className="p-2 border-r last:border-0 align-top h-32 bg-white/50">
                                                                <div className="flex flex-col gap-1.5 h-full min-h-[100px] border border-dashed border-slate-100 rounded-xl p-1">
                                                                    {cellItems.map((item, idx) => {
                                                                        const spec = SPECIALISTS.find(s=>s.id===item.type);
                                                                        return (
                                                                            <div key={idx} className={`group relative p-2 rounded-xl border text-[10px] font-black transition-all ${spec?.bg} ${spec?.text} ${spec?.border} shadow-sm truncate`}>
                                                                                {spec?.name}: {item.classLabel}
                                                                                <button 
                                                                                    onClick={async () => {
                                                                                        if(confirm(`[${spec?.name}: ${item.classLabel}] 마스터 데이터를 삭제할까요?`)) {
                                                                                            const { db, appId, deleteDoc, doc } = window.fb;
                                                                                            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'base', item.key));
                                                                                        }
                                                                                    }} 
                                                                                    className="absolute top-1 right-1 opacity-0 group-hover:opacity-100 transition-opacity bg-white/90 rounded p-1 text-rose-500 shadow-sm"
                                                                                >
                                                                                    <SafeIcon name="Trash2" size={10}/>
                                                                                </button>
                                                                            </div>
                                                                        );
                                                                    })}
                                                                    {cellItems.length === 0 && <div className="text-[9px] text-slate-200 italic font-bold text-center mt-8">Empty</div>}
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-6 left-6 flex items-center gap-3 bg-slate-900 text-white px-5 py-3 rounded-full shadow-2xl z-[110] border border-white/10 backdrop-blur-md opacity-90 hover:opacity-100 transition-opacity scale-90">
                        <div className="w-2.5 h-2.5 bg-indigo-400 rounded-full animate-pulse shadow-[0_0_10px_rgba(129,140,248,1)]"></div>
                        <span className="text-[10px] font-black tracking-widest uppercase leading-none italic">Intelligence V7.7 Global Hub</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
