<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전담 마크 Pro V4.3 - 통합 시수 관리 시스템</title>
    
    <!-- 1. 스타일 및 라이브러리 (버전 고정으로 안정성 확보) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    
    <!-- 2. Firebase 설정 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBWxSDDYkOtaZI9dByQ85A0izlrCmHEoIQ",
          authDomain: "jdmk-v2.firebaseapp.com",
          projectId: "jdmk-v2",
          storageBucket: "jdmk-v2.firebasestorage.app",
          messagingSenderId: "279087439497",
          appId: "1:279087439497:web:e7f19f6a911483248cb058",
          measurementId: "G-PH80PJW6TC"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = 'jdmk-v4-final';

            window.fb = { auth, db, appId, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, Timestamp, signInAnonymously, onAuthStateChanged };
            window.fbReady = true; 
        } catch (e) {
            window.fbError = e.message;
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { width: 44px; height: 44px; border: 5px solid #f1f5f9; border-top: 5px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white;">
            <div class="spinner"></div>
            <p style="margin-top: 24px; font-weight: 900; color: #4f46e5; font-size: 1.1rem;">전담 마크 Pro V4.3 시스템 시동 중...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createElement } = React;

        // 에러가 발생했던 아이콘 로직을 수정한 안전한 컴포넌트
        const SafeIcon = ({ name, size = 20, className = "" }) => {
            const [ready, setReady] = useState(false);
            
            useEffect(() => {
                const check = setInterval(() => {
                    if (window.lucide) { setReady(true); clearInterval(check); }
                }, 100);
                return () => clearInterval(check);
            }, []);

            if (!ready || !window.lucide || !window.lucide.icons) {
                return <div style={{width: size, height: size}} className={className} />;
            }

            const iconData = window.lucide.icons[name];
            if (!iconData) return <div style={{width: size, height: size}} className={className} />;

            // 비정상적인 객체 구조 분해 에러 방지를 위해 인덱스로 직접 접근
            const tag = iconData[0];
            const attrs = iconData[1];
            const children = iconData[2];

            return createElement(
                'svg',
                {
                    ...attrs,
                    width: size,
                    height: size,
                    className: className,
                    key: name
                },
                children.map((child, i) => createElement(child[0], { ...child[1], key: i }))
            );
        };

        const DAYS = ['월', '화', '수', '목', '금'];
        const PERIODS = [1, 2, 3, 4, 5, 6];
        const TARGET_CLASSES = ['1반', '2반', '3반', '4반'];
        const SPECIALISTS = [
            { id: 'english', name: '영어', color: 'bg-indigo-600', text: 'text-indigo-700', bg: 'bg-indigo-50', border: 'border-indigo-200' },
            { id: 'science', name: '과학', color: 'bg-emerald-600', text: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200' },
            { id: 'pe', name: '체육', color: 'bg-rose-600', text: 'text-rose-700', bg: 'bg-rose-50', border: 'border-rose-200' },
            { id: 'external', name: '외부강사', color: 'bg-purple-600', text: 'text-purple-700', bg: 'bg-purple-50', border: 'border-purple-200' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(window.fbError || null);

            // 데이터 상태
            const [baseSchedule, setBaseSchedule] = useState({});
            const [overrides, setOverrides] = useState({});
            const [academicEvents, setAcademicEvents] = useState({});
            const [targetHours, setTargetHours] = useState({ english: 30, science: 30, pe: 30, external: 10 });
            const [semesterConfig, setSemesterConfig] = useState({ s1Start: '2024-03-04', s1End: '2024-07-19', s2Start: '2024-08-19', s2End: '2025-01-08' });

            const [activeTab, setActiveTab] = useState('daily');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedCell, setSelectedCell] = useState(null);
            const [selectedSpec, setSelectedSpec] = useState('english');

            useEffect(() => {
                const checkInterval = setInterval(() => {
                    if (window.fbReady && window.fb) {
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        signInAnonymously(auth).catch(e => setError("로그인 오류: " + e.code));
                        onAuthStateChanged(auth, setUser);
                        clearInterval(checkInterval);
                    }
                }, 300);
                setTimeout(() => setIsLoading(false), 5000); 
                return () => clearInterval(checkInterval);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                
                const unsubs = [
                    onSnapshot(path('base'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setBaseSchedule(d);
                    }),
                    onSnapshot(path('overrides'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setOverrides(d);
                        setIsLoading(false);
                    }, e => setError("데이터 수신 오류: " + e.code)),
                    onSnapshot(path('academic'), (s) => {
                        const d = {}; s.docs.forEach(doc => {
                            if (doc.id === 'targets') setTargetHours(doc.data());
                            else if (doc.id === 'semesters') setSemesterConfig(doc.data());
                            else d[doc.id] = doc.data();
                        });
                        setAcademicEvents(d);
                    })
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            const saveData = async (coll, id, data) => {
                const { db, appId, doc, setDoc, Timestamp } = window.fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coll, id), {
                    ...data,
                    updatedAt: Timestamp.now()
                });
                setIsModalOpen(false);
            };

            const getCellData = (dateStr, period, classLabel) => {
                const overrideKey = `${dateStr}-${period}-${classLabel}`;
                if (overrides[overrideKey]) return overrides[overrideKey];
                const date = new Date(dateStr);
                const dayIdx = (date.getDay() + 6) % 7;
                const baseKey = `${dayIdx}-${period}`;
                const baseMatch = Object.entries(baseSchedule).find(([k, v]) => k === baseKey && v.classLabel === classLabel);
                return baseMatch ? { type: baseMatch[1].type } : null;
            };

            const getWeekRange = (dateStr) => {
                const curr = new Date(dateStr);
                const first = curr.getDate() - ((curr.getDay() + 6) % 7);
                return Array.from({length: 5}, (_, i) => {
                    const d = new Date(curr);
                    d.setDate(first + i);
                    return d.toISOString().split('T')[0];
                });
            };

            const stats = useMemo(() => {
                const res = {};
                TARGET_CLASSES.forEach(c => res[c] = { english: 0, science: 0, pe: 0, external: 0 });
                Object.values(overrides).forEach(v => {
                    if (v.status === 'held' && res[v.classLabel]) res[v.classLabel][v.type]++;
                });
                return res;
            }, [overrides]);

            if (error) return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-50">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-rose-100 max-w-sm w-full text-center">
                        <SafeIcon name="AlertCircle" size={60} className="text-rose-500 mx-auto mb-6" />
                        <h2 className="text-2xl font-black mb-4 tracking-tight text-slate-800">시스템 오류</h2>
                        <div className="bg-slate-50 p-4 rounded-2xl text-[10px] font-mono text-rose-600 mb-8 break-all">{error}</div>
                        <button onClick={() => window.location.reload()} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black">새로고침</button>
                    </div>
                </div>
            );

            if (isLoading) return null;

            return (
                <div className="min-h-screen bg-slate-50 pb-28 animate-in flex flex-col">
                    <header className="bg-white border-b sticky top-0 z-40 px-6 py-4 flex flex-col xl:flex-row justify-between items-center gap-4 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-xl"><SafeIcon name="ClipboardCheck" /></div>
                            <div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tight leading-none">전담 마크 Pro</h1>
                                <span className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mt-1.5 inline-block">V4.3 Final</span>
                            </div>
                        </div>
                        <nav className="flex bg-slate-100 p-1.5 rounded-2xl overflow-x-auto no-scrollbar max-w-full">
                            {[
                                { id: 'daily', label: '일별', icon: 'Calendar' },
                                { id: 'weekly', label: '주별', icon: 'LayoutGrid' },
                                { id: 'monthly', label: '월별', icon: 'CalendarDays' },
                                { id: 'semester', label: '학기', icon: 'Flag' },
                                { id: 'bulk', label: '일괄', icon: 'Layers' },
                                { id: 'config', label: '설정', icon: 'Settings' },
                                { id: 'stats', label: '통계', icon: 'BarChart3' },
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-bold transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-indigo-600'}`}>
                                    <SafeIcon name={tab.icon} size={16} /> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="p-4 md:p-8 max-w-[1500px] mx-auto w-full flex-1">
                        {activeTab === 'daily' && (
                            <div className="space-y-6 animate-in">
                                <div className="flex items-center justify-between bg-white p-5 rounded-[2.5rem] border border-slate-200 shadow-sm">
                                    <button onClick={() => { const d = new Date(selectedDate); d.setDate(d.getDate() - 1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-3 border rounded-2xl hover:bg-slate-50 transition-all"><SafeIcon name="ChevronLeft" /></button>
                                    <div className="text-center">
                                        <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="text-2xl font-black border-none text-center bg-transparent focus:ring-0 cursor-pointer" />
                                        <div className="text-[10px] font-bold text-slate-300 tracking-[0.3em] uppercase mt-1">{selectedDate.replace(/-/g, '.')}</div>
                                    </div>
                                    <button onClick={() => { const d = new Date(selectedDate); d.setDate(d.getDate() + 1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-3 border rounded-2xl hover:bg-slate-50 transition-all"><SafeIcon name="ChevronRight" /></button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {TARGET_CLASSES.map(cls => (
                                        <div key={cls} className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden hover:shadow-lg transition-all">
                                            <div className="bg-slate-50 p-5 border-b text-center font-black text-slate-700 uppercase italic opacity-60">5학년 {cls}</div>
                                            <div className="p-5 space-y-4">
                                                {PERIODS.map(p => {
                                                    const data = getCellData(selectedDate, p, cls);
                                                    const spec = SPECIALISTS.find(s => s.id === data?.type);
                                                    return (
                                                        <div key={p} onClick={() => { setSelectedCell(`${selectedDate}-${p}-${cls}`); setIsModalOpen(true); }} className={`p-4 rounded-3xl border min-h-[105px] cursor-pointer flex flex-col justify-center transition-all ${spec ? `${spec.bg} ${spec.border} shadow-sm` : 'bg-slate-50 border-transparent hover:border-indigo-100 hover:bg-white'}`}>
                                                            <div className="flex justify-between items-start text-[10px] font-black text-slate-300 uppercase">
                                                                <span>{p}교시</span>
                                                                {data?.status === 'held' && <div className="text-indigo-600"><SafeIcon name="CheckCircle2" size={14} /></div>}
                                                            </div>
                                                            {spec ? (
                                                                <div className={`text-base font-black mt-1 ${spec.text} truncate`}>
                                                                    {spec.name}
                                                                    {data.title && <span className="block text-[10px] opacity-60 font-bold truncate mt-0.5">{data.title}</span>}
                                                                </div>
                                                            ) : <div className="text-center opacity-10 py-1"><SafeIcon name="Plus" size={20} /></div>}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'weekly' && (
                            <div className="bg-white rounded-[3rem] border border-slate-200 shadow-sm overflow-hidden overflow-x-auto animate-in">
                                <table className="w-full border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50 border-b">
                                            <th className="p-6 border-r w-24 text-xs font-black text-slate-400">교시</th>
                                            {getWeekRange(selectedDate).map(d => (
                                                <th key={d} className="p-6 border-r min-w-[200px]">
                                                    <div className="text-[10px] text-slate-300 font-bold uppercase tracking-widest">{d.split('-').slice(1).join('.')}</div>
                                                    <div className="font-black text-slate-700 text-lg">{DAYS[(new Date(d).getDay() + 6) % 7]}요일</div>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {PERIODS.map(p => (
                                            <tr key={p} className="border-b last:border-0">
                                                <td className="p-6 bg-slate-50/30 border-r text-center font-black text-slate-200 text-5xl">{p}</td>
                                                {getWeekRange(selectedDate).map(d => (
                                                    <td key={d} className="p-3 border-r last:border-0 align-top h-32">
                                                        <div className="space-y-1">
                                                            {TARGET_CLASSES.map(cls => {
                                                                const data = getCellData(d, p, cls);
                                                                const spec = SPECIALISTS.find(s => s.id === data?.type);
                                                                if (!spec) return null;
                                                                return (
                                                                    <div key={cls} className={`p-2 rounded-xl border text-[10px] font-bold truncate ${spec.bg} ${spec.text} ${spec.border}`}>
                                                                        {cls}: {spec.name} {data.title && `(${data.title})`}
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'monthly' && (
                            <div className="bg-white rounded-[3.5rem] border border-slate-200 shadow-sm p-8 animate-in space-y-8">
                                <div className="flex justify-between items-center px-4">
                                    <h3 className="text-3xl font-black text-slate-800 italic tracking-tighter uppercase">Academic Calendar</h3>
                                    <div className="flex gap-4">
                                        <button onClick={() => { const d = new Date(selectedDate); d.setMonth(d.getMonth()-1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-4 border rounded-3xl hover:bg-slate-50 transition-all"><SafeIcon name="ChevronLeft" /></button>
                                        <div className="px-8 flex items-center bg-slate-100 rounded-3xl font-black text-slate-700">
                                            {new Date(selectedDate).getFullYear()} / {new Date(selectedDate).getMonth()+1}
                                        </div>
                                        <button onClick={() => { const d = new Date(selectedDate); d.setMonth(d.getMonth()+1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-4 border rounded-3xl hover:bg-slate-50 transition-all"><SafeIcon name="ChevronRight" /></button>
                                    </div>
                                </div>
                                <div className="calendar-grid border rounded-[2.5rem] overflow-hidden">
                                    {['일', '월', '화', '수', '목', '금', '토'].map(d => (
                                        <div key={d} className="p-4 bg-slate-50 border-b border-r text-center text-xs font-black text-slate-400">{d}</div>
                                    ))}
                                    {(() => {
                                        const d = new Date(selectedDate);
                                        const firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
                                        const totalDays = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
                                        const cells = [];
                                        for(let i=0; i<firstDay; i++) cells.push(<div key={`empty-${i}`} className="p-8 border-b border-r bg-slate-50/20 opacity-30"></div>);
                                        for(let i=1; i<=totalDays; i++) {
                                            const dayStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                                            const isToday = dayStr === new Date().toISOString().split('T')[0];
                                            const hasEvent = academicEvents[dayStr];
                                            cells.push(
                                                <div key={i} className={`p-4 border-b border-r min-h-[120px] transition-all hover:bg-indigo-50/30 ${isToday ? 'bg-indigo-50 shadow-inner' : ''}`}>
                                                    <div className="flex justify-between">
                                                        <span className={`text-sm font-black ${isToday ? 'text-indigo-600' : 'text-slate-400'}`}>{i}</span>
                                                        {hasEvent && <div className="w-2 h-2 bg-rose-500 rounded-full"></div>}
                                                    </div>
                                                    <div className="mt-2 space-y-1">
                                                        {hasEvent && <div className="text-[10px] font-bold text-rose-500 truncate italic">{hasEvent.title}</div>}
                                                        {TARGET_CLASSES.map(cls => {
                                                            const lessons = PERIODS.map(p => getCellData(dayStr, p, cls)).filter(l => l && l.type);
                                                            if (lessons.length === 0) return null;
                                                            return (
                                                                <div key={cls} className="flex gap-1 flex-wrap">
                                                                    {lessons.map((l, idx) => (
                                                                        <div key={idx} className={`w-1.5 h-1.5 rounded-full ${SPECIALISTS.find(s=>s.id===l.type)?.color || 'bg-slate-200'}`}></div>
                                                                    ))}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            );
                                        }
                                        return cells;
                                    })()}
                                </div>
                            </div>
                        )}

                        {activeTab === 'semester' && (
                            <div className="space-y-8 animate-in">
                                <div className="bg-indigo-600 p-10 rounded-[3.5rem] shadow-xl text-white flex flex-col xl:flex-row justify-between items-center gap-8 relative overflow-hidden">
                                    <div className="absolute -bottom-10 -right-10 opacity-10 rotate-12"><SafeIcon name="Flag" size={200}/></div>
                                    <div className="relative z-10 text-center xl:text-left">
                                        <h3 className="text-3xl font-black mb-2 tracking-tight">학기별 학사 일정</h3>
                                        <p className="text-indigo-100 text-sm font-medium">휴업일, 재량휴업일 등 수업이 없는 날을 표시합니다.</p>
                                    </div>
                                    <div className="flex gap-4 relative z-10">
                                        <div className="bg-white/10 p-5 rounded-[2rem] text-center min-w-[140px] border border-white/20">
                                            <div className="text-[10px] font-black opacity-50 mb-1 uppercase tracking-widest">1학기</div>
                                            <div className="font-black text-lg">{semesterConfig.s1Start || '미설정'}</div>
                                        </div>
                                        <div className="bg-white/10 p-5 rounded-[2rem] text-center min-w-[140px] border border-white/20">
                                            <div className="text-[10px] font-black opacity-50 mb-1 uppercase tracking-widest">2학기</div>
                                            <div className="font-black text-lg">{semesterConfig.s2Start || '미설정'}</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {['1학기', '2학기'].map((sem, idx) => (
                                        <div key={sem} className="bg-white p-8 rounded-[3.5rem] border border-slate-200 shadow-sm">
                                            <h4 className="text-xl font-black mb-6 text-slate-800 flex items-center gap-2 italic">{sem} Events</h4>
                                            <div className="space-y-4 max-h-[400px] overflow-y-auto no-scrollbar pr-2">
                                                {Object.entries(academicEvents)
                                                    .filter(([date]) => {
                                                        const start = idx === 0 ? semesterConfig.s1Start : semesterConfig.s2Start;
                                                        const end = idx === 0 ? semesterConfig.s1End : semesterConfig.s2End;
                                                        return date >= start && date <= end;
                                                    })
                                                    .sort(([a], [b]) => a.localeCompare(b))
                                                    .map(([date, ev]) => (
                                                        <div key={date} className="flex items-center justify-between p-5 bg-slate-50 rounded-3xl group hover:bg-indigo-50 transition-all">
                                                            <div className="flex gap-5 items-center">
                                                                <span className="text-xs font-black text-slate-300">{date.split('-').slice(1).join('.')}</span>
                                                                <span className="font-black text-slate-700">{ev.title}</span>
                                                            </div>
                                                            <button onClick={() => window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'academic', date))} className="text-slate-200 hover:text-rose-500 transition-all opacity-0 group-hover:opacity-100"><SafeIcon name="X" size={18}/></button>
                                                        </div>
                                                    ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'bulk' && (
                            <div className="max-w-4xl mx-auto space-y-10 animate-in">
                                <div className="bg-emerald-600 p-10 rounded-[3.5rem] shadow-xl text-white relative overflow-hidden">
                                    <div className="absolute -top-10 -right-10 opacity-10 rotate-12"><SafeIcon name="Layers" size={220}/></div>
                                    <h3 className="text-3xl font-black mb-4 flex items-center gap-3 relative z-10"><SafeIcon name="Layers" size={28}/> 일괄 수업 마크</h3>
                                    <p className="text-emerald-100 text-sm mb-10 font-medium relative z-10">반복되는 외부 수업이나 창체 수업을 한 번에 등록합니다.</p>
                                    <div className="space-y-6 relative z-10">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black opacity-60 ml-2 uppercase">수업명</label>
                                                <input type="text" id="bulk-title" placeholder="예: 창체 한자" className="w-full p-5 rounded-3xl bg-white/10 border-none text-white placeholder-white/40 font-black focus:bg-white focus:text-slate-800" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black opacity-60 ml-2 uppercase">대상 반</label>
                                                <select id="bulk-class" className="w-full p-5 rounded-3xl bg-white/10 border-none text-white font-black focus:bg-white focus:text-slate-800 appearance-none">
                                                    {TARGET_CLASSES.map(c => <option key={c} value={c} className="text-slate-800">{c}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black opacity-60 ml-2 uppercase">교시</label>
                                                <select id="bulk-period" className="w-full p-5 rounded-3xl bg-white/10 border-none text-white font-black focus:bg-white focus:text-slate-800 appearance-none">
                                                    {PERIODS.map(p => <option key={p} value={p} className="text-slate-800">{p}교시</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black opacity-60 ml-2 uppercase">적용 날짜들 (YYYY-MM-DD 형식, 쉼표 구분)</label>
                                            <textarea id="bulk-dates" placeholder="예: 2024-03-20, 2024-03-27" className="w-full p-5 rounded-3xl bg-white/10 border-none text-white placeholder-white/40 font-black min-h-[120px] focus:bg-white focus:text-slate-800"></textarea>
                                        </div>
                                        <button onClick={async () => {
                                            const title = document.getElementById('bulk-title').value;
                                            const cls = document.getElementById('bulk-class').value;
                                            const p = parseInt(document.getElementById('bulk-period').value);
                                            const dates = document.getElementById('bulk-dates').value.split(',').map(d => d.trim()).filter(d => d);
                                            if(!title || dates.length === 0) return alert("수업명과 날짜를 입력하세요.");
                                            for(const d of dates) {
                                                await saveData('overrides', `${d}-${p}-${cls}`, { title, type: 'external', status: 'held', classLabel: cls });
                                            }
                                            alert("수업이 등록되었습니다.");
                                            setActiveTab('daily');
                                        }} className="w-full py-6 bg-white text-emerald-600 font-black rounded-[2rem] hover:bg-emerald-50 shadow-xl transition-all active:scale-[0.98]">Batch Update 실행</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'config' && (
                            <div className="space-y-10 animate-in max-w-6xl mx-auto">
                                <div className="bg-indigo-600 p-10 rounded-[3rem] text-white flex flex-col lg:flex-row justify-between items-center gap-8 shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10 text-center lg:text-left">
                                        <h3 className="text-3xl font-black mb-1">전담 시간표 마크</h3>
                                        <p className="opacity-80 text-sm font-medium">본인의 과목을 선택하고 주간 시간표에서 담당 반을 클릭하세요.</p>
                                    </div>
                                    <div className="flex gap-2 p-2 bg-white/10 rounded-[2rem] overflow-x-auto no-scrollbar relative z-10">
                                        {SPECIALISTS.filter(s=>s.id!=='external').map(s => (
                                            <button key={s.id} onClick={() => setSelectedSpec(s.id)} className={`px-8 py-3.5 rounded-[1.5rem] font-black transition-all whitespace-nowrap ${selectedSpec === s.id ? 'bg-white text-indigo-600 shadow-xl' : 'hover:bg-white/10'}`}>{s.name}</button>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-[3.5rem] border border-slate-200 shadow-sm overflow-hidden overflow-x-auto">
                                    <table className="w-full border-collapse">
                                        <thead><tr className="bg-slate-50 border-b"><th className="p-6 border-r w-32 text-xs font-black text-slate-400 uppercase tracking-widest">교시</th>{DAYS.map(d=><th key={d} className="p-6 border-r font-black text-slate-700 text-lg">{d}요일</th>)}</tr></thead>
                                        <tbody>
                                            {PERIODS.map(p=>(
                                                <tr key={p} className="border-b last:border-0"><td className="p-6 bg-slate-50 border-r text-center font-black text-slate-200 text-5xl">{p}</td>
                                                    {DAYS.map((_, dIdx)=>{
                                                        const key = `${dIdx}-${p}`;
                                                        const item = baseSchedule[key];
                                                        const isMine = item?.type === selectedSpec;
                                                        return (
                                                            <td key={dIdx} className="p-4 border-r last:border-0 min-w-[160px]">
                                                                <button onClick={() => {
                                                                    const cls = prompt("담당 반 이름 입력 (예: 5-1, 1반 등)");
                                                                    if(cls) saveData('base', key, { type: selectedSpec, classLabel: cls });
                                                                    else if(cls === "") window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'base', key));
                                                                }} className={`w-full p-6 border-2 border-dashed rounded-[2.5rem] transition-all flex flex-col items-center justify-center min-h-[110px] ${isMine ? 'bg-indigo-50 border-indigo-200 text-indigo-700 font-black shadow-inner shadow-indigo-100' : 'border-slate-100 text-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}>
                                                                    {isMine ? <span className="text-lg font-black">{item.classLabel}</span> : <div className="opacity-20"><SafeIcon name="Plus" size={24}/></div>}
                                                                </button>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white p-12 rounded-[3.5rem] border border-slate-200 shadow-sm space-y-8">
                                        <h4 className="text-2xl font-black text-slate-800 flex items-center gap-3 italic"><SafeIcon name="Target" className="text-indigo-600" size={28}/> Semester Duration</h4>
                                        <div className="grid grid-cols-2 gap-6">
                                            {['s1Start', 's1End', 's2Start', 's2End'].map(k => (
                                                <div key={k} className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">{k.includes('s1') ? '1학기' : '2학기'} {k.includes('Start') ? '시작' : '종료'}</label>
                                                    <input type="date" value={semesterConfig[k]} onChange={e => setSemesterConfig({...semesterConfig, [k]: e.target.value})} className="w-full p-5 rounded-3xl bg-slate-50 border-none font-black text-indigo-600 focus:ring-2 focus:ring-indigo-100" />
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => { saveData('academic', 'semesters', semesterConfig); alert("학기 기간이 저장되었습니다."); }} className="w-full py-5 bg-indigo-600 text-white rounded-[2rem] font-black text-lg shadow-xl shadow-indigo-100 transition-all hover:bg-indigo-700 active:scale-95">학기 기간 동기화</button>
                                    </div>
                                    <div className="bg-white p-12 rounded-[3.5rem] border border-slate-200 shadow-sm space-y-8">
                                        <h4 className="text-2xl font-black text-slate-800 flex items-center gap-3 italic"><SafeIcon name="BarChart3" className="text-indigo-600" size={28}/> Targets Hour</h4>
                                        <div className="grid grid-cols-2 gap-6">
                                            {SPECIALISTS.map(s => (
                                                <div key={s.id} className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">{s.name} 목표</label>
                                                    <input type="number" value={targetHours[s.id]} onChange={e => setTargetHours({...targetHours, [s.id]: parseInt(e.target.value)})} className="w-full p-5 rounded-3xl bg-slate-50 border-none font-black text-indigo-600 focus:ring-2 focus:ring-indigo-100 text-xl" />
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => { saveData('academic', 'targets', targetHours); alert("목표 시수가 서버에 저장되었습니다."); }} className="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-black text-lg shadow-xl transition-all active:scale-95">목표 시수 일괄 업데이트</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10 animate-in">
                                {TARGET_CLASSES.map(cls => (
                                    <div key={cls} className="bg-white p-12 rounded-[4rem] border border-slate-200 shadow-sm hover:shadow-2xl transition-all duration-500 group">
                                        <h3 className="text-3xl font-black mb-14 flex justify-between items-center text-slate-800 tracking-tight">5학년 {cls} 누계 <div className="opacity-10 group-hover:opacity-20 transition-opacity"><SafeIcon name="BarChart3" size={40} /></div></h3>
                                        <div className="space-y-14">
                                            {SPECIALISTS.map(spec => {
                                                const count = stats[cls]?.[spec.id] || 0;
                                                const target = targetHours[spec.id] || 30;
                                                const percent = Math.min((count / target) * 100, 100).toFixed(0);
                                                return (
                                                    <div key={spec.id} className="space-y-5">
                                                        <div className="flex justify-between items-end px-1">
                                                            <div className="flex items-center gap-3">
                                                                <div className={`w-4 h-4 rounded-full ${spec.color} shadow-sm`}></div>
                                                                <span className="font-bold text-slate-600 text-xl">{spec.name}</span>
                                                            </div>
                                                            <span className="font-black text-slate-900 text-3xl">{count} <span className="text-slate-300 font-bold text-base">/ {target}</span></span>
                                                        </div>
                                                        <div className="h-6 bg-slate-100 rounded-full overflow-hidden border-4 border-white shadow-inner">
                                                            <div className={`h-full ${spec.color} transition-all duration-1000 shadow-lg shadow-indigo-100`} style={{ width: `${percent}%` }}></div>
                                                        </div>
                                                        <div className="flex justify-end pr-1"><span className={`text-[10px] font-black px-3 py-1 rounded-full ${percent >= 100 ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-50 text-indigo-500'}`}>{percent}% 달성</span></div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* 수업 체크 모달 */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-[4rem] p-10 shadow-2xl space-y-10 animate-in zoom-in-95">
                                <div className="text-center space-y-3">
                                    <h2 className="text-3xl font-black text-slate-800 tracking-tight">수업 완료 확인</h2>
                                    <p className="text-[10px] text-slate-400 font-extrabold uppercase tracking-[0.3em] leading-relaxed">{selectedCell?.replace(/-/g, '.')}</p>
                                </div>
                                <div className="grid grid-cols-2 gap-5">
                                    <button onClick={() => {
                                        const p = selectedCell.split('-');
                                        const [d, pr, c] = [`${p[0]}-${p[1]}-${p[2]}`, parseInt(p[3]), p[4]];
                                        const data = getCellData(d, pr, c);
                                        if(data) saveData('overrides', selectedCell, { ...data, status: 'held', classLabel: c });
                                        else alert("배정된 수업이 없습니다.");
                                    }} className="p-10 bg-indigo-50 text-indigo-600 rounded-[3rem] border-2 border-indigo-100 font-black flex flex-col items-center gap-4 transition-all hover:bg-indigo-100 active:scale-95 shadow-sm shadow-indigo-50"><SafeIcon name="CheckCircle2" size={48}/>완료</button>
                                    <button onClick={() => {
                                        const p = selectedCell.split('-');
                                        const [d, pr, c] = [`${p[0]}-${p[1]}-${p[2]}`, parseInt(p[3]), p[4]];
                                        const data = getCellData(d, pr, c);
                                        if(data) saveData('overrides', selectedCell, { ...data, status: 'cancelled', classLabel: c });
                                        setIsModalOpen(false);
                                    }} className="p-10 bg-rose-50 text-rose-600 rounded-[3rem] border-2 border-rose-100 font-black flex flex-col items-center gap-4 transition-all hover:bg-rose-100 active:scale-95 shadow-sm shadow-rose-50"><SafeIcon name="X" size={48}/>결손</button>
                                </div>
                                
                                <div className="flex gap-4">
                                    <button onClick={() => { window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'overrides', selectedCell)); setIsModalOpen(false); }} className="flex-1 py-5 bg-slate-100 text-slate-400 rounded-3xl font-extrabold hover:bg-slate-200 transition-all text-sm">초기화</button>
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 py-5 bg-slate-900 text-white rounded-3xl font-extrabold shadow-2xl active:scale-95 transition-all text-sm">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-10 right-10 flex items-center gap-4 bg-slate-900/95 text-white px-8 py-4 rounded-full shadow-2xl border border-white/10 backdrop-blur-md z-50">
                        <div className="w-3.5 h-3.5 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_15px_rgba(52,211,153,0.8)]"></div>
                        <span className="text-[12px] font-black tracking-widest uppercase leading-none">Live Sync Active</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
