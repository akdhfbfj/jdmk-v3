<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전담 마크 Pro V5.4 - 통합 시수 관리 시스템</title>
    
    <!-- 1. 스타일 및 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    
    <!-- 2. Firebase 설정 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBWxSDDYkOtaZI9dByQ85A0izlrCmHEoIQ",
          authDomain: "jdmk-v2.firebaseapp.com",
          projectId: "jdmk-v2",
          storageBucket: "jdmk-v2.firebasestorage.app",
          messagingSenderId: "279087439497",
          appId: "1:279087439497:web:e7f19f6a911483248cb058",
          measurementId: "G-PH80PJW6TC"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = 'jdmk-v5-final'; 

            window.fb = { auth, db, appId, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, Timestamp, signInAnonymously, onAuthStateChanged };
            window.fbReady = true; 
        } catch (e) {
            window.fbError = e.message;
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top: 3px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-sat { color: #2563eb; }
        .day-sun { color: #dc2626; }
        .bg-weekend { background-color: #f8fafc; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white;">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-weight: 700; color: #4f46e5; font-size: 0.8rem;">전담 마크 Pro 안정화 패치 중...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createElement } = React;

        const SafeIcon = ({ name, size = 16, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => {
                const check = setInterval(() => { if (window.lucide) { setReady(true); clearInterval(check); } }, 50);
                return () => clearInterval(check);
            }, []);
            if (!ready || !window.lucide?.icons[name]) return <div style={{width: size, height: size}} className={className} />;
            const iconData = window.lucide.icons[name];
            return createElement('svg', { ...iconData[1], width: size, height: size, className: className, key: name },
                iconData[2].map((child, i) => createElement(child[0], { ...child[1], key: i }))
            );
        };

        const DAYS = ['월', '화', '수', '목', '금'];
        const PERIODS = [1, 2, 3, 4, 5, 6];
        const TARGET_CLASSES = ['1반', '2반', '3반', '4반'];
        const SPECIALISTS = [
            { id: 'english', name: '영어', color: 'bg-indigo-600', text: 'text-indigo-700', bg: 'bg-indigo-50', border: 'border-indigo-200' },
            { id: 'science', name: '과학', color: 'bg-emerald-600', text: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200' },
            { id: 'pe', name: '체육', color: 'bg-rose-600', text: 'text-rose-700', bg: 'bg-rose-50', border: 'border-rose-200' },
            { id: 'external', name: '외부강사', color: 'bg-amber-600', text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(window.fbError || null);

            // 데이터 상태
            const [baseSchedule, setBaseSchedule] = useState({});
            const [overrides, setOverrides] = useState({});
            const [targetHours, setTargetHours] = useState({ english: 30, science: 30, pe: 30, external: 0 });
            
            // UI 상태
            const [activeTab, setActiveTab] = useState('lessons'); 
            const [viewMode, setViewMode] = useState('daily'); 
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedCell, setSelectedCell] = useState(null);
            
            // 전담 설정용 임시 상태
            const [selectedSpec, setSelectedSpec] = useState('english');
            const [quickClass, setQuickClass] = useState('1반');
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                const checkInterval = setInterval(() => {
                    if (window.fbReady && window.fb) {
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        signInAnonymously(auth).catch(e => setError(e.code));
                        onAuthStateChanged(auth, setUser);
                        clearInterval(checkInterval);
                    }
                }, 100);
                setTimeout(() => setIsLoading(false), 2000); 
                return () => clearInterval(checkInterval);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                const unsubs = [
                    onSnapshot(path('base'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setBaseSchedule(d);
                    }),
                    onSnapshot(path('overrides'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setOverrides(d);
                        setIsLoading(false);
                    }),
                    onSnapshot(path('academic'), (s) => {
                        s.docs.forEach(doc => { if (doc.id === 'targets') setTargetHours(doc.data()); });
                    })
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            const saveData = async (coll, id, data) => {
                const { db, appId, doc, setDoc, Timestamp } = window.fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coll, id), { ...data, updatedAt: Timestamp.now() });
            };

            // 핵심: 전담 및 강사 수업 조회 로직 (날짜 밀림 방지 패치)
            const getCellData = (dateStr, period, classLabel) => {
                const overrideKey = `${dateStr}-${period}-${classLabel}`;
                const date = new Date(dateStr + 'T00:00:00'); // T00:00:00을 붙여야 한국 시간 기준으로 정확히 잡힙니다.
                const dayIdx = (date.getDay() + 6) % 7; // 월=0, 화=1 ...
                
                const override = overrides[overrideKey];
                
                // 전담 시간표(base) 반영 로직
                const baseKey = `${dayIdx}-${period}`;
                const baseMatch = baseSchedule[baseKey];
                // classLabel이 같거나, baseMatch의 classLabel이 classLabel과 일치해야 함
                const isBaseMatch = baseMatch && (baseMatch.classLabel === classLabel);
                
                const isConflict = override && override.type === 'external' && isBaseMatch;
                
                if (override) return { ...override, isConflict };
                if (isBaseMatch) return { type: baseMatch.type, isConflict };
                return null;
            };

            const parseSmartDates = (input) => {
                const currentYear = new Date().getFullYear();
                return input.split(/[,|\n]/).map(d => {
                    let s = d.trim().replace(/\//g, '.');
                    if (!s) return null;
                    if (s.split('.').length === 2) s = `${currentYear}.${s}`;
                    const date = new Date(s.replace(/\./g, '-') + 'T00:00:00');
                    return isNaN(date.getTime()) ? null : date.toISOString().split('T')[0];
                }).filter(d => d);
            };

            const stats = useMemo(() => {
                const res = {};
                TARGET_CLASSES.forEach(c => res[c] = { english: 0, science: 0, pe: 0, external: 0, externalLessons: [] });
                Object.values(overrides).forEach(v => {
                    if (v.status === 'held' && res[v.classLabel]) {
                        res[v.classLabel][v.type]++;
                        if (v.type === 'external' && v.title) {
                            if (!res[v.classLabel].externalLessons.includes(v.title)) {
                                res[v.classLabel].externalLessons.push(v.title);
                            }
                        }
                    }
                });
                return res;
            }, [overrides]);

            if (isLoading) return null;

            return (
                <div className="min-h-screen flex flex-col animate-in">
                    <header className="bg-white border-b px-4 py-1.5 flex flex-col lg:flex-row justify-between items-center gap-2 sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-900 p-1.5 rounded-lg text-white"><SafeIcon name="ClipboardCheck" size={16} /></div>
                            <h1 className="text-sm font-black text-slate-800 tracking-tighter">전담 마크 <span className="text-indigo-600 italic">V5.4 Stable</span></h1>
                        </div>
                        <nav className="flex bg-slate-100 p-0.5 rounded-xl">
                            {[
                                { id: 'lessons', label: '시수 관리', icon: 'Calendar' },
                                { id: 'instructor', label: '강사 수업 등록', icon: 'Layers' },
                                { id: 'config', label: '전담 시간 등록', icon: 'Settings' },
                                { id: 'stats', label: '통계', icon: 'BarChart3' },
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                    <SafeIcon name={tab.icon} size={14} /> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="p-2 lg:p-4 max-w-7xl mx-auto w-full flex-1">
                        {/* 1. 시수 관리 탭 */}
                        {activeTab === 'lessons' && (
                            <div className="space-y-2">
                                <div className="flex justify-between items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => { const d = new Date(selectedDate + 'T00:00:00'); d.setDate(d.getDate()-1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-1.5 border rounded-lg hover:bg-slate-50"><SafeIcon name="ChevronLeft" /></button>
                                        <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="font-black text-slate-700 border-none bg-transparent focus:ring-0 cursor-pointer text-xs" />
                                        <button onClick={() => { const d = new Date(selectedDate + 'T00:00:00'); d.setDate(d.getDate()+1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-1.5 border rounded-lg hover:bg-slate-50"><SafeIcon name="ChevronRight" /></button>
                                    </div>
                                    <div className="flex bg-slate-100 p-0.5 rounded-lg">
                                        {['daily', 'weekly', 'monthly'].map(mode => (
                                            <button key={mode} onClick={() => setViewMode(mode)} className={`px-3 py-1 rounded-md text-[10px] font-black transition-all ${viewMode === mode ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>{mode === 'daily' ? '일별' : mode === 'weekly' ? '주별' : '월별'}</button>
                                        ))}
                                    </div>
                                </div>

                                {viewMode === 'daily' && (
                                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden animate-in">
                                        <div className="grid grid-cols-5 bg-slate-50 border-b">
                                            <div className="p-2 text-center text-[9px] font-black text-slate-300 uppercase">교시</div>
                                            {TARGET_CLASSES.map(c => <div key={c} className="p-2 text-center text-[11px] font-black text-slate-500 opacity-60">5-{c}</div>)}
                                        </div>
                                        <div className="divide-y divide-slate-100">
                                            {PERIODS.map(p => (
                                                <div key={p} className="grid grid-cols-5 min-h-[75px]">
                                                    <div className="flex items-center justify-center bg-slate-50/20 border-r border-slate-100 font-black text-slate-200 text-3xl italic">{p}</div>
                                                    {TARGET_CLASSES.map(cls => {
                                                        const data = getCellData(selectedDate, p, cls);
                                                        const spec = SPECIALISTS.find(s => s.id === data?.type);
                                                        return (
                                                            <div key={cls} onClick={() => { setSelectedCell(`${selectedDate}-${p}-${cls}`); setIsModalOpen(true); }} className={`p-2 border-r last:border-0 relative cursor-pointer group transition-all ${spec ? `${spec.bg} hover:brightness-95` : 'hover:bg-indigo-50/20'}`}>
                                                                {data?.isConflict && <div className="absolute top-1 right-1 text-rose-500 animate-pulse"><SafeIcon name="AlertTriangle" size={10}/></div>}
                                                                {spec ? (
                                                                    <div className="h-full flex flex-col justify-center">
                                                                        <div className={`text-[13px] font-black ${spec.text}`}>{spec.name}</div>
                                                                        {data.title && <div className="text-[8px] font-bold text-slate-400 truncate mt-0.5 italic">{data.title}</div>}
                                                                        {data.status === 'held' && <div className="mt-1 text-indigo-600"><SafeIcon name="CheckCircle2" size={12}/></div>}
                                                                    </div>
                                                                ) : (
                                                                    <div className="h-full flex items-center justify-center opacity-0 group-hover:opacity-100"><SafeIcon name="Plus" className="text-slate-100" size={16} /></div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {viewMode === 'weekly' && (
                                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-x-auto animate-in">
                                        <table className="w-full border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b">
                                                    <th className="p-2 border-r w-14 text-[9px] font-black text-slate-300">교시</th>
                                                    {(() => {
                                                        const curr = new Date(selectedDate + 'T00:00:00');
                                                        const first = curr.getDate() - ((curr.getDay() + 6) % 7);
                                                        return Array.from({length: 5}, (_, i) => {
                                                            const d = new Date(curr); d.setDate(first + i);
                                                            const dateStr = d.toISOString().split('T')[0];
                                                            return <th key={i} className="p-2 border-r min-w-[140px]">
                                                                <div className="text-[9px] text-slate-300 font-bold">{dateStr.split('-').slice(1).join('.')}</div>
                                                                <div className="font-black text-slate-600 text-xs">{DAYS[i]}</div>
                                                            </th>;
                                                        });
                                                    })()}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {PERIODS.map(p => (
                                                    <tr key={p} className="border-b last:border-0">
                                                        <td className="p-3 bg-slate-50/20 border-r text-center font-black text-slate-200 text-xl italic">{p}</td>
                                                        {(() => {
                                                            const curr = new Date(selectedDate + 'T00:00:00');
                                                            const first = curr.getDate() - ((curr.getDay() + 6) % 7);
                                                            return Array.from({length: 5}, (_, i) => {
                                                                const d = new Date(curr); d.setDate(first + i);
                                                                const dateStr = d.toISOString().split('T')[0];
                                                                return <td key={i} className="p-1 border-r last:border-0 align-top h-16">
                                                                    <div className="space-y-0.5">
                                                                        {TARGET_CLASSES.map(cls => {
                                                                            const data = getCellData(dateStr, p, cls);
                                                                            const spec = SPECIALISTS.find(s => s.id === data?.type);
                                                                            if (!spec) return null;
                                                                            return <div key={cls} className={`p-1 rounded-md border text-[8px] font-bold truncate flex items-center justify-between ${spec.bg} ${spec.text} ${spec.border}`}>
                                                                                <span>{cls}: {spec.name}</span>
                                                                                {data.isConflict && <SafeIcon name="AlertTriangle" size={8} className="text-rose-500" />}
                                                                            </div>;
                                                                        })}
                                                                    </div>
                                                                </td>;
                                                            });
                                                        })()}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {viewMode === 'monthly' && (
                                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-2 animate-in">
                                        <div className="calendar-grid border-l border-t rounded-xl overflow-hidden shadow-inner">
                                            {['일', '월', '화', '수', '목', '금', '토'].map((d, i) => (
                                                <div key={d} className={`p-2 bg-slate-50 border-r border-b text-center text-[9px] font-black ${i === 0 ? 'day-sun' : i === 6 ? 'day-sat' : 'text-slate-300'}`}>{d}</div>
                                            ))}
                                            {(() => {
                                                const d = new Date(selectedDate + 'T00:00:00');
                                                const firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
                                                const totalDays = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
                                                const cells = [];
                                                for(let i=0; i<firstDay; i++) cells.push(<div key={`empty-${i}`} className="p-2 border-r border-b bg-slate-50/10"></div>);
                                                for(let i=1; i<=totalDays; i++) {
                                                    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                                                    const dayOfWeek = new Date(dateStr + 'T00:00:00').getDay();
                                                    const isToday = dateStr === new Date().toISOString().split('T')[0];
                                                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                                                    const lessons = [];
                                                    TARGET_CLASSES.forEach(cls => {
                                                        PERIODS.forEach(p => {
                                                            const lesson = getCellData(dateStr, p, cls);
                                                            if (lesson && lesson.type) lessons.push({ cls, period: p, ...lesson });
                                                        });
                                                    });
                                                    cells.push(
                                                        <div key={i} onClick={() => {setSelectedDate(dateStr); setViewMode('daily');}} className={`p-1 border-r border-b min-h-[90px] transition-all hover:bg-indigo-50/20 cursor-pointer ${isWeekend ? 'bg-weekend' : 'bg-white'} ${isToday ? 'ring-2 ring-inset ring-indigo-200' : ''}`}>
                                                            <div className={`text-[10px] font-black mb-1 ${dayOfWeek === 0 ? 'day-sun' : dayOfWeek === 6 ? 'day-sat' : 'text-slate-300'}`}>{i}</div>
                                                            <div className="space-y-0.5">
                                                                {lessons.slice(0, 5).map((l, idx) => (
                                                                    <div key={idx} className={`text-[7px] font-bold truncate px-1 rounded-sm border flex items-center justify-between ${SPECIALISTS.find(s=>s.id===l.type)?.bg} ${SPECIALISTS.find(s=>s.id===l.type)?.text} ${SPECIALISTS.find(s=>s.id===l.type)?.border}`}>
                                                                        <span>{l.period} {l.cls}</span>
                                                                        {l.isConflict && <div className="w-1 h-1 bg-rose-500 rounded-full"></div>}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    );
                                                }
                                                return cells;
                                            })()}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 2. 강사 수업 등록 */}
                        {activeTab === 'instructor' && (
                            <div className="max-w-xl mx-auto space-y-3 animate-in">
                                <div className="bg-amber-600 p-5 rounded-3xl shadow-lg text-white relative overflow-hidden">
                                    <div className="absolute -top-10 -right-10 opacity-10 rotate-12"><SafeIcon name="Layers" size={120}/></div>
                                    <h3 className="text-md font-black mb-1 flex items-center gap-2 relative z-10 italic uppercase tracking-widest leading-none"><SafeIcon name="Layers" size={18}/> 강사 수업 등록</h3>
                                    <p className="text-amber-100 text-[9px] mb-5 font-medium relative z-10">연차시 수업이나 학년 공통 일정을 한 번에 등록하세요.</p>
                                    <div className="space-y-3 relative z-10">
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black opacity-60 ml-1 uppercase tracking-widest">수업명</label>
                                                <input type="text" id="bulk-title" placeholder="스포츠강사" className="w-full p-2.5 rounded-xl bg-white/10 border-none text-white placeholder-white/30 font-black focus:bg-white focus:text-slate-800 text-[11px]" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black opacity-60 ml-1 uppercase tracking-widest">대상 반</label>
                                                <input type="text" id="bulk-class" placeholder="1반" className="w-full p-2.5 rounded-xl bg-white/10 border-none text-white placeholder-white/30 font-black focus:bg-white focus:text-slate-800 text-[11px]" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black opacity-60 ml-1 uppercase tracking-widest">시작</label>
                                                <select id="bulk-start" className="w-full p-2.5 rounded-xl bg-white/10 border-none text-white font-black focus:bg-white focus:text-slate-800 appearance-none text-[11px] cursor-pointer">
                                                    {PERIODS.map(p => <option key={p} value={p} className="text-slate-800">{p}교시</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black opacity-60 ml-1 uppercase tracking-widest">종료</label>
                                                <select id="bulk-end" className="w-full p-2.5 rounded-xl bg-white/10 border-none text-white font-black focus:bg-white focus:text-slate-800 appearance-none text-[11px] cursor-pointer">
                                                    {PERIODS.map(p => <option key={p} value={p} className="text-slate-800">{p}교시</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black opacity-60 ml-1 uppercase italic tracking-widest">날짜 입력 (예: 3/20, 27 / 4.10 / 2024.5.15 등)</label>
                                            <textarea id="bulk-dates" placeholder="쉼표나 엔터로 구분해 여러 날짜를 입력하세요." className="w-full p-3 rounded-2xl bg-white/10 border-none text-white placeholder-white/30 font-black min-h-[70px] focus:bg-white focus:text-slate-800 text-[11px]"></textarea>
                                        </div>
                                        <button onClick={async () => {
                                            const title = document.getElementById('bulk-title').value;
                                            const cls = document.getElementById('bulk-class').value;
                                            const startP = parseInt(document.getElementById('bulk-start').value);
                                            const endP = parseInt(document.getElementById('bulk-end').value);
                                            const dates = parseSmartDates(document.getElementById('bulk-dates').value);
                                            
                                            if(!title || !cls || dates.length === 0) return alert("수업명, 반, 날짜를 입력하세요.");
                                            if(startP > endP) return alert("교시 설정이 잘못되었습니다.");

                                            setIsSaving(true);
                                            for(const d of dates) {
                                                for(let i = startP; i <= endP; i++) {
                                                    await saveData('overrides', `${d}-${i}-${cls}`, { title, type: 'external', status: 'held', classLabel: cls });
                                                }
                                            }
                                            setIsSaving(false);
                                            alert("수업이 등록되었습니다. 달력을 확인하세요!");
                                            setActiveTab('lessons');
                                        }} disabled={isSaving} className={`w-full py-3.5 bg-white text-amber-600 font-black rounded-2xl shadow-xl transition-all active:scale-[0.98] text-xs tracking-widest ${isSaving ? 'opacity-50' : 'hover:bg-amber-50'}`}>
                                            {isSaving ? '저장 중...' : '등록 실행'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. 전담 시간 등록 */}
                        {activeTab === 'config' && (
                            <div className="space-y-4 animate-in max-w-5xl mx-auto">
                                <div className="bg-indigo-600 p-5 rounded-3xl text-white flex flex-col lg:flex-row justify-between items-center gap-4 shadow-lg relative overflow-hidden">
                                    <div className="relative z-10 text-center lg:text-left">
                                        <h3 className="text-md font-black mb-0.5 italic tracking-tighter uppercase leading-none">전담 시간표 설정</h3>
                                        <p className="opacity-80 text-[10px] font-medium">과목과 반을 입력하고 칸을 클릭하세요. 마지막에 [저장하기]를 누르세요.</p>
                                    </div>
                                    <div className="flex flex-col gap-1.5 relative z-10 w-full lg:w-auto items-end">
                                        <div className="flex gap-1 p-0.5 bg-white/10 rounded-xl overflow-x-auto no-scrollbar border border-white/5">
                                            {SPECIALISTS.filter(s=>s.id!=='external').map(s => (
                                                <button key={s.id} onClick={() => setSelectedSpec(s.id)} className={`px-3 py-1.5 rounded-lg font-black transition-all whitespace-nowrap text-[10px] ${selectedSpec === s.id ? 'bg-white text-indigo-600 shadow-md' : 'hover:bg-white/10'}`}>{s.name}</button>
                                            ))}
                                        </div>
                                        <div className="flex gap-2 w-full lg:w-auto">
                                            <input type="text" value={quickClass || ""} onChange={e => setQuickClass(e.target.value)} placeholder="학년/반 (예: 6-1)" className="flex-1 lg:w-24 p-1.5 rounded-lg bg-white/20 border-none text-white placeholder-white/30 font-black text-[10px] text-center" />
                                            <button onClick={() => setQuickClass(null)} className={`px-3 py-1.5 rounded-lg font-black transition-all text-[10px] ${quickClass === null ? 'bg-rose-500 text-white' : 'bg-rose-500/20 text-white border border-rose-400/20'}`}>지우기</button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden overflow-x-auto">
                                    <table className="w-full border-collapse">
                                        <thead><tr className="bg-slate-50 border-b"><th className="p-2 border-r w-16 text-[9px] font-black text-slate-300 uppercase">교시</th>{DAYS.map(d=><th key={d} className="p-2 border-r font-black text-slate-600 text-xs">{d}</th>)}</tr></thead>
                                        <tbody>
                                            {PERIODS.map(p=>(
                                                <tr key={p} className="border-b last:border-0"><td className="p-4 bg-slate-50 border-r text-center font-black text-slate-200 text-4xl italic tracking-tighter">{p}</td>
                                                    {DAYS.map((_, dIdx)=>{
                                                        const key = `${dIdx}-${p}`;
                                                        const item = baseSchedule[key];
                                                        const isMine = item?.type === selectedSpec;
                                                        return (
                                                            <td key={dIdx} className="p-1 border-r last:border-0 min-w-[130px]">
                                                                <button onClick={() => {
                                                                    if (quickClass === null) {
                                                                        const newBase = {...baseSchedule}; delete newBase[key]; setBaseSchedule(newBase);
                                                                    } else if (quickClass.trim() !== "") {
                                                                        setBaseSchedule({...baseSchedule, [key]: { type: selectedSpec, classLabel: quickClass }});
                                                                    }
                                                                }} className={`w-full p-3 border-2 border-dashed rounded-2xl transition-all flex flex-col items-center justify-center min-h-[75px] ${isMine ? 'bg-indigo-50 border-indigo-200 text-indigo-700 font-black shadow-inner' : (item ? 'border-slate-100 bg-slate-50/40 text-slate-300 text-[9px] italic' : 'border-slate-100 text-slate-100')}`}>
                                                                    {isMine ? <span className="text-[13px] tracking-tighter">{item.classLabel}</span> : (item ? <span>({SPECIALISTS.find(s=>s.id===item.type)?.name}) {item.classLabel}</span> : <SafeIcon name="Plus" size={20} />)}
                                                                </button>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm flex flex-col lg:flex-row gap-5 items-center">
                                    <div className="flex-1 space-y-3 w-full">
                                        <h4 className="text-sm font-black text-slate-800 flex items-center gap-2 italic uppercase"><SafeIcon name="Save" className="text-indigo-600" size={18} /> 시간표 최종 저장</h4>
                                        <p className="text-[10px] text-slate-400 font-medium leading-none">설정한 시간표를 클라우드에 영구 저장하고 달력에 반영합니다.</p>
                                        <button onClick={async () => {
                                            setIsSaving(true);
                                            const { db, appId, doc, setDoc, Timestamp } = window.fb;
                                            for (const [key, data] of Object.entries(baseSchedule)) {
                                                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'base', key), { ...data, updatedAt: Timestamp.now() });
                                            }
                                            setIsSaving(false);
                                            alert("저장 완료! 시수 관리 달력에 즉시 반영되었습니다.");
                                        }} disabled={isSaving} className={`w-full py-3.5 bg-slate-900 text-white rounded-2xl font-black text-xs shadow-xl active:scale-[0.98] ${isSaving ? 'opacity-50' : 'hover:bg-black'}`}>
                                            {isSaving ? '저장 중...' : '데이터베이스에 저장하기'}
                                        </button>
                                    </div>
                                    <div className="w-full lg:w-56 space-y-2 pt-3 border-t lg:border-t-0 lg:border-l lg:pl-5 border-slate-100">
                                        <h5 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">목표 시수</h5>
                                        <div className="grid grid-cols-2 gap-2">
                                            {SPECIALISTS.filter(s=>s.id!=='external').map(s => (
                                                <div key={s.id} className="space-y-0.5">
                                                    <label className="text-[8px] font-black text-slate-400 ml-1">{s.name}</label>
                                                    <input type="number" value={targetHours[s.id]} onChange={e => setTargetHours({...targetHours, [s.id]: parseInt(e.target.value)})} className="w-full p-1.5 rounded-lg bg-slate-50 border-none font-black text-indigo-600 text-[10px] text-center" />
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => { saveData('academic', 'targets', targetHours); alert("목표 시수가 저장되었습니다."); }} className="w-full py-1.5 bg-slate-100 text-slate-500 rounded-xl font-black text-[9px]">목표 저장</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 4. 통계 탭 */}
                        {activeTab === 'stats' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 animate-in">
                                {TARGET_CLASSES.map(cls => (
                                    <div key={cls} className="bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-md group">
                                        <h3 className="text-md font-black mb-5 flex justify-between items-center text-slate-800 tracking-tighter uppercase italic">{cls} 시수 통계 <div className="opacity-10 group-hover:opacity-20"><SafeIcon name="BarChart3" size={20} /></div></h3>
                                        <div className="space-y-5">
                                            {SPECIALISTS.filter(s=>s.id!=='external').map(spec => {
                                                const count = stats[cls]?.[spec.id] || 0;
                                                const target = targetHours[spec.id] || 30;
                                                const percent = Math.min((count / target) * 100, 100).toFixed(0);
                                                return (
                                                    <div key={spec.id} className="space-y-2">
                                                        <div className="flex justify-between items-end px-0.5">
                                                            <div className="flex items-center gap-1.5">
                                                                <div className={`w-2 h-2 rounded-full ${spec.color}`}></div>
                                                                <span className="font-bold text-slate-500 text-[11px]">{spec.name}</span>
                                                            </div>
                                                            <span className="font-black text-slate-900 text-lg">{count} <span className="text-slate-300 font-bold text-[10px]">/ {target}</span></span>
                                                        </div>
                                                        <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden border border-white shadow-inner">
                                                            <div className={`h-full ${spec.color} transition-all duration-1000`} style={{ width: `${percent}%` }}></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            
                                            <div className="pt-3 border-t border-slate-50 space-y-2">
                                                <div className="flex justify-between items-center">
                                                    <span className="font-bold text-slate-500 text-[11px]">강사 수업 누계</span>
                                                    <span className="font-black text-amber-600 text-lg">{stats[cls]?.external || 0} 차시</span>
                                                </div>
                                                <div className="flex flex-wrap gap-1">
                                                    {stats[cls]?.externalLessons.map((title, i) => (
                                                        <span key={i} className="px-2 py-0.5 bg-amber-50 text-amber-700 text-[8px] font-black rounded-full border border-amber-100 italic">#{title}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-xs rounded-[3rem] p-8 shadow-2xl space-y-6 animate-in zoom-in-95">
                                <div className="text-center space-y-1">
                                    <h2 className="text-xl font-black text-slate-800 tracking-tighter italic">수업 상태 마크</h2>
                                    <p className="text-[9px] text-slate-400 font-extrabold uppercase tracking-widest leading-none mt-1">{selectedCell?.replace(/-/g, '.')}</p>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => {
                                        const parts = selectedCell.split('-');
                                        const [d, p, c] = [`${parts[0]}-${parts[1]}-${parts[2]}`, parseInt(parts[3]), parts[4]];
                                        const data = getCellData(d, p, c);
                                        if(data) saveData('overrides', selectedCell, { ...data, status: 'held', classLabel: c }).then(() => setIsModalOpen(false));
                                        else alert("시간표에 배정된 수업이 아닙니다.");
                                    }} className="p-7 bg-indigo-50 text-indigo-600 rounded-[2rem] border-2 border-indigo-100 font-black flex flex-col items-center gap-2 hover:bg-indigo-100 active:scale-95 shadow-sm"><SafeIcon name="CheckCircle2" size={32}/>수업완료</button>
                                    <button onClick={() => {
                                        const parts = selectedCell.split('-');
                                        const [d, p, c] = [`${parts[0]}-${parts[1]}-${parts[2]}`, parseInt(parts[3]), parts[4]];
                                        const data = getCellData(d, p, c);
                                        if(data) saveData('overrides', selectedCell, { ...data, status: 'cancelled', classLabel: c }).then(() => setIsModalOpen(false));
                                        else setIsModalOpen(false);
                                    }} className="p-7 bg-rose-50 text-rose-600 rounded-[2rem] border-2 border-rose-100 font-black flex flex-col items-center gap-2 hover:bg-rose-100 active:scale-95 shadow-sm"><SafeIcon name="X" size={32}/>결손처리</button>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => { window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'overrides', selectedCell)); setIsModalOpen(false); }} className="flex-1 py-3 bg-slate-100 text-slate-400 rounded-xl font-black text-[9px] uppercase tracking-widest">Reset</button>
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 py-3 bg-slate-900 text-white rounded-xl font-black shadow-lg text-[9px] uppercase tracking-widest">Close</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-4 right-4 flex items-center gap-2 bg-slate-900/90 text-white px-4 py-2 rounded-full shadow-2xl z-40 border border-white/10 backdrop-blur-md opacity-80 scale-90">
                        <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_8px_rgba(52,211,153,0.8)]"></div>
                        <span className="text-[8px] font-black tracking-widest uppercase leading-none">Jeondam Mark Live Sync</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
