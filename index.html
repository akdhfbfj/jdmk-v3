<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전담 마크 Pro V6.3 - 통합 시수 & 학사 관리 시스템</title>
    
    <!-- 1. 스타일 및 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    
    <!-- 2. Firebase 설정 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, Timestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore as getFS, doc as getD, setDoc as setD, getDoc as getDocD, collection as collD, onSnapshot as onS, deleteDoc as delD, Timestamp as TS, query as qD, orderBy as obD, limit as limD } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBWxSDDYkOtaZI9dByQ85A0izlrCmHEoIQ",
          authDomain: "jdmk-v2.firebaseapp.com",
          projectId: "jdmk-v2",
          storageBucket: "jdmk-v2.firebasestorage.app",
          messagingSenderId: "279087439497",
          appId: "1:279087439497:web:e7f19f6a911483248cb058",
          measurementId: "G-PH80PJW6TC"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFS(app);
            const appId = 'jdmk-v5-final'; 

            window.fb = { auth, db, appId, doc: getD, setDoc: setD, getDoc: getDocD, collection: collD, onSnapshot: onS, deleteDoc: delD, Timestamp: TS, signInAnonymously, onAuthStateChanged, query: qD, orderBy: obD, limit: limD };
            window.fbReady = true; 
        } catch (e) {
            window.fbError = e.message;
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top: 3px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-sat { color: #2563eb; }
        .day-sun { color: #dc2626; }
        .bg-weekend { background-color: #f8fafc; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
        .config-table td, .config-table th { min-width: 0 !important; width: 16.66% !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white;">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-weight: 700; color: #4f46e5; font-size: 0.8rem;">전담 마크 Pro V6.3 초정밀 보정 중...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createElement } = React;

        const SafeIcon = ({ name, size = 16, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => {
                const check = setInterval(() => { if (window.lucide) { setReady(true); clearInterval(check); } }, 50);
                return () => clearInterval(check);
            }, []);
            if (!ready || !window.lucide?.icons[name]) return <div style={{width: size, height: size}} className={className} />;
            const iconData = window.lucide.icons[name];
            return createElement('svg', { ...iconData[1], width: size, height: size, className: className, key: name },
                iconData[2].map((child, i) => createElement(child[0], { ...child[1], key: i }))
            );
        };

        const DAYS = ['월', '화', '수', '목', '금'];
        const PERIODS = [1, 2, 3, 4, 5, 6];
        const TARGET_CLASSES = ['1반', '2반', '3반', '4반'];
        const SPECIALISTS = [
            { id: 'english', name: '영어', color: 'bg-indigo-600', text: 'text-indigo-700', bg: 'bg-indigo-50', border: 'border-indigo-200' },
            { id: 'science', name: '과학', color: 'bg-emerald-600', text: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200' },
            { id: 'pe', name: '체육', color: 'bg-rose-600', text: 'text-rose-700', bg: 'bg-rose-50', border: 'border-rose-200' },
            { id: 'external', name: '외부강사', color: 'bg-amber-600', text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(window.fbError || null);

            const [baseSchedule, setBaseSchedule] = useState({});
            const [overrides, setOverrides] = useState({});
            const [targetHours, setTargetHours] = useState({ english: 30, science: 30, pe: 30 });
            
            const [activeTab, setActiveTab] = useState('academic'); 
            const [viewMode, setViewMode] = useState('weekly'); 
            const [selectedDate, setSelectedDate] = useState(new Date().toLocaleDateString('en-CA')); // YYYY-MM-DD 안전 보장
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedCell, setSelectedCell] = useState(null);
            
            const [editingSchedule, setEditingSchedule] = useState({});
            const [selectedSpec, setSelectedSpec] = useState('all'); 
            const [quickClass, setQuickClass] = useState('1반');
            const [isSaving, setIsSaving] = useState(false);

            const [instTitle, setInstTitle] = useState("");
            const [instDates, setInstDates] = useState("");
            const [instClass, setInstClass] = useState("1반");
            const [instStart, setInstStart] = useState(1);
            const [instEnd, setInstEnd] = useState(1);

            useEffect(() => {
                const checkInterval = setInterval(() => {
                    if (window.fbReady && window.fb) {
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        signInAnonymously(auth).catch(e => setError(e.code));
                        onAuthStateChanged(auth, setUser);
                        clearInterval(checkInterval);
                    }
                }, 100);
                setTimeout(() => setIsLoading(false), 2000); 
                return () => clearInterval(checkInterval);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                const unsubs = [
                    onSnapshot(path('base'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setBaseSchedule(d);
                    }),
                    onSnapshot(path('overrides'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setOverrides(d);
                        setIsLoading(false);
                    }),
                    onSnapshot(path('academic'), (s) => {
                        s.docs.forEach(doc => { if (doc.id === 'targets') setTargetHours(doc.data()); });
                    })
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            const saveData = async (coll, id, data) => {
                const { db, appId, doc, setDoc, Timestamp } = window.fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coll, id), { ...data, updatedAt: Timestamp.now() });
            };

            // 타임존 오류 없는 날짜 계산 로직
            const getMonday = (dateStr) => {
                const date = new Date(dateStr + 'T00:00:00');
                const day = date.getDay(); // 0(일) ~ 6(토)
                const diff = date.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(date.setDate(diff));
                const y = monday.getFullYear();
                const m = String(monday.getMonth() + 1).padStart(2, '0');
                const d = String(monday.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            };

            const getCellData = (dateStr, period, classLabel) => {
                const overrideKey = `${dateStr}-${period}-${classLabel}`;
                const date = new Date(dateStr + 'T00:00:00'); 
                const dayIdx = (date.getDay() + 6) % 7; // 0(월) ~ 4(금)
                
                const override = overrides[overrideKey];
                
                // 전담 고정 시간표(baseSchedule) 매칭
                const baseMatch = Object.values(baseSchedule).find(v => 
                    v.dayIdx === dayIdx && v.period === period && v.classLabel === classLabel
                );
                
                if (override) {
                    const isConflict = baseMatch && override.type === 'external';
                    return { ...override, isConflict };
                }
                if (baseMatch) return { type: baseMatch.type };
                return null;
            };

            const parseSmartDates = (input) => {
                if (!input) return [];
                const currentYear = new Date().getFullYear();
                return input.split(/[,|\n\s]+/).map(d => {
                    let s = d.trim().replace(/\//g, '.');
                    if (!s) return null;
                    const parts = s.split('.');
                    let formatted = "";
                    if (parts.length === 2) {
                        formatted = `${currentYear}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
                    } else if (parts.length === 3) {
                        formatted = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
                    }
                    const date = new Date(formatted + 'T00:00:00');
                    if (isNaN(date.getTime())) return null;
                    const y = date.getFullYear();
                    const m = String(date.getMonth() + 1).padStart(2, '0');
                    const d_ = String(date.getDate()).padStart(2, '0');
                    return `${y}-${m}-${d_}`;
                }).filter(d => d);
            };

            const recentInstructorLessons = useMemo(() => {
                return Object.entries(overrides)
                    .filter(([key, val]) => val?.type === 'external')
                    .map(([key, val]) => ({ key, ...val }))
                    .sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0))
                    .slice(0, 10);
            }, [overrides]);

            const stats = useMemo(() => {
                const res = {};
                TARGET_CLASSES.forEach(c => res[c] = { english: 0, science: 0, pe: 0, external: 0, externalLessons: [] });
                Object.values(overrides).forEach(v => {
                    if (v && v.status === 'held' && res[v.classLabel]) {
                        res[v.classLabel][v.type]++;
                        if (v.type === 'external' && v.title) {
                            if (!res[v.classLabel].externalLessons.some(l => l.title === v.title)) {
                                res[v.classLabel].externalLessons.push({ title: v.title, date: v.updatedAt });
                            }
                        }
                    }
                });
                return res;
            }, [overrides]);

            if (isLoading) return null;

            return (
                <div className="min-h-screen flex flex-col animate-in">
                    <header className="bg-white border-b px-4 py-1.5 flex flex-col lg:flex-row justify-between items-center gap-2 sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-900 p-1.5 rounded-lg text-white shadow-md"><SafeIcon name="ClipboardCheck" size={16} /></div>
                            <h1 className="text-sm font-black text-slate-800 tracking-tighter">전담 마크 <span className="text-indigo-600 italic">V6.3</span></h1>
                        </div>
                        <nav className="flex bg-slate-100 p-0.5 rounded-xl">
                            {[
                                { id: 'academic', label: '학사 일정 확인', icon: 'Calendar' },
                                { id: 'instructor', label: '강사 수업 등록', icon: 'Layers' },
                                { id: 'config', label: '전담 시간 등록', icon: 'Settings' },
                                { id: 'stats', label: '통계', icon: 'BarChart3' },
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                    <SafeIcon name={tab.icon} size={14} /> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="p-2 lg:p-4 max-w-7xl mx-auto w-full flex-1">
                        {/* 1. 학사 일정 확인 탭 */}
                        {activeTab === 'academic' && (
                            <div className="space-y-3">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-3 bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-3">
                                        <div className="flex items-center gap-1">
                                            <button onClick={() => { 
                                                const d = new Date(selectedDate + 'T00:00:00'); 
                                                d.setDate(d.getDate() - (viewMode === 'weekly' ? 7 : 1)); 
                                                setSelectedDate(new Date(d).toLocaleDateString('en-CA')); 
                                            }} className="p-2 border rounded-xl hover:bg-slate-50 transition-all btn-press"><SafeIcon name="ChevronLeft" size={18} /></button>
                                            <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="font-black text-slate-700 border-none bg-transparent focus:ring-0 cursor-pointer text-sm" />
                                            <button onClick={() => { 
                                                const d = new Date(selectedDate + 'T00:00:00'); 
                                                d.setDate(d.getDate() + (viewMode === 'weekly' ? 7 : 1)); 
                                                setSelectedDate(new Date(d).toLocaleDateString('en-CA')); 
                                            }} className="p-2 border rounded-xl hover:bg-slate-50 transition-all btn-press"><SafeIcon name="ChevronRight" size={18} /></button>
                                        </div>
                                        <div className="h-6 w-px bg-slate-200 hidden md:block mx-2"></div>
                                        <button onClick={() => { alert("달력을 최신 데이터로 업데이트했습니다."); window.location.reload(); }} className="flex items-center gap-2 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl font-black text-[11px] hover:bg-indigo-100 transition-all btn-press shadow-sm">
                                            <SafeIcon name="RefreshCw" size={14} /> 전담 시간표 반영
                                        </button>
                                    </div>
                                    <div className="flex bg-slate-100 p-1 rounded-xl">
                                        {['daily', 'weekly', 'monthly'].map(mode => (
                                            <button key={mode} onClick={() => setViewMode(mode)} className={`px-4 py-1.5 rounded-lg text-[10px] font-black transition-all ${viewMode === mode ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>{mode === 'daily' ? '일별' : mode === 'weekly' ? '주별' : '월별'}</button>
                                        ))}
                                    </div>
                                </div>

                                {viewMode === 'weekly' && (
                                    <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-x-auto animate-in no-scrollbar">
                                        <table className="w-full border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b">
                                                    <th className="p-3 border-r w-16 text-[10px] font-black text-slate-300 uppercase tracking-widest">교시</th>
                                                    {(() => {
                                                        const mondayStr = getMonday(selectedDate);
                                                        return DAYS.map((d, i) => {
                                                            const colDate = new Date(mondayStr + 'T00:00:00');
                                                            colDate.setDate(colDate.getDate() + i);
                                                            const dateStr = new Date(colDate).toLocaleDateString('en-CA');
                                                            const isToday = dateStr === new Date().toLocaleDateString('en-CA');
                                                            return <th key={i} className={`p-4 border-r min-w-[150px] ${isToday ? 'bg-indigo-50/30' : ''}`}>
                                                                <div className="text-[10px] text-slate-300 font-bold">{dateStr.split('-').slice(1).join('.')}</div>
                                                                <div className={`font-black text-sm ${isToday ? 'text-indigo-600' : 'text-slate-700'}`}>{d}요일</div>
                                                            </th>;
                                                        });
                                                    })()}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {PERIODS.map(p => (
                                                    <tr key={p} className="border-b last:border-0">
                                                        <td className="p-4 bg-slate-50/20 border-r text-center font-black text-slate-200 text-3xl italic tracking-tighter leading-none">{p}</td>
                                                        {(() => {
                                                            const mondayStr = getMonday(selectedDate);
                                                            return DAYS.map((_, i) => {
                                                                const colDate = new Date(mondayStr + 'T00:00:00');
                                                                colDate.setDate(colDate.getDate() + i);
                                                                const dateStr = new Date(colDate).toLocaleDateString('en-CA');
                                                                return <td key={i} className="p-1.5 border-r last:border-0 align-top h-24">
                                                                    <div className="space-y-1">
                                                                        {TARGET_CLASSES.map(cls => {
                                                                            const data = getCellData(dateStr, p, cls);
                                                                            const spec = SPECIALISTS.find(s => s.id === data?.type);
                                                                            if (!spec) return null;
                                                                            return <div key={cls} onClick={() => { setSelectedCell(`${dateStr}-${p}-${cls}`); setIsModalOpen(true); }} className={`p-1.5 rounded-xl border text-[9px] font-bold truncate flex items-center justify-between cursor-pointer transition-all hover:brightness-95 ${spec.bg} ${spec.text} ${spec.border} shadow-sm`}>
                                                                                <span>{cls}: {data.title || spec.name}</span>
                                                                                {data.isConflict && <SafeIcon name="AlertTriangle" size={10} className="text-rose-500" />}
                                                                            </div>;
                                                                        })}
                                                                    </div>
                                                                </td>;
                                                            });
                                                        })()}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {viewMode === 'daily' && (
                                    <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden animate-in">
                                        <div className="grid grid-cols-5 bg-slate-50 border-b">
                                            <div className="p-3 text-center text-[10px] font-black text-slate-300 uppercase tracking-widest">교시</div>
                                            {TARGET_CLASSES.map(c => <div key={c} className="p-3 text-center text-xs font-black text-slate-500 opacity-60 uppercase">5-{c}</div>)}
                                        </div>
                                        <div className="divide-y divide-slate-100">
                                            {PERIODS.map(p => (
                                                <div key={p} className="grid grid-cols-5 min-h-[90px]">
                                                    <div className="flex items-center justify-center bg-slate-50/20 border-r border-slate-100 font-black text-slate-200 text-4xl italic tracking-tighter leading-none">{p}</div>
                                                    {TARGET_CLASSES.map(cls => {
                                                        const data = getCellData(selectedDate, p, cls);
                                                        const spec = SPECIALISTS.find(s => s.id === data?.type);
                                                        return (
                                                            <div key={cls} onClick={() => { setSelectedCell(`${selectedDate}-${p}-${cls}`); setIsModalOpen(true); }} className={`p-3 border-r last:border-0 relative cursor-pointer group transition-all ${spec ? `${spec.bg} hover:brightness-95` : 'hover:bg-indigo-50/20'}`}>
                                                                {data?.isConflict && <div className="absolute top-1 right-1 text-rose-500 animate-pulse"><SafeIcon name="AlertTriangle" size={12}/></div>}
                                                                {spec ? (
                                                                    <div className="h-full flex flex-col justify-center">
                                                                        <div className={`text-[14px] font-black ${spec.text}`}>{data.title || spec.name}</div>
                                                                        {data.title && <div className="text-[10px] font-bold text-slate-400 truncate mt-1 italic leading-none">{spec.name}</div>}
                                                                        {data.status === 'held' && <div className="mt-2 text-indigo-600"><SafeIcon name="CheckCircle2" size={14}/></div>}
                                                                    </div>
                                                                ) : (
                                                                    <div className="h-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><SafeIcon name="Plus" className="text-slate-200" size={20} /></div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {viewMode === 'monthly' && (
                                    <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-3 animate-in">
                                        <div className="calendar-grid border-l border-t rounded-2xl overflow-hidden shadow-inner bg-slate-50/10">
                                            {['일', '월', '화', '수', '목', '금', '토'].map((d, i) => (
                                                <div key={d} className={`p-2.5 bg-slate-50 border-r border-b text-center text-[10px] font-black ${i === 0 ? 'day-sun' : i === 6 ? 'day-sat' : 'text-slate-300'}`}>{d}</div>
                                            ))}
                                            {(() => {
                                                const d = new Date(selectedDate + 'T00:00:00');
                                                const firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
                                                const totalDays = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
                                                const cells = [];
                                                for(let i=0; i<firstDay; i++) cells.push(<div key={`empty-${i}`} className="p-2 border-r border-b bg-slate-50/5"></div>);
                                                for(let i=1; i<=totalDays; i++) {
                                                    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                                                    const dayOfWeek = new Date(dateStr + 'T00:00:00').getDay();
                                                    const isToday = dateStr === new Date().toLocaleDateString('en-CA');
                                                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                                                    const lessons = [];
                                                    TARGET_CLASSES.forEach(cls => {
                                                        PERIODS.forEach(p => {
                                                            const lesson = getCellData(dateStr, p, cls);
                                                            if (lesson && lesson.type) lessons.push({ cls, period: p, ...lesson });
                                                        });
                                                    });
                                                    cells.push(
                                                        <div key={i} onClick={() => {setSelectedDate(dateStr); setViewMode('daily');}} className={`p-1.5 border-r border-b min-h-[105px] transition-all hover:bg-indigo-50/20 cursor-pointer ${isWeekend ? 'bg-weekend' : 'bg-white'} ${isToday ? 'ring-2 ring-inset ring-indigo-200' : ''}`}>
                                                            <div className={`text-[11px] font-black mb-1.5 ${dayOfWeek === 0 ? 'day-sun' : dayOfWeek === 6 ? 'day-sat' : 'text-slate-300'}`}>{i}</div>
                                                            <div className="space-y-1">
                                                                {lessons.slice(0, 5).map((l, idx) => (
                                                                    <div key={idx} className={`text-[8px] font-bold truncate px-1.5 py-0.5 rounded-lg border flex items-center justify-between ${SPECIALISTS.find(s=>s.id===l.type)?.bg} ${SPECIALISTS.find(s=>s.id===l.type)?.text} ${SPECIALISTS.find(s=>s.id===l.type)?.border} shadow-sm`}>
                                                                        <span>{l.period} {l.cls}</span>
                                                                        {l.isConflict && <div className="w-1.5 h-1.5 bg-rose-500 rounded-full"></div>}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    );
                                                }
                                                return cells;
                                            })()}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 2. 강사 수업 등록 */}
                        {activeTab === 'instructor' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in">
                                <div className="lg:col-span-2 bg-amber-600 p-8 rounded-[3rem] shadow-xl text-white relative overflow-hidden h-fit">
                                    <div className="absolute -top-10 -right-10 opacity-10 rotate-12"><SafeIcon name="Layers" size={180}/></div>
                                    <h3 className="text-xl font-black mb-1 flex items-center gap-2 relative z-10 italic uppercase tracking-widest leading-none"><SafeIcon name="Layers" size={24}/> 강사 수업 등록</h3>
                                    <p className="text-amber-100 text-[11px] mb-8 font-medium relative z-10 opacity-80 uppercase tracking-tighter">Enter external instructor schedules for batches.</p>
                                    <div className="space-y-6 relative z-10">
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                            <div className="space-y-2">
                                                <label className="text-[11px] font-black opacity-60 ml-1 uppercase tracking-widest">수업명</label>
                                                <input type="text" value={instTitle} onChange={e => setInstTitle(e.target.value)} placeholder="예: 창체 한자" className="w-full p-3.5 rounded-2xl bg-white/10 border-none text-white placeholder-white/30 font-black focus:bg-white focus:text-slate-800 text-[13px] outline-none transition-all shadow-inner" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[11px] font-black opacity-60 ml-1 uppercase tracking-widest">대상 반</label>
                                                <select value={instClass} onChange={e => setInstClass(e.target.value)} className="w-full p-3.5 rounded-2xl bg-white/20 border-none text-white font-black text-[13px] cursor-pointer outline-none relative z-20">
                                                    {TARGET_CLASSES.map(c => <option key={c} value={c} className="text-slate-800">{c}</option>)}
                                                    <option value="학년공통" className="text-slate-800">학년전체</option>
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[11px] font-black opacity-60 ml-1 uppercase tracking-widest">시작</label>
                                                <select value={instStart} onChange={e => setInstStart(parseInt(e.target.value))} className="w-full p-3.5 rounded-2xl bg-white/20 border-none text-white font-black text-[13px] cursor-pointer outline-none relative z-20">
                                                    {PERIODS.map(p => <option key={p} value={p} className="text-slate-800">{p}교시</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[11px] font-black opacity-60 ml-1 uppercase tracking-widest">종료</label>
                                                <select value={instEnd} onChange={e => setInstEnd(parseInt(e.target.value))} className="w-full p-3.5 rounded-2xl bg-white/20 border-none text-white font-black text-[13px] cursor-pointer outline-none relative z-20">
                                                    {PERIODS.map(p => <option key={p} value={p} className="text-slate-800">{p}교시</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[11px] font-black opacity-60 ml-1 uppercase italic tracking-widest">날짜 입력 (예: 3/30, 4.15, 2026.5.20 등)</label>
                                            <textarea value={instDates} onChange={e => setInstDates(e.target.value)} placeholder="쉼표나 엔터로 구분해 여러 날짜를 입력하세요." className="w-full p-5 rounded-[2rem] bg-white/10 border-none text-white placeholder-white/30 font-black min-h-[120px] focus:bg-white focus:text-slate-800 text-[13px] outline-none transition-all shadow-inner"></textarea>
                                        </div>
                                        <button onClick={async () => {
                                            const dates = parseSmartDates(instDates);
                                            if(!instTitle || dates.length === 0) return alert("수업명과 유효한 날짜를 확인하세요.");
                                            setIsSaving(true);
                                            try {
                                                for(const d of dates) {
                                                    const classesToSave = instClass === '학년공통' ? TARGET_CLASSES : [instClass];
                                                    for(const singleCls of classesToSave) {
                                                        for(let i = instStart; i <= instEnd; i++) {
                                                            await saveData('overrides', `${d}-${i}-${singleCls}`, { title: instTitle, type: 'external', status: 'held', classLabel: singleCls, updatedAt: window.fb.Timestamp.now() });
                                                        }
                                                    }
                                                }
                                                alert("달력에 성공적으로 반영되었습니다!"); setActiveTab('academic'); setInstTitle(""); setInstDates("");
                                            } catch (e) { alert("오류 발생: " + e.message); }
                                            setIsSaving(false);
                                        }} disabled={isSaving} className="w-full py-5 bg-white text-amber-600 font-black rounded-[2rem] shadow-xl transition-all active:scale-[0.98] text-[16px] tracking-widest hover:bg-amber-50 btn-press">
                                            {isSaving ? '반영 중...' : '달력에 반영'}
                                        </button>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-[3rem] shadow-sm border border-slate-200 h-fit">
                                    <h4 className="text-sm font-black text-slate-800 mb-5 flex items-center gap-2 italic uppercase leading-none"><SafeIcon name="List" className="text-amber-500" /> 최근 등록 수업</h4>
                                    <div className="space-y-4 max-h-[450px] overflow-y-auto custom-scrollbar pr-2">
                                        {recentInstructorLessons.map(lesson => (
                                            <div key={lesson.key} className="p-4 bg-slate-50 rounded-2xl flex justify-between items-center group border border-transparent hover:border-amber-100 transition-all shadow-sm">
                                                <div className="cursor-pointer flex-1">
                                                    <div className="text-[12px] font-black text-slate-800 truncate max-w-[160px]">{lesson.title}</div>
                                                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-tighter mt-1">{lesson.key.split('-').slice(0,3).join('.')} | {lesson.classLabel}</div>
                                                </div>
                                                <button onClick={async () => {
                                                    if(confirm("이 수업 기록을 삭제할까요?")) {
                                                        const { db, appId, deleteDoc, doc } = window.fb;
                                                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'overrides', lesson.key));
                                                    }
                                                }} className="p-2.5 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl opacity-0 group-hover:opacity-100 transition-all"><SafeIcon name="Trash2" size={16} /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. 전담 시간 등록 */}
                        {activeTab === 'config' && (
                            <div className="space-y-5 animate-in max-w-5xl mx-auto overflow-hidden">
                                <div className="bg-indigo-600 p-7 rounded-[3rem] text-white flex flex-col lg:flex-row justify-between items-center gap-5 shadow-lg relative overflow-hidden">
                                    <div className="relative z-10 text-center lg:text-left flex-1">
                                        <h3 className="text-2xl font-black mb-1.5 italic tracking-tighter uppercase leading-none">전담 시간표 마스터 세팅</h3>
                                        <p className="opacity-80 text-[12px] font-medium leading-none">과목별 독립 저장. 저장 시 학사 일정 달력에 즉시 동기화됩니다.</p>
                                    </div>
                                    <div className="flex flex-col lg:flex-row gap-3 relative z-10 items-center">
                                        <button onClick={async () => {
                                            setIsSaving(true);
                                            const { db, appId, doc, setDoc, deleteDoc, Timestamp } = window.fb;
                                            try {
                                                const savePromises = Object.entries(editingSchedule).map(([key, data]) => 
                                                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'base', key), { ...data, updatedAt: Timestamp.now() })
                                                );
                                                const deletePromises = Object.keys(baseSchedule)
                                                    .filter(key => key.endsWith(`-${selectedSpec}`) && !editingSchedule[key])
                                                    .map(key => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'base', key)));
                                                await Promise.all([...savePromises, ...deletePromises]);
                                                alert("기본 시간표가 저장되었습니다. 학사 일정 탭에서 확인하세요!"); 
                                                setBaseSchedule(editingSchedule);
                                                setActiveTab('academic');
                                            } catch(e) { alert("저장 실패: " + e.message); }
                                            setIsSaving(false);
                                        }} disabled={isSaving || selectedSpec === 'all'} className={`px-6 py-3.5 bg-white text-indigo-600 rounded-[1.5rem] font-black text-xs shadow-xl transition-all btn-press flex items-center gap-2 ${selectedSpec === 'all' ? 'opacity-50 grayscale cursor-not-allowed' : 'hover:scale-105'}`}>
                                            <SafeIcon name="CloudUpload" size={16}/> Save to Cloud
                                        </button>
                                        <div className="flex gap-1.5 p-1.5 bg-white/10 rounded-2xl border border-white/10 overflow-x-auto no-scrollbar max-w-[320px]">
                                            <button onClick={() => setSelectedSpec('all')} className={`px-5 py-2.5 rounded-xl font-black transition-all whitespace-nowrap text-[12px] ${selectedSpec === 'all' ? 'bg-indigo-400 text-white shadow-md' : 'hover:bg-white/10'}`}>전체보기</button>
                                            {SPECIALISTS.filter(s=>s.id!=='external').map(s => (
                                                <button key={s.id} onClick={() => setSelectedSpec(s.id)} className={`px-5 py-2.5 rounded-xl font-black transition-all whitespace-nowrap text-[12px] ${selectedSpec === s.id ? 'bg-white text-indigo-600 shadow-md' : 'hover:bg-white/10'}`}>{s.name}</button>
                                            ))}
                                        </div>
                                        {selectedSpec !== 'all' && (
                                            <div className="flex gap-2">
                                                <input type="text" value={quickClass || ""} onChange={e => setQuickClass(e.target.value)} placeholder="반 (예: 1반)" className="w-28 p-2.5 rounded-xl bg-white/20 border-none text-white placeholder-white/30 font-black text-center text-sm outline-none focus:bg-white focus:text-slate-800 transition-all shadow-inner" />
                                                <button onClick={() => setQuickClass(null)} className={`p-2.5 rounded-xl font-black transition-all text-xs flex items-center gap-1 ${quickClass === null ? 'bg-rose-500 text-white shadow-lg' : 'bg-rose-500/20 text-white border border-rose-400/20 hover:bg-rose-500/40'}`}><SafeIcon name="Eraser" size={16}/></button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-[3rem] border border-slate-200 shadow-sm overflow-hidden w-full relative min-h-[500px]">
                                    <div className="absolute top-5 left-6 flex gap-3 z-10">
                                        <button onClick={() => { if(confirm("DB 데이터를 불러올까요?")) setEditingSchedule(baseSchedule); }} className="px-4 py-2 bg-slate-100 text-slate-500 text-[10px] font-black rounded-xl border hover:bg-white transition-all shadow-sm uppercase tracking-widest">Load DB</button>
                                        <button onClick={() => { if(confirm("편집창을 비울까요?")) setEditingSchedule({}); }} className="px-4 py-2 bg-rose-50 text-rose-400 text-[10px] font-black rounded-xl border border-rose-100 hover:bg-white transition-all shadow-sm uppercase tracking-widest">Reset Edit</button>
                                    </div>
                                    <table className="w-full border-collapse config-table mt-16">
                                        <thead><tr className="bg-slate-50 border-b"><th className="p-5 border-r text-[11px] font-black text-slate-300 uppercase tracking-widest">교시</th>{DAYS.map(d=><th key={d} className="p-5 border-r font-black text-slate-700 text-[16px] uppercase italic tracking-tighter">{d}요일</th>)}</tr></thead>
                                        <tbody>
                                            {PERIODS.map(p=>(
                                                <tr key={p} className="border-b last:border-0"><td className="p-5 bg-slate-50 border-r text-center font-black text-slate-200 text-6xl italic tracking-tighter leading-none">{p}</td>
                                                    {DAYS.map((_, dIdx)=>{
                                                        if (selectedSpec === 'all') {
                                                            const cellItems = Object.values(baseSchedule).filter(v => v.dayIdx === dIdx && v.period === p);
                                                            return (
                                                                <td key={dIdx} className="p-2 border-r last:border-0 align-top">
                                                                    <div className="flex flex-col gap-1.5 min-h-[95px] p-1">
                                                                        {cellItems.map((item, idx) => (
                                                                            <div key={idx} className={`p-1.5 rounded-xl border text-[10px] font-black ${SPECIALISTS.find(s=>s.id===item.type)?.bg} ${SPECIALISTS.find(s=>s.id===item.type)?.text} ${SPECIALISTS.find(s=>s.id===item.type)?.border} shadow-sm truncate`}>
                                                                                {SPECIALISTS.find(s=>s.id===item.type)?.name}: {item.classLabel}
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </td>
                                                            );
                                                        } else {
                                                            const key = `${dIdx}-${p}-${selectedSpec}`;
                                                            const item = editingSchedule[key];
                                                            const others = Object.values(editingSchedule).filter(v => v.dayIdx === dIdx && v.period === p && v.type !== selectedSpec);
                                                            return (
                                                                <td key={dIdx} className="p-1.5 border-r last:border-0">
                                                                    <button onClick={() => {
                                                                        if (quickClass === null) {
                                                                            const newSched = {...editingSchedule}; delete newSched[key]; setEditingSchedule(newSched);
                                                                        } else if (quickClass.trim() !== "") {
                                                                            setEditingSchedule({...editingSchedule, [key]: { type: selectedSpec, classLabel: quickClass, dayIdx: dIdx, period: p }});
                                                                        }
                                                                    }} className={`w-full p-3 border-2 border-dashed rounded-[2.5rem] transition-all flex flex-col items-center justify-center min-h-[95px] ${item ? 'bg-indigo-50 border-indigo-200 text-indigo-700 font-black shadow-inner active:scale-95' : 'border-slate-50 text-slate-200 hover:border-indigo-100 active:scale-95'}`}>
                                                                        {item ? <span className="text-[17px] tracking-tighter leading-none">{item.classLabel}</span> : <div className="flex flex-col items-center opacity-40"><SafeIcon name="Plus" size={28} />{others.length > 0 && <span className="text-[9px] font-black mt-1 text-slate-300">({others.length}개 중합)</span>}</div>}
                                                                    </button>
                                                                </td>
                                                            );
                                                        }
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="bg-white p-7 rounded-[3rem] border border-slate-200 shadow-sm flex items-center justify-center">
                                    <div className="w-full lg:w-[450px] space-y-4">
                                        <h5 className="text-[12px] font-black text-slate-400 uppercase tracking-widest leading-none mb-4 flex items-center gap-2 justify-center"><SafeIcon name="BarChart3" size={16}/> 목표 시수 설정</h5>
                                        <div className="grid grid-cols-3 gap-4">
                                            {SPECIALISTS.filter(s=>['english', 'science', 'pe'].includes(s.id)).map(s => (
                                                <div key={s.id} className="space-y-1.5 text-center">
                                                    <label className="text-[10px] font-black text-slate-400 ml-1 leading-none uppercase tracking-tighter">{s.name}</label>
                                                    <input type="number" value={targetHours[s.id]} onChange={e => setTargetHours({...targetHours, [s.id]: parseInt(e.target.value) || 0})} className="w-full p-2.5 rounded-2xl bg-slate-50 border-none font-black text-indigo-600 text-[13px] text-center shadow-inner outline-none focus:ring-2 focus:ring-indigo-100" />
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => { saveData('academic', 'targets', targetHours); alert("목표 시수가 저장되었습니다."); }} className="w-full py-3 bg-slate-100 text-slate-400 rounded-2xl font-black text-[11px] hover:bg-slate-200 transition-all uppercase italic tracking-widest shadow-sm">Update Semester Targets</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 4. 통계 탭 */}
                        {activeTab === 'stats' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-in">
                                {TARGET_CLASSES.map(cls => (
                                    <div key={cls} className="bg-white p-10 rounded-[3.5rem] border border-slate-200 shadow-sm hover:shadow-xl transition-all group duration-500">
                                        <h3 className="text-[20px] font-black mb-10 flex justify-between items-center text-slate-800 tracking-tighter uppercase italic">{cls} 시수 통계 <div className="opacity-10 group-hover:opacity-30 transition-opacity"><SafeIcon name="BarChart3" size={40} /></div></h3>
                                        <div className="space-y-10">
                                            {SPECIALISTS.filter(s=>['english', 'science', 'pe'].includes(s.id)).map(spec => {
                                                const count = stats[cls]?.[spec.id] || 0;
                                                const target = targetHours[spec.id] || 30;
                                                const percent = Math.min((count / target) * 100, 100).toFixed(0);
                                                return (
                                                    <div key={spec.id} className="space-y-4">
                                                        <div className="flex justify-between items-end px-1">
                                                            <div className="flex items-center gap-2.5">
                                                                <div className={`w-4 h-4 rounded-full ${spec.color} shadow-sm border-2 border-white`}></div>
                                                                <span className="font-bold text-slate-500 text-[15px]">{spec.name}</span>
                                                            </div>
                                                            <span className="font-black text-slate-900 text-3xl leading-none tracking-tighter">{count} <span className="text-slate-300 font-bold text-[14px] tracking-tighter italic">/ {target}</span></span>
                                                        </div>
                                                        <div className="h-5 bg-slate-100 rounded-full overflow-hidden border-2 border-white shadow-inner relative">
                                                            <div className={`h-full ${spec.color} transition-all duration-1000 shadow-lg`} style={{ width: `${percent}%` }}></div>
                                                            {percent >= 100 && <div className="absolute inset-0 bg-white/20 animate-pulse"></div>}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            <div className="pt-8 border-t border-slate-50 flex justify-between items-center">
                                                <div className="flex items-center gap-2.5">
                                                    <div className="w-4 h-4 rounded-full bg-amber-500 shadow-sm border-2 border-white"></div>
                                                    <span className="font-bold text-slate-500 text-[15px]">강사 수업 누계</span>
                                                </div>
                                                <span className="font-black text-amber-600 text-3xl leading-none tracking-tighter">{stats[cls]?.external || 0} <span className="text-slate-300 font-bold text-[13px] tracking-tighter italic">차시</span></span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* 수업 체크 모달 */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-[4rem] p-12 shadow-2xl space-y-10 animate-in zoom-in-95">
                                <div className="text-center space-y-3">
                                    <h2 className="text-3xl font-black text-slate-800 tracking-tighter italic leading-none uppercase">Lesson Status</h2>
                                    <p className="text-[12px] text-slate-400 font-extrabold uppercase tracking-[0.25em] mt-3 leading-none bg-slate-50 py-2 rounded-full border">{selectedCell?.replace(/-/g, '.')}</p>
                                </div>
                                <div className="grid grid-cols-2 gap-6">
                                    <button onClick={() => {
                                        const parts = selectedCell.split('-');
                                        const [d, p, c] = [`${parts[0]}-${parts[1]}-${parts[2]}`, parseInt(parts[3]), parts[4]];
                                        const data = getCellData(d, p, c);
                                        if(data) saveData('overrides', selectedCell, { ...data, status: 'held', classLabel: c, updatedAt: window.fb.Timestamp.now() }).then(() => setIsModalOpen(false));
                                        else alert("등록된 수업 정보가 없습니다.");
                                    }} className="p-12 bg-indigo-50 text-indigo-600 rounded-[3rem] border-2 border-indigo-100 font-black flex flex-col items-center gap-4 transition-all hover:bg-indigo-100 active:scale-95 shadow-xl shadow-indigo-100/50 btn-press"><SafeIcon name="CheckCircle2" size={48}/>완료</button>
                                    <button onClick={() => {
                                        const parts = selectedCell.split('-');
                                        const [d, p, c] = [`${parts[0]}-${parts[1]}-${parts[2]}`, parseInt(parts[3]), parts[4]];
                                        const data = getCellData(d, p, c);
                                        if(data) saveData('overrides', selectedCell, { ...data, status: 'cancelled', classLabel: c, updatedAt: window.fb.Timestamp.now() }).then(() => setIsModalOpen(false));
                                        else setIsModalOpen(false);
                                    }} className="p-12 bg-rose-50 text-rose-600 rounded-[3rem] border-2 border-rose-100 font-black flex flex-col items-center gap-4 transition-all hover:bg-rose-100 active:scale-95 shadow-xl shadow-rose-100/50 btn-press"><SafeIcon name="X" size={48}/>결손</button>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => { window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'overrides', selectedCell)); setIsModalOpen(false); }} className="flex-1 py-5 bg-slate-100 text-slate-400 rounded-3xl font-black hover:bg-slate-200 transition-all text-[12px] uppercase tracking-widest leading-none border">Reset Data</button>
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 py-5 bg-slate-900 text-white rounded-3xl font-black shadow-xl active:scale-95 transition-all text-[12px] uppercase tracking-widest leading-none">Close Modal</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-8 right-8 flex items-center gap-3 bg-slate-900 text-white px-6 py-3.5 rounded-full shadow-2xl z-40 border border-white/10 backdrop-blur-md opacity-90 hover:opacity-100 transition-opacity scale-90">
                        <div className="w-2.5 h-2.5 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_10px_rgba(52,211,153,1)]"></div>
                        <span className="text-[11px] font-black tracking-widest uppercase leading-none italic">Cloud Sync Engine V6.3</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
