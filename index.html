<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전담 마크 Pro V5.0 - 통합 시수 관리 시스템</title>
    
    <!-- 1. 스타일 및 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    
    <!-- 2. Firebase 설정 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBWxSDDYkOtaZI9dByQ85A0izlrCmHEoIQ",
          authDomain: "jdmk-v2.firebaseapp.com",
          projectId: "jdmk-v2",
          storageBucket: "jdmk-v2.firebasestorage.app",
          messagingSenderId: "279087439497",
          appId: "1:279087439497:web:e7f19f6a911483248cb058",
          measurementId: "G-PH80PJW6TC"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = 'jdmk-v5-final';

            window.fb = { auth, db, appId, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, Timestamp, signInAnonymously, onAuthStateChanged };
            window.fbReady = true; 
        } catch (e) {
            window.fbError = e.message;
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-sat { color: #2563eb; }
        .day-sun { color: #dc2626; }
        .bg-weekend { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white;">
            <div class="spinner"></div>
            <p style="margin-top: 20px; font-weight: 800; color: #4f46e5;">전담 마크 Pro V5.0 최적화 중...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createElement } = React;

        const SafeIcon = ({ name, size = 18, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => {
                const check = setInterval(() => { if (window.lucide) { setReady(true); clearInterval(check); } }, 50);
                return () => clearInterval(check);
            }, []);
            if (!ready || !window.lucide?.icons[name]) return <div style={{width: size, height: size}} className={className} />;
            const iconData = window.lucide.icons[name];
            return createElement('svg', { ...iconData[1], width: size, height: size, className: className, key: name },
                iconData[2].map((child, i) => createElement(child[0], { ...child[1], key: i }))
            );
        };

        const DAYS = ['월', '화', '수', '목', '금'];
        const PERIODS = [1, 2, 3, 4, 5, 6];
        const TARGET_CLASSES = ['1반', '2반', '3반', '4반'];
        const SPECIALISTS = [
            { id: 'english', name: '영어', color: 'bg-indigo-600', text: 'text-indigo-700', bg: 'bg-indigo-50', border: 'border-indigo-200' },
            { id: 'science', name: '과학', color: 'bg-emerald-600', text: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200' },
            { id: 'pe', name: '체육', color: 'bg-rose-600', text: 'text-rose-700', bg: 'bg-rose-50', border: 'border-rose-200' },
            { id: 'external', name: '외부강사', color: 'bg-amber-600', text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(window.fbError || null);

            const [baseSchedule, setBaseSchedule] = useState({});
            const [overrides, setOverrides] = useState({});
            const [targetHours, setTargetHours] = useState({ english: 30, science: 30, pe: 30, external: 10 });
            
            const [activeTab, setActiveTab] = useState('lessons'); // lessons, instructor, config, stats
            const [viewMode, setViewMode] = useState('daily'); // daily, weekly, monthly
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedCell, setSelectedCell] = useState(null);
            const [selectedSpec, setSelectedSpec] = useState('english');

            useEffect(() => {
                const checkInterval = setInterval(() => {
                    if (window.fbReady && window.fb) {
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        signInAnonymously(auth).catch(e => setError(e.code));
                        onAuthStateChanged(auth, setUser);
                        clearInterval(checkInterval);
                    }
                }, 100);
                setTimeout(() => setIsLoading(false), 3000); 
                return () => clearInterval(checkInterval);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                const unsubs = [
                    onSnapshot(path('base'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setBaseSchedule(d);
                    }),
                    onSnapshot(path('overrides'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setOverrides(d);
                        setIsLoading(false);
                    }),
                    onSnapshot(path('academic'), (s) => {
                        s.docs.forEach(doc => { if (doc.id === 'targets') setTargetHours(doc.data()); });
                    })
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            const saveData = async (coll, id, data) => {
                const { db, appId, doc, setDoc, Timestamp } = window.fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coll, id), { ...data, updatedAt: Timestamp.now() });
                setIsModalOpen(false);
            };

            const getCellData = (dateStr, period, classLabel) => {
                const overrideKey = `${dateStr}-${period}-${classLabel}`;
                const date = new Date(dateStr);
                const dayIdx = (date.getDay() + 6) % 7;
                
                // 1. 결과(수업 진행/결손) 데이터 우선
                const override = overrides[overrideKey];
                
                // 2. 기본 전담 시간표 데이터
                const baseKey = `${dayIdx}-${period}`;
                const baseMatch = Object.entries(baseSchedule).find(([k, v]) => k === baseKey && v.classLabel === classLabel);
                
                // 중복 체크 로직
                const isConflict = override && override.type === 'external' && baseMatch;
                
                if (override) return { ...override, isConflict };
                if (baseMatch) return { type: baseMatch[1].type, isConflict };
                return null;
            };

            const parseSmartDates = (input) => {
                const currentYear = new Date().getFullYear();
                return input.split(/[,|\n]/).map(d => {
                    let s = d.trim().replace(/\//g, '.');
                    if (!s) return null;
                    if (s.split('.').length === 2) s = `${currentYear}.${s}`;
                    const date = new Date(s);
                    return isNaN(date.getTime()) ? null : date.toISOString().split('T')[0];
                }).filter(d => d);
            };

            const stats = useMemo(() => {
                const res = {};
                TARGET_CLASSES.forEach(c => res[c] = { english: 0, science: 0, pe: 0, external: 0 });
                Object.values(overrides).forEach(v => {
                    if (v.status === 'held' && res[v.classLabel]) res[v.classLabel][v.type]++;
                });
                return res;
            }, [overrides]);

            if (isLoading) return null;

            return (
                <div className="min-h-screen flex flex-col animate-in">
                    <header className="bg-white border-b px-6 py-4 flex flex-col lg:flex-row justify-between items-center gap-4 sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-900 p-2 rounded-xl text-white"><SafeIcon name="ClipboardCheck" size={20} /></div>
                            <h1 className="text-lg font-black text-slate-800 tracking-tighter">전담 마크 <span className="text-indigo-600 italic">PRO 5.0</span></h1>
                        </div>
                        <nav className="flex bg-slate-100 p-1 rounded-2xl">
                            {[
                                { id: 'lessons', label: '시수 관리', icon: 'Calendar' },
                                { id: 'instructor', label: '강사 수업 등록', icon: 'Layers' },
                                { id: 'config', label: '전담 시간 등록', icon: 'Settings' },
                                { id: 'stats', label: '통계', icon: 'BarChart3' },
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold transition-all ${activeTab === tab.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                    <SafeIcon name={tab.icon} /> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="p-4 lg:p-6 max-w-[1600px] mx-auto w-full flex-1">
                        {activeTab === 'lessons' && (
                            <div className="space-y-4">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => { const d = new Date(selectedDate); d.setDate(d.getDate()-1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-2 border rounded-xl hover:bg-slate-50"><SafeIcon name="ChevronLeft" /></button>
                                        <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="font-black text-slate-800 border-none bg-transparent focus:ring-0 cursor-pointer" />
                                        <button onClick={() => { const d = new Date(selectedDate); d.setDate(d.getDate()+1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-2 border rounded-xl hover:bg-slate-50"><SafeIcon name="ChevronRight" /></button>
                                    </div>
                                    <div className="flex bg-slate-100 p-1 rounded-xl">
                                        {['daily', 'weekly', 'monthly'].map(mode => (
                                            <button key={mode} onClick={() => setViewMode(mode)} className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase transition-all ${viewMode === mode ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>{mode === 'daily' ? '일별' : mode === 'weekly' ? '주별' : '월별'}</button>
                                        ))}
                                    </div>
                                </div>

                                {viewMode === 'daily' && (
                                    <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden animate-in">
                                        <div className="grid grid-cols-5 bg-slate-50 border-b">
                                            <div className="p-4 text-center text-[10px] font-black text-slate-400 uppercase">교시</div>
                                            {TARGET_CLASSES.map(c => <div key={c} className="p-4 text-center font-black text-slate-600 tracking-tighter italic opacity-60">5학년 {c}</div>)}
                                        </div>
                                        <div className="divide-y divide-slate-100">
                                            {PERIODS.map(p => (
                                                <div key={p} className="grid grid-cols-5 min-h-[100px]">
                                                    <div className="flex items-center justify-center bg-slate-50/50 border-r border-slate-100 font-black text-slate-200 text-4xl italic tracking-tighter">{p}</div>
                                                    {TARGET_CLASSES.map(cls => {
                                                        const data = getCellData(selectedDate, p, cls);
                                                        const spec = SPECIALISTS.find(s => s.id === data?.type);
                                                        return (
                                                            <div key={cls} onClick={() => { setSelectedCell(`${selectedDate}-${p}-${cls}`); setIsModalOpen(true); }} className={`p-3 border-r last:border-0 relative cursor-pointer group transition-all ${spec ? `${spec.bg} hover:brightness-95` : 'hover:bg-indigo-50/30'}`}>
                                                                {data?.isConflict && <div className="absolute top-2 right-2 text-rose-500 animate-pulse"><SafeIcon name="AlertTriangle" size={14}/></div>}
                                                                {spec ? (
                                                                    <div className="h-full flex flex-col justify-center">
                                                                        <div className={`text-sm font-black ${spec.text}`}>{spec.name}</div>
                                                                        {data.title && <div className="text-[10px] font-bold text-slate-400 truncate mt-1">{data.title}</div>}
                                                                        {data.status === 'held' && <div className="mt-2 text-indigo-600"><SafeIcon name="CheckCircle2" size={14}/></div>}
                                                                    </div>
                                                                ) : (
                                                                    <div className="h-full flex items-center justify-center opacity-0 group-hover:opacity-100"><SafeIcon name="Plus" className="text-slate-200" /></div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {viewMode === 'weekly' && (
                                    <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-x-auto animate-in">
                                        <table className="w-full border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b">
                                                    <th className="p-4 border-r w-20 text-[10px] font-black text-slate-400 uppercase">PERIOD</th>
                                                    {(() => {
                                                        const curr = new Date(selectedDate);
                                                        const first = curr.getDate() - ((curr.getDay() + 6) % 7);
                                                        return Array.from({length: 5}, (_, i) => {
                                                            const d = new Date(curr); d.setDate(first + i);
                                                            const dateStr = d.toISOString().split('T')[0];
                                                            return <th key={i} className="p-4 border-r min-w-[200px]">
                                                                <div className="text-[10px] text-slate-300 font-bold">{dateStr.split('-').slice(1).join('.')}</div>
                                                                <div className="font-black text-slate-700">{DAYS[i]}요일</div>
                                                            </th>;
                                                        });
                                                    })()}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {PERIODS.map(p => (
                                                    <tr key={p} className="border-b last:border-0">
                                                        <td className="p-4 bg-slate-50/30 border-r text-center font-black text-slate-200 text-3xl italic">{p}</td>
                                                        {(() => {
                                                            const curr = new Date(selectedDate);
                                                            const first = curr.getDate() - ((curr.getDay() + 6) % 7);
                                                            return Array.from({length: 5}, (_, i) => {
                                                                const d = new Date(curr); d.setDate(first + i);
                                                                const dateStr = d.toISOString().split('T')[0];
                                                                return <td key={i} className="p-2 border-r last:border-0 align-top h-24">
                                                                    <div className="space-y-1">
                                                                        {TARGET_CLASSES.map(cls => {
                                                                            const data = getCellData(dateStr, p, cls);
                                                                            const spec = SPECIALISTS.find(s => s.id === data?.type);
                                                                            if (!spec) return null;
                                                                            return <div key={cls} className={`p-1.5 rounded-lg border text-[10px] font-bold truncate flex items-center justify-between ${spec.bg} ${spec.text} ${spec.border}`}>
                                                                                <span>{cls}: {spec.name}</span>
                                                                                {data.isConflict && <SafeIcon name="AlertTriangle" size={10} className="text-rose-500" />}
                                                                            </div>;
                                                                        })}
                                                                    </div>
                                                                </td>;
                                                            });
                                                        })()}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {viewMode === 'monthly' && (
                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm p-6 animate-in space-y-6">
                                        <div className="calendar-grid border-l border-t rounded-2xl overflow-hidden">
                                            {['일', '월', '화', '수', '목', '금', '토'].map((d, i) => (
                                                <div key={d} className={`p-3 bg-slate-50 border-r border-b text-center text-xs font-black ${i === 0 ? 'day-sun' : i === 6 ? 'day-sat' : 'text-slate-400'}`}>{d}</div>
                                            ))}
                                            {(() => {
                                                const d = new Date(selectedDate);
                                                const firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
                                                const totalDays = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
                                                const cells = [];
                                                for(let i=0; i<firstDay; i++) cells.push(<div key={`empty-${i}`} className="p-4 border-r border-b bg-slate-50/20"></div>);
                                                for(let i=1; i<=totalDays; i++) {
                                                    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                                                    const dayOfWeek = new Date(dateStr).getDay();
                                                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                                                    const lessons = [];
                                                    TARGET_CLASSES.forEach(cls => {
                                                        PERIODS.forEach(p => {
                                                            const lesson = getCellData(dateStr, p, cls);
                                                            if (lesson && lesson.type) lessons.push({ cls, period: p, ...lesson });
                                                        });
                                                    });
                                                    cells.push(
                                                        <div key={i} onClick={() => {setSelectedDate(dateStr); setViewMode('daily');}} className={`p-2 border-r border-b min-h-[130px] transition-all hover:bg-indigo-50/30 cursor-pointer ${isWeekend ? 'bg-weekend' : ''}`}>
                                                            <div className={`text-xs font-black mb-2 ${dayOfWeek === 0 ? 'day-sun' : dayOfWeek === 6 ? 'day-sat' : 'text-slate-400'}`}>{i}</div>
                                                            <div className="space-y-1">
                                                                {lessons.slice(0, 4).map((l, idx) => (
                                                                    <div key={idx} className={`text-[9px] font-bold truncate p-0.5 px-1 rounded border flex items-center justify-between ${SPECIALISTS.find(s=>s.id===l.type)?.bg} ${SPECIALISTS.find(s=>s.id===l.type)?.text} ${SPECIALISTS.find(s=>s.id===l.type)?.border}`}>
                                                                        <span>{l.period}교시 {l.cls}</span>
                                                                        {l.isConflict && <div className="w-1 h-1 bg-rose-500 rounded-full"></div>}
                                                                    </div>
                                                                ))}
                                                                {lessons.length > 4 && <div className="text-[8px] font-black text-slate-300 text-center">+{lessons.length - 4}건 더 있음</div>}
                                                            </div>
                                                        </div>
                                                    );
                                                }
                                                return cells;
                                            })()}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'instructor' && (
                            <div className="max-w-3xl mx-auto space-y-8 animate-in">
                                <div className="bg-amber-600 p-8 rounded-[2.5rem] shadow-xl text-white relative overflow-hidden">
                                    <div className="absolute -top-10 -right-10 opacity-10 rotate-12"><SafeIcon name="Layers" size={200}/></div>
                                    <h3 className="text-2xl font-black mb-2 flex items-center gap-2 relative z-10"><SafeIcon name="Layers" size={24}/> 강사 수업 등록</h3>
                                    <p className="text-amber-100 text-sm mb-8 font-medium relative z-10">연속된 외부 강사 수업이나 학사 일정을 한 번에 등록합니다.</p>
                                    <div className="space-y-6 relative z-10">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black opacity-60 ml-2 uppercase">수업명</label>
                                                <input type="text" id="bulk-title" placeholder="예: 스포츠강사" className="w-full p-4 rounded-2xl bg-white/10 border-none text-white placeholder-white/40 font-black focus:bg-white focus:text-slate-800" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black opacity-60 ml-2 uppercase">대상 반</label>
                                                <select id="bulk-class" className="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-black focus:bg-white focus:text-slate-800 appearance-none">
                                                    {TARGET_CLASSES.map(c => <option key={c} value={c} className="text-slate-800">{c}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black opacity-60 ml-2 uppercase">교시</label>
                                                <select id="bulk-period" className="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-black focus:bg-white focus:text-slate-800 appearance-none">
                                                    {PERIODS.map(p => <option key={p} value={p} className="text-slate-800">{p}교시</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black opacity-60 ml-2 uppercase italic">날짜 입력 (예: 3/20, 3/27 또는 3.20, 3.27)</label>
                                            <textarea id="bulk-dates" placeholder="여러 날짜를 쉼표나 엔터로 구분해 입력하세요." className="w-full p-4 rounded-2xl bg-white/10 border-none text-white placeholder-white/40 font-black min-h-[100px] focus:bg-white focus:text-slate-800"></textarea>
                                        </div>
                                        <button onClick={async () => {
                                            const title = document.getElementById('bulk-title').value;
                                            const cls = document.getElementById('bulk-class').value;
                                            const p = parseInt(document.getElementById('bulk-period').value);
                                            const dates = parseSmartDates(document.getElementById('bulk-dates').value);
                                            if(!title || dates.length === 0) return alert("수업명과 날짜를 입력하세요.");
                                            for(const d of dates) {
                                                await saveData('overrides', `${d}-${p}-${cls}`, { title, type: 'external', status: 'held', classLabel: cls });
                                            }
                                            alert(`${dates.length}건의 수업이 등록되었습니다.`);
                                            setActiveTab('lessons');
                                        }} className="w-full py-5 bg-white text-amber-600 font-black rounded-2xl hover:bg-amber-50 shadow-xl transition-all active:scale-[0.98]">일괄 등록 완료</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'config' && (
                            <div className="space-y-6 animate-in max-w-5xl mx-auto">
                                <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white flex flex-col lg:flex-row justify-between items-center gap-6 shadow-xl relative overflow-hidden">
                                    <div className="relative z-10 text-center lg:text-left">
                                        <h3 className="text-2xl font-black mb-1 italic">Weekly Timetable Register</h3>
                                        <p className="opacity-80 text-sm font-medium">전담 과목을 선택하고 주간 시간표에서 담당 반을 클릭하여 등록하세요.</p>
                                    </div>
                                    <div className="flex gap-2 p-1.5 bg-white/10 rounded-2xl overflow-x-auto no-scrollbar relative z-10">
                                        {SPECIALISTS.filter(s=>s.id!=='external').map(s => (
                                            <button key={s.id} onClick={() => setSelectedSpec(s.id)} className={`px-6 py-2 rounded-xl text-xs font-black transition-all whitespace-nowrap ${selectedSpec === s.id ? 'bg-white text-indigo-600 shadow-xl' : 'hover:bg-white/10'}`}>{s.name}</button>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden overflow-x-auto">
                                    <table className="w-full border-collapse">
                                        <thead><tr className="bg-slate-50 border-b"><th className="p-4 border-r w-24 text-[10px] font-black text-slate-300 uppercase">PERIOD</th>{DAYS.map(d=><th key={d} className="p-4 border-r font-black text-slate-700">{d}요일</th>)}</tr></thead>
                                        <tbody>
                                            {PERIODS.map(p=>(
                                                <tr key={p} className="border-b last:border-0"><td className="p-4 bg-slate-50/30 border-r text-center font-black text-slate-200 text-5xl italic tracking-tighter">{p}</td>
                                                    {DAYS.map((_, dIdx)=>{
                                                        const key = `${dIdx}-${p}`;
                                                        const item = baseSchedule[key];
                                                        const isMine = item?.type === selectedSpec;
                                                        return (
                                                            <td key={dIdx} className="p-2 border-r last:border-0 min-w-[150px]">
                                                                <button onClick={() => {
                                                                    const cls = prompt("담당 반 입력 (예: 1반, 5-1 등)");
                                                                    if(cls) saveData('base', key, { type: selectedSpec, classLabel: cls });
                                                                    else if(cls === "") window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'base', key));
                                                                }} className={`w-full p-4 border-2 border-dashed rounded-2xl transition-all flex flex-col items-center justify-center min-h-[90px] ${isMine ? 'bg-indigo-50 border-indigo-200 text-indigo-700 font-black shadow-inner shadow-indigo-100' : 'border-slate-100 text-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}>
                                                                    {isMine ? <span className="text-base">{item.classLabel}</span> : <SafeIcon name="Plus" />}
                                                                </button>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm flex flex-col md:flex-row gap-8">
                                    <div className="flex-1 space-y-4">
                                        <h4 className="text-lg font-black text-slate-800 flex items-center gap-2 tracking-tight italic"><SafeIcon name="BarChart3" className="text-indigo-600" /> Lesson Target Hours</h4>
                                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                            {SPECIALISTS.map(s => (
                                                <div key={s.id} className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-tighter">{s.name} 목표</label>
                                                    <input type="number" value={targetHours[s.id]} onChange={e => setTargetHours({...targetHours, [s.id]: parseInt(e.target.value)})} className="w-full p-3 rounded-xl bg-slate-50 border-none font-black text-indigo-600 focus:ring-2 focus:ring-indigo-100 text-base" />
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => { saveData('academic', 'targets', targetHours); alert("목표 시수가 저장되었습니다."); }} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-sm shadow-xl transition-all active:scale-[0.98]">목표 시수 일괄 동기화</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in">
                                {TARGET_CLASSES.map(cls => (
                                    <div key={cls} className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm hover:shadow-xl transition-all duration-500 group">
                                        <h3 className="text-2xl font-black mb-8 flex justify-between items-center text-slate-800 tracking-tighter">5학년 {cls} 실시간 시수 <div className="opacity-10 group-hover:opacity-20 transition-opacity"><SafeIcon name="BarChart3" size={32} /></div></h3>
                                        <div className="space-y-10">
                                            {SPECIALISTS.map(spec => {
                                                const count = stats[cls]?.[spec.id] || 0;
                                                const target = targetHours[spec.id] || 30;
                                                const percent = Math.min((count / target) * 100, 100).toFixed(0);
                                                return (
                                                    <div key={spec.id} className="space-y-3">
                                                        <div className="flex justify-between items-end px-1">
                                                            <div className="flex items-center gap-2">
                                                                <div className={`w-3 h-3 rounded-full ${spec.color}`}></div>
                                                                <span className="font-bold text-slate-500 text-sm">{spec.name}</span>
                                                            </div>
                                                            <span className="font-black text-slate-900 text-2xl">{count} <span className="text-slate-300 font-bold text-xs">/ {target}</span></span>
                                                        </div>
                                                        <div className="h-4 bg-slate-100 rounded-full overflow-hidden border-2 border-white shadow-inner">
                                                            <div className={`h-full ${spec.color} transition-all duration-1000 shadow-sm shadow-indigo-100`} style={{ width: `${percent}%` }}></div>
                                                        </div>
                                                        <div className="flex justify-end pr-1"><span className={`text-[9px] font-black px-2 py-0.5 rounded-full ${percent >= 100 ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-50 text-indigo-500'}`}>{percent}% PROGRESS</span></div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl space-y-10 animate-in zoom-in-95">
                                <div className="text-center space-y-2">
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight italic">Lesson Status Update</h2>
                                    <p className="text-[10px] text-slate-400 font-extrabold uppercase tracking-[0.3em] leading-relaxed">{selectedCell?.replace(/-/g, '.')}</p>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => {
                                        const parts = selectedCell.split('-');
                                        const [d, p, c] = [`${parts[0]}-${parts[1]}-${parts[2]}`, parseInt(parts[3]), parts[4]];
                                        const data = getCellData(d, p, c);
                                        if(data) saveData('overrides', selectedCell, { ...data, status: 'held', classLabel: c });
                                        else alert("배정된 수업이 없습니다.");
                                    }} className="p-8 bg-indigo-50 text-indigo-600 rounded-[2.5rem] border-2 border-indigo-100 font-black flex flex-col items-center gap-3 transition-all hover:bg-indigo-100 active:scale-95 shadow-sm shadow-indigo-100"><SafeIcon name="CheckCircle2" size={40}/>진행 완료</button>
                                    <button onClick={() => {
                                        const parts = selectedCell.split('-');
                                        const [d, p, c] = [`${parts[0]}-${parts[1]}-${parts[2]}`, parseInt(parts[3]), parts[4]];
                                        const data = getCellData(d, p, c);
                                        if(data) saveData('overrides', selectedCell, { ...data, status: 'cancelled', classLabel: c });
                                        setIsModalOpen(false);
                                    }} className="p-8 bg-rose-50 text-rose-600 rounded-[2.5rem] border-2 border-rose-100 font-black flex flex-col items-center gap-3 transition-all hover:bg-rose-100 active:scale-95 shadow-sm shadow-rose-100"><SafeIcon name="X" size={40}/>결손 처리</button>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => { window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'overrides', selectedCell)); setIsModalOpen(false); }} className="flex-1 py-4 bg-slate-100 text-slate-400 rounded-2xl font-bold hover:bg-slate-200 transition-all text-xs">초기화</button>
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition-all text-xs">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-6 right-6 flex items-center gap-3 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl z-40 border border-white/10 backdrop-blur-md">
                        <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                        <span className="text-[10px] font-black tracking-widest uppercase">Live Sync Active</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
