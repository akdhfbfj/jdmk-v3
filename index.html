<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전담 마크 Pro V6.6 - 지능형 시수 관리 시스템</title>
    
    <!-- 1. 스타일 및 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    
    <!-- 2. Firebase 설정 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore as getFS, doc as getD, setDoc as setD, getDoc as getDocD, collection as collD, onSnapshot as onS, deleteDoc as delD, Timestamp as TS, query as qD, orderBy as obD, limit as limD } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBWxSDDYkOtaZI9dByQ85A0izlrCmHEoIQ",
          authDomain: "jdmk-v2.firebaseapp.com",
          projectId: "jdmk-v2",
          storageBucket: "jdmk-v2.firebasestorage.app",
          messagingSenderId: "279087439497",
          appId: "1:279087439497:web:e7f19f6a911483248cb058",
          measurementId: "G-PH80PJW6TC"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFS(app);
            const appId = 'jdmk-v5-final'; 

            window.fb = { auth, db, appId, doc: getD, setDoc: setD, getDoc: getDocD, collection: collD, onSnapshot: onS, deleteDoc: delD, Timestamp: TS, signInAnonymously, onAuthStateChanged, query: qD, orderBy: obD, limit: limD };
            window.fbReady = true; 
        } catch (e) {
            window.fbError = e.message;
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top: 3px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-sat { color: #2563eb; }
        .day-sun { color: #dc2626; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .btn-press:active { transform: scale(0.96); }
        .period-badge { display: inline-flex; align-items: center; justify-content: center; width: 1.4rem; height: 1.4rem; background: #334155; color: white; border-radius: 50%; font-size: 0.75rem; font-weight: 900; margin-right: 6px; }
        .conflict-glow { box-shadow: 0 0 12px rgba(225, 29, 72, 0.4); border-color: #fb7185 !important; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white;">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-weight: 700; color: #4f46e5; font-size: 0.8rem;">전담 마크 Pro V6.6 데이터 동기화 중...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createElement } = React;

        const SafeIcon = ({ name, size = 16, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => {
                const check = setInterval(() => { if (window.lucide) { setReady(true); clearInterval(check); } }, 50);
                return () => clearInterval(check);
            }, []);
            if (!ready || !window.lucide?.icons[name]) return <div style={{width: size, height: size}} className={className} />;
            const iconData = window.lucide.icons[name];
            return createElement('svg', { ...iconData[1], width: size, height: size, className: className, key: name },
                iconData[2].map((child, i) => createElement(child[0], { ...child[1], key: i }))
            );
        };

        const DAYS = ['월', '화', '수', '목', '금'];
        const PERIODS = [1, 2, 3, 4, 5, 6];
        const SPECIALISTS = [
            { id: 'english', name: '영어', color: 'bg-indigo-600', text: 'text-indigo-700', bg: 'bg-indigo-50', border: 'border-indigo-200' },
            { id: 'science', name: '과학', color: 'bg-emerald-600', text: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200' },
            { id: 'pe', name: '체육', color: 'bg-rose-600', text: 'text-rose-700', bg: 'bg-rose-50', border: 'border-rose-200' },
            { id: 'external', name: '외부강사', color: 'bg-amber-600', text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [baseSchedule, setBaseSchedule] = useState({});
            const [overrides, setOverrides] = useState({});
            const [targetHours, setTargetHours] = useState({ english: 30, science: 30, pe: 30 });
            
            const [activeTab, setActiveTab] = useState('academic'); 
            const [viewMode, setViewMode] = useState('weekly'); 
            const [selectedDate, setSelectedDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedCell, setSelectedCell] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            // 강사 수업 등록 폼
            const [instTitle, setInstTitle] = useState("");
            const [instDates, setInstDates] = useState("");
            const [instClass, setInstClass] = useState("5-1");
            const [instStart, setInstStart] = useState(1);
            const [instEnd, setInstEnd] = useState(1);

            // 전담 고정 시간표 등록 폼 (일괄 등록용)
            const [fixedSpec, setFixedSpec] = useState("english");
            const [fixedClass, setFixedClass] = useState("5-1");
            const [fixedSlots, setFixedSlots] = useState([]); 

            // 스케줄 이동(Reschedule) 임시 상태
            const [moveDate, setMoveDate] = useState("");
            const [movePeriod, setMovePeriod] = useState(1);

            // 동적 학급 목록 추출
            const dynamicClasses = useMemo(() => {
                const classSet = new Set(['5-1', '5-2', '5-3', '5-4']); 
                Object.values(baseSchedule).forEach(v => { if(v.classLabel) classSet.add(v.classLabel); });
                Object.values(overrides).forEach(v => { if(v.classLabel) classSet.add(v.classLabel); });
                return Array.from(classSet).sort();
            }, [baseSchedule, overrides]);

            useEffect(() => {
                const checkInterval = setInterval(() => {
                    if (window.fbReady && window.fb) {
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        signInAnonymously(auth).catch(e => console.error(e));
                        onAuthStateChanged(auth, setUser);
                        clearInterval(checkInterval);
                    }
                }, 100);
                setTimeout(() => setIsLoading(false), 1500); 
                return () => clearInterval(checkInterval);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                const unsubs = [
                    onSnapshot(path('base'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setBaseSchedule(d);
                    }),
                    onSnapshot(path('overrides'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setOverrides(d);
                    }),
                    onSnapshot(path('academic'), (s) => {
                        s.docs.forEach(doc => { if (doc.id === 'targets') setTargetHours(doc.data()); });
                    })
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            const saveData = async (coll, id, data) => {
                const { db, appId, doc, setDoc, Timestamp } = window.fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coll, id), { ...data, updatedAt: Timestamp.now() });
            };

            const getMonday = (dateStr) => {
                const date = new Date(dateStr + 'T00:00:00');
                const day = date.getDay();
                const diff = date.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(date.setDate(diff));
                return monday.toLocaleDateString('en-CA');
            };

            const getCellData = (dateStr, period, classLabel) => {
                const overrideKey = `${dateStr}-${period}-${classLabel}`;
                const date = new Date(dateStr + 'T00:00:00'); 
                const dayIdx = (date.getDay() + 6) % 7; 
                
                const override = overrides[overrideKey];
                const baseMatch = Object.values(baseSchedule).find(v => 
                    v.dayIdx === dayIdx && v.period === period && v.classLabel === classLabel
                );
                
                if (override) {
                    const isConflict = !!baseMatch; 
                    return { ...override, isConflict, baseType: baseMatch?.type, baseLabel: baseMatch?.classLabel };
                }
                if (baseMatch) return { type: baseMatch.type };
                return null;
            };

            // 학년 통계 필터링: "5-1" 처럼 하이픈이 포함된 학급 명칭만 카운트
            const stats = useMemo(() => {
                const res = {};
                dynamicClasses.forEach(c => {
                    // "학년-반" 형식만 통계 대상으로 간주 (예: 5-1, 5-2 등)
                    if (c.includes('-')) {
                        res[c] = { english: 0, science: 0, pe: 0, external: 0 };
                    }
                });
                Object.values(overrides).forEach(v => {
                    if (v && v.status === 'held' && res[v.classLabel]) {
                        res[v.classLabel][v.type]++;
                    }
                });
                return res;
            }, [overrides, dynamicClasses]);

            const parseSmartDates = (input) => {
                if (!input) return [];
                const currentYear = new Date().getFullYear();
                return input.split(/[,|\n\s]+/).map(d => {
                    let s = d.trim().replace(/\//g, '.');
                    if (!s) return null;
                    const parts = s.split('.');
                    let formatted = "";
                    if (parts.length === 2) formatted = `${currentYear}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
                    else if (parts.length === 3) formatted = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
                    const date = new Date(formatted + 'T00:00:00');
                    return isNaN(date.getTime()) ? null : date.toLocaleDateString('en-CA');
                }).filter(d => d);
            };

            if (isLoading) return null;

            return (
                <div className="min-h-screen flex flex-col animate-in">
                    <header className="bg-white border-b px-4 py-2 flex flex-col lg:flex-row justify-between items-center gap-2 sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-900 p-2 rounded-xl text-white shadow-md"><SafeIcon name="ClipboardCheck" size={18} /></div>
                            <h1 className="text-sm font-black text-slate-800 tracking-tighter">전담 마크 <span className="text-indigo-600 italic">V6.6 Intelligent</span></h1>
                        </div>
                        <nav className="flex bg-slate-100 p-1 rounded-2xl">
                            {[
                                { id: 'academic', label: '학사 일정 확인', icon: 'Calendar' },
                                { id: 'instructor', label: '강사 수업 등록', icon: 'Layers' },
                                { id: 'config', label: '전담 시간 등록', icon: 'Settings' },
                                { id: 'stats', label: '시수 통계', icon: 'BarChart3' },
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl text-[11px] font-bold transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                    <SafeIcon name={tab.icon} size={14} /> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="p-2 lg:p-4 max-w-7xl mx-auto w-full flex-1">
                        {/* 1. 학사 일정 확인 */}
                        {activeTab === 'academic' && (
                            <div className="space-y-4">
                                <div className="bg-white p-4 rounded-3xl shadow-sm border border-indigo-100 flex items-start gap-4 relative overflow-hidden">
                                    <div className="bg-indigo-50 p-2 rounded-2xl text-indigo-600 z-10"><SafeIcon name="Info" size={20}/></div>
                                    <div className="flex-1 z-10">
                                        <h4 className="text-xs font-black text-slate-800 mb-1 leading-none uppercase tracking-tighter">V6.6 지능형 매니저 활성화</h4>
                                        <p className="text-[10px] text-slate-500 leading-relaxed italic">충돌 시 빨간색 아이콘이 뜹니다. 클릭하여 **지능형 스케줄러**를 사용해 빈 시간을 자동으로 추천받으세요.</p>
                                    </div>
                                    <button onClick={() => setViewMode(viewMode === 'daily' ? 'weekly' : 'daily')} className="px-4 py-2 bg-slate-900 text-white rounded-xl font-black text-[10px] hover:bg-black transition-all btn-press z-10 shadow-lg shadow-indigo-100">
                                        {viewMode === 'daily' ? '주별 달력' : '일별 관리'}
                                    </button>
                                </div>

                                <div className="flex flex-col md:flex-row justify-between items-center gap-3 bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-3">
                                        <div className="flex items-center gap-1">
                                            <button onClick={() => { 
                                                const d = new Date(selectedDate + 'T00:00:00'); 
                                                d.setDate(d.getDate() - (viewMode === 'weekly' ? 7 : 1)); 
                                                setSelectedDate(new Date(d).toLocaleDateString('en-CA')); 
                                            }} className="p-3 border rounded-2xl hover:bg-slate-50 transition-all btn-press"><SafeIcon name="ChevronLeft" size={20} /></button>
                                            <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="font-black text-slate-700 border-none bg-transparent focus:ring-0 cursor-pointer text-base" />
                                            <button onClick={() => { 
                                                const d = new Date(selectedDate + 'T00:00:00'); 
                                                d.setDate(d.getDate() + (viewMode === 'weekly' ? 7 : 1)); 
                                                setSelectedDate(new Date(d).toLocaleDateString('en-CA')); 
                                            }} className="p-3 border rounded-2xl hover:bg-slate-50 transition-all btn-press"><SafeIcon name="ChevronRight" size={20} /></button>
                                        </div>
                                    </div>
                                    <div className="flex bg-slate-100 p-1 rounded-2xl">
                                        {['daily', 'weekly', 'monthly'].map(mode => (
                                            <button key={mode} onClick={() => setViewMode(mode)} className={`px-5 py-2 rounded-xl text-[11px] font-black transition-all ${viewMode === mode ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>{mode === 'daily' ? '일별' : mode === 'weekly' ? '주별' : '월별'}</button>
                                        ))}
                                    </div>
                                </div>

                                {viewMode === 'weekly' && (
                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-x-auto animate-in no-scrollbar">
                                        <table className="w-full border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b">
                                                    <th className="p-4 border-r w-20 text-[10px] font-black text-slate-300 uppercase tracking-widest">교시</th>
                                                    {(() => {
                                                        const mondayStr = getMonday(selectedDate);
                                                        return DAYS.map((d, i) => {
                                                            const colDate = new Date(mondayStr + 'T00:00:00');
                                                            colDate.setDate(colDate.getDate() + i);
                                                            const dateStr = new Date(colDate).toLocaleDateString('en-CA');
                                                            const isToday = dateStr === new Date().toLocaleDateString('en-CA');
                                                            return <th key={i} className={`p-5 border-r min-w-[160px] ${isToday ? 'bg-indigo-50/30' : ''}`}>
                                                                <div className="text-[10px] text-slate-300 font-bold">{dateStr.split('-').slice(1).join('.')}</div>
                                                                <div className={`font-black text-sm ${isToday ? 'text-indigo-600' : 'text-slate-700'}`}>{d}요일</div>
                                                            </th>;
                                                        });
                                                    })()}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {PERIODS.map(p => (
                                                    <tr key={p} className="border-b last:border-0">
                                                        <td className="p-5 border-r bg-slate-50/20 text-center font-black text-slate-200 text-4xl italic tracking-tighter leading-none">{p}</td>
                                                        {(() => {
                                                            const mondayStr = getMonday(selectedDate);
                                                            return DAYS.map((_, i) => {
                                                                const colDate = new Date(mondayStr + 'T00:00:00');
                                                                colDate.setDate(colDate.getDate() + i);
                                                                const dateStr = new Date(colDate).toLocaleDateString('en-CA');
                                                                return <td key={i} className="p-2 border-r last:border-0 align-top h-28">
                                                                    <div className="space-y-1.5">
                                                                        {dynamicClasses.map(cls => {
                                                                            const data = getCellData(dateStr, p, cls);
                                                                            const spec = SPECIALISTS.find(s => s.id === (data?.type));
                                                                            if (!spec) return null;
                                                                            return <div key={cls} onClick={() => { 
                                                                                setSelectedDate(dateStr);
                                                                                setViewMode('daily');
                                                                                setSelectedCell(`${dateStr}-${p}-${cls}`);
                                                                                setIsModalOpen(true);
                                                                            }} className={`p-2 rounded-xl border text-[10px] font-black truncate flex items-center justify-between cursor-pointer transition-all hover:brightness-95 ${spec.bg} ${spec.text} ${spec.border} shadow-sm ${data.isConflict ? 'conflict-glow' : ''}`}>
                                                                                <span>{cls}: {data.title || spec.name}</span>
                                                                                {data.isConflict && <SafeIcon name="AlertTriangle" size={12} className="text-rose-600 animate-pulse" />}
                                                                            </div>;
                                                                        })}
                                                                    </div>
                                                                </td>;
                                                            });
                                                        })()}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {viewMode === 'daily' && (
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 animate-in">
                                        {dynamicClasses.map(cls => (
                                            <div key={cls} className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                                                <div className="bg-slate-50 p-4 border-b text-center font-black text-slate-700 uppercase tracking-widest text-sm">{cls}</div>
                                                <div className="p-3 space-y-3">
                                                    {PERIODS.map(p => {
                                                        const data = getCellData(selectedDate, p, cls);
                                                        const spec = SPECIALISTS.find(s => s.id === data?.type);
                                                        return (
                                                            <div key={p} onClick={() => { setSelectedCell(`${selectedDate}-${p}-${cls}`); setIsModalOpen(true); }} className={`p-4 rounded-[1.5rem] border-2 transition-all cursor-pointer min-h-[100px] flex flex-col justify-center relative ${spec ? `${spec.bg} ${spec.border}` : 'bg-slate-50/50 border-transparent hover:border-indigo-100'} ${data?.isConflict ? 'conflict-glow' : ''}`}>
                                                                <div className="absolute top-2 left-2 flex items-center">
                                                                    <span className="period-badge">{p}</span>
                                                                </div>
                                                                {data?.isConflict && <div className="absolute top-2 right-2 text-rose-600 animate-pulse"><SafeIcon name="AlertTriangle" size={14}/></div>}
                                                                {spec ? (
                                                                    <div className="text-center pt-2">
                                                                        <div className={`text-[15px] font-black ${spec.text}`}>{data.title || spec.name}</div>
                                                                        {data.title && <div className="text-[10px] font-bold text-slate-400 mt-1 italic leading-none">{spec.name}</div>}
                                                                        {data.status === 'held' && <div className="mt-2 text-indigo-600 flex justify-center"><SafeIcon name="CheckCircle2" size={16}/></div>}
                                                                    </div>
                                                                ) : (
                                                                    <div className="flex justify-center opacity-10"><SafeIcon name="Plus" size={24} /></div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 2. 강사 수업 등록 */}
                        {activeTab === 'instructor' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in">
                                <div className="lg:col-span-2 bg-amber-600 p-8 rounded-[3rem] shadow-xl text-white relative overflow-hidden h-fit">
                                    <div className="absolute -top-10 -right-10 opacity-10 rotate-12"><SafeIcon name="Layers" size={180}/></div>
                                    <h3 className="text-xl font-black mb-1 flex items-center gap-2 relative z-10 italic uppercase tracking-widest leading-none"><SafeIcon name="Layers" size={24}/> 강사 수업 등록</h3>
                                    <p className="text-amber-100 text-[11px] mb-8 font-medium relative z-10 opacity-80 uppercase tracking-tighter italic leading-none">Enter external instructor schedules for batches.</p>
                                    <div className="space-y-6 relative z-10">
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                            <div className="space-y-2">
                                                <label className="text-[11px] font-black opacity-60 ml-1 uppercase tracking-widest leading-none">수업명</label>
                                                <input type="text" value={instTitle} onChange={e => setInstTitle(e.target.value)} placeholder="예: 생존수영" className="w-full p-4 rounded-[1.5rem] bg-white/10 border-none text-white placeholder-white/30 font-black focus:bg-white focus:text-slate-800 text-[13px] outline-none transition-all shadow-inner" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[11px] font-black opacity-60 ml-1 uppercase tracking-widest leading-none">대상 학급</label>
